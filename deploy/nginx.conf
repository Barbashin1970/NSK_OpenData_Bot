# Nginx конфигурация для City OpenData Bot
# Путь: /etc/nginx/sites-available/city-bot
# После настройки: sudo certbot --nginx -d your.domain.ru

server {
    listen 80;
    server_name your.domain.ru;  # заменить на реальный домен
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name your.domain.ru;  # заменить на реальный домен

    # SSL — выдаётся certbot, не редактировать вручную
    ssl_certificate     /etc/letsencrypt/live/your.domain.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your.domain.ru/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Проксирование на бот
    location / {
        proxy_pass         http://localhost:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    # Статика — кешируем на уровне Nginx (браузер получает заголовки no-store от FastAPI)
    location /static/ {
        proxy_pass http://localhost:8000;
        proxy_cache_bypass $http_pragma;
    }

    # Ограничение размера загружаемых файлов (для будущей Studio)
    client_max_body_size 50M;
}
