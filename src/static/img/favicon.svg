<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="bg" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </radialGradient>
    <radialGradient id="eyeGrad" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </radialGradient>
    <radialGradient id="furGrad" cx="45%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e8edf2"/>
    </radialGradient>
  </defs>

  <!-- Blue circle background -->
  <circle cx="50" cy="50" r="50" fill="url(#bg)"/>

  <!-- Body (peeking below head) -->
  <ellipse cx="50" cy="82" rx="26" ry="16" fill="url(#furGrad)"/>

  <!-- Left ear (round bear ear) -->
  <circle cx="25" cy="30" r="12" fill="url(#furGrad)"/>
  <circle cx="25" cy="30" r="7" fill="#c8d8e8" opacity="0.5"/>

  <!-- Right ear (round bear ear) -->
  <circle cx="75" cy="30" r="12" fill="url(#furGrad)"/>
  <circle cx="75" cy="30" r="7" fill="#c8d8e8" opacity="0.5"/>

  <!-- Head -->
  <ellipse cx="50" cy="56" rx="30" ry="27" fill="url(#furGrad)"/>

  <!-- Muzzle -->
  <ellipse cx="50" cy="67" rx="14" ry="10" fill="white" opacity="0.6"/>

  <!-- Eyes -->
  <ellipse cx="40" cy="52" rx="5.5" ry="6.5" fill="url(#eyeGrad)"/>
  <ellipse cx="60" cy="52" rx="5.5" ry="6.5" fill="url(#eyeGrad)"/>
  <!-- Pupils -->
  <ellipse cx="41" cy="53" rx="2.8" ry="4.5" fill="#0c1a2e"/>
  <ellipse cx="61" cy="53" rx="2.8" ry="4.5" fill="#0c1a2e"/>
  <!-- Eye shine -->
  <circle cx="42" cy="50" r="1.6" fill="white" opacity="0.9"/>
  <circle cx="62" cy="50" r="1.6" fill="white" opacity="0.9"/>

  <!-- Nose (oval black bear nose) -->
  <ellipse cx="50" cy="63" rx="5" ry="3.5" fill="#1a1a2e"/>
  <!-- Nose shine -->
  <ellipse cx="48.5" cy="61.8" rx="1.5" ry="1" fill="white" opacity="0.4"/>

  <!-- Smile -->
  <path d="M 50 66 Q 44 72 41 69" stroke="#9ca3af" stroke-width="1.3" fill="none" stroke-linecap="round"/>
  <path d="M 50 66 Q 56 72 59 69" stroke="#9ca3af" stroke-width="1.3" fill="none" stroke-linecap="round"/>
</svg>
