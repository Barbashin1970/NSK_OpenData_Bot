<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест по промпт-инжинирингу</title>
    <style>
:root {
  /* Studio-matching color tokens */
  --color-white: #ffffff;
  --color-black: #000000;
  --color-gray-50: #f9fafb;
  --color-gray-100: #f3f4f6;
  --color-gray-200: #e5e7eb;
  --color-gray-300: #d1d5db;
  --color-gray-400: #9ca3af;
  --color-gray-500: #6b7280;
  --color-gray-600: #4b5563;
  --color-gray-700: #374151;
  --color-gray-800: #1f2937;
  --color-gray-900: #111827;
  --color-blue-50: rgba(59, 130, 246, 0.08);
  --color-blue-400: #60a5fa;
  --color-blue-500: #3b82f6;
  --color-blue-600: #2563eb;
  --color-blue-700: #1d4ed8;
  --color-red-500: #ef4444;
  --color-orange-500: #f59e0b;
  --color-green-500: #22c55e;

  --color-blue-500-rgb: 59, 130, 246;
  --color-red-500-rgb: 239, 68, 68;
  --color-success-rgb: 34, 197, 94;
  --color-error-rgb: 239, 68, 68;
  --color-warning-rgb: 245, 158, 11;
  --color-info-rgb: 107, 114, 128;

  --color-bg-1: rgba(59, 130, 246, 0.08);
  --color-bg-2: rgba(245, 158, 11, 0.08);
  --color-bg-3: rgba(34, 197, 94, 0.08);
  --color-bg-4: rgba(239, 68, 68, 0.08);

  --color-background: var(--color-white);
  --color-surface: var(--color-white);
  --color-text: var(--color-gray-800);
  --color-text-secondary: var(--color-gray-500);
  --color-primary: var(--color-blue-500);
  --color-primary-hover: var(--color-blue-600);
  --color-primary-active: var(--color-blue-700);
  --color-border: var(--color-gray-200);
  --color-btn-primary-text: var(--color-white);
  --color-card-border: var(--color-gray-200);
  --color-error: var(--color-red-500);
  --color-success: var(--color-green-500);
  --color-warning: var(--color-orange-500);
  --color-info: var(--color-gray-500);

  --font-family-base: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  --font-size-xs: 11px;
  --font-size-sm: 12px;
  --font-size-base: 13px;
  --font-size-lg: 14px;
  --font-size-xl: 15px;
  --font-size-2xl: 16px;
  --font-size-3xl: 20px;
  --font-weight-medium: 500;
  --font-weight-semibold: 600;
  --font-weight-bold: 700;

  --space-4: 4px;
  --space-6: 6px;
  --space-8: 8px;
  --space-10: 10px;
  --space-12: 12px;
  --space-16: 16px;
  --space-20: 20px;
  --space-24: 24px;
  --space-32: 32px;

  --radius-sm: 6px;
  --radius-md: 8px;
  --radius-lg: 10px;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: var(--font-family-base);
  background-color: var(--color-gray-50);
  color: var(--color-text);
  line-height: 1.5;
  font-size: var(--font-size-base);
}

.container {
  max-width: 1000px;
  margin: 0 auto;
  padding: var(--space-12) var(--space-16);
}

.header {
  text-align: center;
  margin-bottom: var(--space-12);
}

.header h1 {
  font-size: var(--font-size-2xl);
  font-weight: var(--font-weight-bold);
  color: var(--color-primary);
  margin-bottom: var(--space-6);
}

.total-score-card {
  background: linear-gradient(135deg, var(--color-blue-500), var(--color-blue-700));
  color: white;
  padding: var(--space-8) var(--space-16);
  border-radius: var(--radius-md);
  text-align: center;
  margin-bottom: var(--space-12);
  box-shadow: 0 1px 4px rgba(0, 0, 0, 0.1);
}

.total-score-card h2 {
  font-size: var(--font-size-sm);
  font-weight: var(--font-weight-medium);
  margin-bottom: var(--space-4);
  opacity: 0.95;
}

.total-score-number {
  font-size: var(--font-size-2xl);
  font-weight: var(--font-weight-bold);
  margin: 0;
}

.total-score-percentage {
  font-size: var(--font-size-base);
  opacity: 0.9;
  margin: 0;
}

.user-info-section {
  background-color: var(--color-surface);
  border: 1px solid var(--color-card-border);
  border-radius: var(--radius-md);
  padding: var(--space-10);
  margin-bottom: var(--space-12);
}

.user-info-section h3 {
  font-size: var(--font-size-base);
  font-weight: var(--font-weight-semibold);
  margin-bottom: var(--space-8);
  color: var(--color-text);
}

.user-info-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: var(--space-8);
}

.form-group {
  display: flex;
  flex-direction: column;
}

.form-group label {
  font-size: var(--font-size-sm);
  font-weight: var(--font-weight-medium);
  margin-bottom: var(--space-4);
  color: var(--color-text-secondary);
}

.form-group input {
  padding: var(--space-6) var(--space-8);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-sm);
  font-size: var(--font-size-sm);
  font-family: var(--font-family-base);
  background-color: var(--color-surface);
  color: var(--color-text);
}

.form-group input:focus {
  outline: 2px solid var(--color-primary);
  border-color: var(--color-primary);
}

.modules-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: var(--space-10);
  margin-top: var(--space-12);
}

.module-card {
  background-color: var(--color-surface);
  border: 1px solid var(--color-card-border);
  border-radius: var(--radius-md);
  padding: var(--space-10) var(--space-12);
  display: flex;
  flex-direction: column;
  min-height: 130px;
  transition: box-shadow 0.2s ease, border-color 0.2s ease;
}

.module-card:hover {
  box-shadow: 0 2px 8px rgba(59, 130, 246, 0.12);
  border-color: var(--color-blue-400);
}

.module-header {
  margin-bottom: var(--space-6);
  flex-shrink: 0;
}

.module-number {
  font-size: var(--font-size-xs);
  font-weight: var(--font-weight-bold);
  color: var(--color-primary);
  margin-bottom: 2px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.module-title {
  font-size: var(--font-size-sm);
  font-weight: var(--font-weight-semibold);
  color: var(--color-text);
  line-height: 1.3;
}

.score-display {
  text-align: center;
  margin: var(--space-6) 0;
  flex-grow: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.score-text {
  font-size: var(--font-size-lg);
  font-weight: var(--font-weight-bold);
  color: var(--color-primary);
}

.score-label {
  font-size: var(--font-size-xs);
  color: var(--color-text-secondary);
  margin-top: 2px;
}

.progress-bar-container {
  width: 100%;
  height: 4px;
  background-color: var(--color-gray-100);
  border-radius: var(--radius-sm);
  overflow: hidden;
  margin-bottom: var(--space-8);
  flex-shrink: 0;
}

.progress-bar {
  height: 100%;
  background: linear-gradient(90deg, var(--color-blue-500), var(--color-blue-400));
  transition: width 0.5s ease;
  border-radius: var(--radius-sm);
}

.btn {
  padding: var(--space-8) var(--space-16);
  border: none;
  border-radius: var(--radius-md);
  font-size: var(--font-size-sm);
  font-weight: var(--font-weight-semibold);
  cursor: pointer;
  transition: all 0.2s ease;
  font-family: var(--font-family-base);
  text-align: center;
}

.btn-primary {
  background-color: var(--color-primary);
  color: var(--color-btn-primary-text);
  width: 100%;
  margin-top: auto;
  align-self: flex-end;
}

.btn-primary:hover {
  background-color: var(--color-primary-hover);
}

.btn-secondary {
  background-color: var(--color-gray-50);
  color: var(--color-text);
  border: 1px solid var(--color-border);
}

.btn-secondary:hover {
  background-color: var(--color-gray-100);
}

.hidden {
  display: none !important;
}

#testView {
  max-width: 800px;
  margin: 0 auto;
}

.test-header {
  background-color: var(--color-surface);
  border: 1px solid var(--color-card-border);
  border-radius: var(--radius-md);
  padding: var(--space-12) var(--space-16);
  margin-bottom: var(--space-12);
}

.test-header h2 {
  font-size: var(--font-size-lg);
  font-weight: var(--font-weight-bold);
  color: var(--color-primary);
  margin-bottom: var(--space-8);
}

.progress-section {
  margin-top: var(--space-8);
}

.question-counter {
  font-size: var(--font-size-sm);
  color: var(--color-text-secondary);
  margin-bottom: var(--space-4);
}

.question-card {
  background-color: var(--color-surface);
  border: 1px solid var(--color-card-border);
  border-radius: var(--radius-md);
  padding: var(--space-16);
  margin-bottom: var(--space-12);
}

.question-number {
  font-size: var(--font-size-sm);
  font-weight: var(--font-weight-bold);
  color: var(--color-primary);
  margin-bottom: var(--space-8);
}

.question-text {
  font-size: var(--font-size-base);
  font-weight: var(--font-weight-semibold);
  color: var(--color-text);
  margin-bottom: var(--space-12);
  line-height: 1.4;
}

.options-container {
  display: flex;
  flex-direction: column;
  gap: var(--space-6);
}

.option-button {
  display: flex;
  align-items: flex-start;
  padding: var(--space-8) var(--space-10);
  background-color: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 0.2s ease;
  text-align: left;
  font-family: var(--font-family-base);
  font-size: var(--font-size-sm);
  color: var(--color-text);
}

.option-button:hover {
  border-color: var(--color-primary);
  background-color: var(--color-blue-50);
}

.option-button.selected {
  border-color: var(--color-primary);
  background-color: var(--color-blue-50);
  box-shadow: 0 0 0 2px rgba(var(--color-blue-500-rgb), 0.15);
}

.option-letter {
  font-weight: var(--font-weight-bold);
  color: var(--color-primary);
  margin-right: var(--space-8);
  min-width: 20px;
  font-size: var(--font-size-sm);
}

.option-text {
  flex: 1;
  line-height: 1.4;
}

.matching-container {
  display: grid;
  grid-template-columns: 1fr;
  gap: var(--space-12);
}

.matching-column {
  display: flex;
  flex-direction: column;
  gap: var(--space-8);
}

.column-title {
  font-size: var(--font-size-sm);
  font-weight: var(--font-weight-semibold);
  color: var(--color-text-secondary);
  margin-bottom: var(--space-4);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.matching-item {
  background-color: var(--color-gray-50);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-sm);
  padding: var(--space-8) var(--space-10);
}

.matching-item-number {
  font-weight: var(--font-weight-bold);
  color: var(--color-primary);
  margin-bottom: var(--space-4);
  font-size: var(--font-size-sm);
}

.matching-select {
  width: 100%;
  padding: var(--space-6) var(--space-8);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-sm);
  font-size: var(--font-size-sm);
  font-family: var(--font-family-base);
  background-color: var(--color-surface);
  color: var(--color-text);
  margin-top: var(--space-6);
  cursor: pointer;
}

.matching-select:focus {
  outline: 2px solid var(--color-primary);
  border-color: var(--color-primary);
}

.right-option {
  display: none;
}

.right-option-letter {
  display: none;
}

.navigation {
  display: flex;
  justify-content: space-between;
  gap: var(--space-12);
  margin-top: var(--space-12);
}

.navigation .btn {
  flex: 1;
  max-width: 180px;
  padding: var(--space-8) var(--space-16);
  font-size: var(--font-size-sm);
}

@media (max-width: 768px) {
  .container {
    padding: var(--space-8);
  }

  .modules-grid {
    grid-template-columns: 1fr;
  }

  .user-info-grid {
    grid-template-columns: 1fr;
  }

  .navigation {
    flex-direction: column;
  }

  .navigation .btn {
    max-width: 100%;
  }

  .header h1 {
    font-size: var(--font-size-lg);
  }

  .module-card {
    min-height: 100px;
  }
}

@media (min-width: 769px) and (max-width: 1024px) {
  .modules-grid {
    grid-template-columns: repeat(2, 1fr);
  }
}

@media (min-width: 1025px) {
  .modules-grid {
    grid-template-columns: repeat(3, 1fr);
  }
}
    </style>
</head>
<body>
    <div class="container">
        <!-- Dashboard View -->
        <div id="dashboardView">
            <div class="header">
                <h1>🧠 Тест по промпт-инжинирингу</h1>
            </div>

            <!-- Total Score Card - Compact -->
            <div class="total-score-card">
                <h2>Итоговый результат:</h2>
                <div style="display: flex; align-items: center; justify-content: center; gap: var(--space-16);">
                    <div class="total-score-number" id="totalScoreNumber">0/72</div>
                    <div class="total-score-percentage" id="totalScorePercentage">0%</div>
                </div>
            </div>

            <!-- User Info Section -->
            <div class="user-info-section">
                <h3>👤 Информация о пользователе</h3>
                <div class="user-info-grid">
                    <div class="form-group">
                        <label for="userName">Имя</label>
                        <input type="text" id="userName" placeholder="Введите ваше имя" onchange="saveUserInfo()">
                    </div>
                    <div class="form-group">
                        <label for="userLastName">Фамилия</label>
                        <input type="text" id="userLastName" placeholder="Введите вашу фамилию" onchange="saveUserInfo()">
                    </div>
                    <div class="form-group">
                        <label for="userEmail">Почта</label>
                        <input type="email" id="userEmail" placeholder="example@email.com" onchange="saveUserInfo()">
                    </div>
                </div>
            </div>

            <!-- Modules Grid -->
            <div class="modules-grid" id="modulesGrid" style="display: grid;">
                <!-- Modules will be rendered by JavaScript -->
            </div>

            <!-- Clear Results Button -->
            <div style="margin-top: var(--space-16); text-align: center; padding: var(--space-12); border-top: 1px solid var(--color-border);">
                <button id="clearResultsBtn" class="btn" style="background-color: transparent; color: var(--color-error); border: 1px solid var(--color-error); padding: var(--space-6) var(--space-16); font-size: var(--font-size-xs);" onclick="showClearConfirmation()">
                    Очистить результаты
                </button>
            </div>
        </div>

        <!-- Test View -->
        <div id="testView" class="hidden">
            <div class="test-header">
                <h2 id="testModuleTitle"></h2>
                <div class="progress-section">
                    <div class="question-counter" id="questionCounter">Вопрос 1 из 5</div>
                    <div class="progress-bar-container">
                        <div class="progress-bar" id="progressBar" style="width: 20%;"></div>
                    </div>
                </div>
            </div>

            <div id="questionContainer">
                <!-- Questions will be rendered by JavaScript -->
            </div>

            <div class="navigation" id="navigation">
                <button class="btn btn-secondary" id="prevButton">← Назад</button>
                <button class="btn btn-primary" id="nextButton">Далее →</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
    // Notify parent frame about score updates
    const _origSaveScores = window.saveScores;
    window.saveScores = function() {
      _origSaveScores.apply(this, arguments);
      const total = Object.values(moduleScores).reduce((a,b) => a+b, 0);
      if (window.parent !== window) {
        window.parent.postMessage({type: 'prompt-test-score', score: total, max: 72}, '*');
      }
    };
    // Send initial score on load
    window.addEventListener('load', () => {
      setTimeout(() => {
        const total = Object.values(moduleScores).reduce((a,b) => a+b, 0);
        if (window.parent !== window) {
          window.parent.postMessage({type: 'prompt-test-score', score: total, max: 72}, '*');
        }
      }, 500);
    });
    </script>
</body>
</html>
