<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Сигма — Презентация</title>
  <link rel="icon" type="image/svg+xml" href="/static/img/favicon.svg">
  <link rel="icon" type="image/png" href="/static/img/sigma-cat.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script>
    if (window.tailwind) {
      tailwind.config = {
        theme: { fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] } }
      }
    }
  </script>
  <style>
    body { margin: 0; overflow: hidden; background: #f8fafc; }
    .fade-in { animation: fadeIn .3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
    .pulse-dot { animation: pulseDot 2s ease-in-out infinite; }
    @keyframes pulseDot { 0%,100% { opacity: .6; } 50% { opacity: 1; } }
    .spinner { animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* QR overlay backdrop */
    .qr-overlay {
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      background: rgba(15,23,42,.7);
      transition: opacity .3s ease;
    }
    .qr-overlay.hiding { opacity: 0; pointer-events: none; }

    /* Status bar */
    .status-bar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 40;
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 20px;
      background: linear-gradient(135deg, #1e3a5f, #1e293b);
      border-bottom: 1px solid rgba(255,255,255,.1);
      color: white;
      font-family: 'Inter', sans-serif;
      transition: transform .3s ease, opacity .3s ease;
    }
    .status-bar.hidden-bar { transform: translateY(-100%); opacity: 0; }

    /* Loading overlay */
    .loading-overlay {
      position: fixed; inset: 0; z-index: 30;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: rgba(248,250,252,.92);
      backdrop-filter: blur(4px);
      transition: opacity .3s ease;
    }
    .loading-overlay.hiding { opacity: 0; pointer-events: none; }

    /* Main iframe */
    #mainFrame {
      position: fixed;
      top: 52px; left: 0; right: 0; bottom: 0;
      width: 100%; height: calc(100vh - 52px);
      border: none;
    }

    /* Idle screen */
    .idle-screen {
      position: fixed; inset: 0; z-index: 20;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #f0f4ff 0%, #f8fafc 50%, #eff6ff 100%);
      transition: opacity .4s ease;
    }
    .idle-screen.hiding { opacity: 0; pointer-events: none; }
  </style>
</head>
<body class="font-sans">

  <!-- ── Status bar (always on top) ─────────────────────────────────────────── -->
  <div class="status-bar" id="statusBar">
    <div class="flex items-center gap-3">
      <img src="/static/img/sigma-cat.png" alt="" class="h-8 w-auto" onerror="this.style.display='none'">
      <div>
        <span class="text-sm font-bold tracking-tight">Сигма</span>
        <span class="text-[11px] text-blue-300 ml-2">Режим презентации</span>
      </div>
    </div>
    <div class="flex items-center gap-3">
      <span id="city-badge" class="text-xs bg-blue-500/20 border border-blue-400/30 text-blue-200 rounded-full px-3 py-1 hidden"></span>
      <span id="role-badge" class="text-xs bg-indigo-500/20 border border-indigo-400/30 text-indigo-200 rounded-full px-3 py-1 hidden"></span>
      <span id="query-echo" class="text-xs text-blue-200 max-w-[400px] truncate hidden"></span>
      <span class="flex items-center gap-1.5 text-xs bg-white/10 border border-white/15 rounded-full px-3 py-1">
        <span id="status-dot" class="w-2 h-2 rounded-full bg-amber-400 pulse-dot"></span>
        <span id="status-text">Подключение...</span>
      </span>
      <button onclick="toggleQR()" class="text-xs bg-white/15 hover:bg-white/25 border border-white/15 rounded-lg px-3 py-1.5 transition-colors" title="Показать QR-код">
        QR
      </button>
      <button onclick="endSession()" class="text-xs bg-red-500/20 hover:bg-red-500/40 border border-red-400/30 text-red-200 rounded-lg px-3 py-1.5 transition-colors" title="Завершить сеанс">
        Завершить
      </button>
    </div>
  </div>

  <!-- ── Idle screen (before first query) ───────────────────────────────────── -->
  <div class="idle-screen" id="idleScreen">
    <div class="text-center fade-in">
      <div class="bg-white rounded-2xl shadow-xl border border-slate-200 p-8 max-w-sm mx-auto mb-6">
        <div id="qr-idle" class="mx-auto mb-4 inline-block"></div>
        <h2 class="text-lg font-bold text-slate-800 mb-1">Отсканируйте QR-код</h2>
        <p class="text-slate-400 text-sm mb-3">Откройте камеру смартфона и наведите на код</p>
        <div class="bg-slate-50 rounded-xl px-4 py-2 text-[11px] text-slate-400 font-mono break-all" id="mobile-url-idle"></div>
      </div>

      <p class="text-slate-300 text-xs">Сессия: <span id="session-label" class="font-mono font-semibold text-slate-400"></span></p>
    </div>
  </div>

  <!-- ── Loading overlay ────────────────────────────────────────────────────── -->
  <div class="loading-overlay hiding" id="loadingOverlay">
    <svg class="w-12 h-12 text-blue-500 spinner mb-4" fill="none" viewBox="0 0 24 24">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
    </svg>
    <p class="text-slate-600 text-lg font-medium" id="loading-query">Обработка запроса...</p>
  </div>

  <!-- ── QR overlay (modal, toggled by button) ──────────────────────────────── -->
  <div class="qr-overlay hiding fixed inset-0 z-50 flex items-center justify-center" id="qrOverlay" onclick="if(event.target===this)toggleQR()">
    <div class="bg-white rounded-3xl shadow-2xl p-8 max-w-sm text-center fade-in">
      <div id="qr-canvas" class="mx-auto mb-5 inline-block"></div>
      <h2 class="text-xl font-bold text-slate-800 mb-2">Подключите телефон</h2>
      <p class="text-slate-500 text-sm mb-4">Отсканируйте QR-код камерой смартфона</p>
      <div class="bg-slate-50 rounded-xl px-4 py-2.5 text-xs text-slate-400 font-mono break-all" id="mobile-url"></div>
      <button onclick="toggleQR()" class="mt-5 text-sm text-slate-400 hover:text-slate-600 transition-colors">Закрыть</button>
    </div>
  </div>

  <!-- ── Main content iframe ────────────────────────────────────────────────── -->
  <iframe id="mainFrame" src="/?mode=display"></iframe>

<script>
// ── Session management ──────────────────────────────────────────────────────
let SID = new URLSearchParams(location.search).get('s');
let _evtSource = null;
let _firstQuery = true;
let _currentCityName = '';
let _currentRole = 'citizen';

const _ROLE_LABELS = {
  citizen:  '👤 Горожанин',
  official: '🏙️ Служащий',
  mayor:    '🏛️ Мэр',
};

async function init() {
  if (!SID) {
    const resp = await fetch('/session/create', { method: 'POST' });
    const data = await resp.json();
    SID = data.sid;
    history.replaceState(null, '', `/display?s=${SID}`);
  }
  document.getElementById('session-label').textContent = SID;
  renderQR();
  connectSSE();
  loadCityName();
  updateRoleBadge('citizen');
}

async function loadCityName() {
  try {
    const r = await fetch('/api/city-config');
    const d = await r.json();
    if (d.city_name) {
      _currentCityName = d.city_name;
      const badge = document.getElementById('city-badge');
      badge.textContent = d.city_name;
      badge.classList.remove('hidden');
    }
  } catch(e) {}
}

function updateRoleBadge(role) {
  _currentRole = role;
  const badge = document.getElementById('role-badge');
  badge.textContent = _ROLE_LABELS[role] || role;
  badge.classList.remove('hidden');
}

function renderQR() {
  const url = `${location.origin}/mobile?s=${SID}`;

  // Idle QR
  const idleEl = document.getElementById('qr-idle');
  document.getElementById('mobile-url-idle').textContent = url;
  idleEl.innerHTML = '';
  new QRCode(idleEl, {
    text: url, width: 220, height: 220,
    colorDark: '#1e293b', colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.M,
  });

  // Overlay QR
  const overlayEl = document.getElementById('qr-canvas');
  document.getElementById('mobile-url').textContent = url;
  overlayEl.innerHTML = '';
  new QRCode(overlayEl, {
    text: url, width: 240, height: 240,
    colorDark: '#1e293b', colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.M,
  });
}

function toggleQR() {
  const overlay = document.getElementById('qrOverlay');
  overlay.classList.toggle('hiding');
}

// ── SSE connection ──────────────────────────────────────────────────────────
function connectSSE() {
  if (_evtSource) _evtSource.close();
  _evtSource = new EventSource(`/session/${SID}/stream`);

  _evtSource.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    switch (msg.type) {
      case 'connected':
        setStatus('connected', 'Подключено');
        break;
      case 'query':
        handleQuery(msg.query);
        break;
      case 'set-city':
        handleCitySwitch(msg.city_id, msg.city_name);
        break;
      case 'set-role':
        handleRoleSwitch(msg.role, msg.district);
        break;
      case 'session-end':
        handleSessionEnd();
        break;
      // Legacy events (backwards compat)
      case 'loading':
        showLoading(msg.query);
        break;
      case 'result':
        handleResult(msg.query, msg.data);
        break;
      case 'error':
        handleError(msg.query, msg.error);
        break;
    }
  };

  _evtSource.onerror = () => {
    setStatus('error', 'Переподключение...');
    setTimeout(() => {
      if (_evtSource.readyState === EventSource.CLOSED) connectSSE();
    }, 3000);
  };
}

function setStatus(state, text) {
  const dot = document.getElementById('status-dot');
  const txt = document.getElementById('status-text');
  txt.textContent = text;
  dot.className = 'w-2 h-2 rounded-full';
  if (state === 'connected') dot.classList.add('bg-emerald-400');
  else if (state === 'error') dot.classList.add('bg-red-400', 'pulse-dot');
  else dot.classList.add('bg-amber-400', 'pulse-dot');
}

// ── Query → iframe ──────────────────────────────────────────────────────────
function handleQuery(query) {
  dismissIdle();

  // Show query echo in status bar
  const echo = document.getElementById('query-echo');
  echo.textContent = `📨 ${query}`;
  echo.classList.remove('hidden');

  // Send query to iframe — index.html in display mode will call /ask
  const frame = document.getElementById('mainFrame');
  if (frame.contentWindow) {
    frame.contentWindow.postMessage({ type: 'query', q: query }, '*');
  }

  // Update echo after brief delay
  setTimeout(() => { echo.textContent = `✓ ${query}`; }, 1500);
}

function showLoading(query) {
  dismissIdle();

  // Show loading overlay
  const lo = document.getElementById('loadingOverlay');
  document.getElementById('loading-query').textContent = `«${query}»`;
  lo.classList.remove('hiding');

  // Show query echo in status bar
  const echo = document.getElementById('query-echo');
  echo.textContent = `📨 ${query}`;
  echo.classList.remove('hidden');
}

function handleResult(query, data) {
  // Hide loading
  const lo = document.getElementById('loadingOverlay');
  lo.classList.add('hiding');

  // Send query to iframe for rendering via main page's full pipeline
  const frame = document.getElementById('mainFrame');
  if (frame.contentWindow) {
    frame.contentWindow.postMessage({ type: 'query', q: query }, '*');
  }

  // Update query echo
  const echo = document.getElementById('query-echo');
  echo.textContent = `✓ ${query}`;
}

function handleError(query, error) {
  const lo = document.getElementById('loadingOverlay');
  lo.classList.add('hiding');

  // Still send the query to iframe — let it handle the error display
  const frame = document.getElementById('mainFrame');
  if (frame.contentWindow) {
    frame.contentWindow.postMessage({ type: 'query', q: query }, '*');
  }

  const echo = document.getElementById('query-echo');
  echo.textContent = `⚠ ${query}`;
}

// ── City switch ─────────────────────────────────────────────────────────────
function handleCitySwitch(cityId, cityName) {
  // Hide idle screen
  dismissIdle();

  // Tell iframe to switch city — it will call _setActiveCity()
  const frame = document.getElementById('mainFrame');
  if (frame.contentWindow) {
    frame.contentWindow.postMessage({ type: 'set-city', city_id: cityId }, '*');
  }

  // Update city badge
  if (cityName) {
    _currentCityName = cityName;
  }
  const badge = document.getElementById('city-badge');
  badge.textContent = cityName || cityId;
  badge.classList.remove('hidden');

  const echo = document.getElementById('query-echo');
  echo.textContent = `🏙️ ${cityName || cityId}`;
  echo.classList.remove('hidden');
}

// ── Role switch ─────────────────────────────────────────────────────────────
function handleRoleSwitch(role, district) {
  // Hide idle screen
  dismissIdle();

  updateRoleBadge(role);

  // Tell iframe to switch role
  const frame = document.getElementById('mainFrame');
  if (frame.contentWindow) {
    frame.contentWindow.postMessage({ type: 'role', role: role, district: district || '' }, '*');
  }

  const echo = document.getElementById('query-echo');
  echo.textContent = _ROLE_LABELS[role] || role;
  echo.classList.remove('hidden');
}

function dismissIdle() {
  if (!_firstQuery) return;
  _firstQuery = false;
  const idle = document.getElementById('idleScreen');
  if (idle) {
    idle.classList.add('hiding');
    setTimeout(() => idle.remove(), 500);
  }
}

// ── Session end ──────────────────────────────────────────────────────────────
async function endSession() {
  if (!confirm('Завершить сеанс презентации?')) return;
  try {
    await fetch(`/session/${SID}/end`, { method: 'POST' });
  } catch (e) {}
  handleSessionEnd();
}

function handleSessionEnd() {
  if (_evtSource) { _evtSource.close(); _evtSource = null; }
  setStatus('error', 'Сеанс завершён');
  // Reset to idle — reload page to create new session
  setTimeout(() => { location.href = '/display'; }, 2000);
}

// ── Init ────────────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
