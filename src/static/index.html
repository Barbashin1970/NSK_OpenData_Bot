<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NSK OpenData Bot — Открытые данные Новосибирска</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: { fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] } }
    }
  </script>
  <style>
    .chip { transition: all .15s ease; }
    .chip:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(0,0,0,.15); }
    .chip:active { transform: translateY(0); }
    .topic-card { transition: all .15s ease; }
    .topic-card:hover { transform: translateY(-2px); }
    .topic-card:active { transform: scale(.98); }
    .spinner { animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .fade-in { animation: fadeIn .25s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
    .bar-fill { transition: width .7s cubic-bezier(.4,0,.2,1); }
    .search-glow:focus { box-shadow: 0 0 0 3px rgba(255,255,255,.35); }
    input::placeholder { color: #94a3b8; }

    /* ── Role system ────────────────────────────────────────────────────────── */
    #roleSwitcher { position: relative; }
    #roleBtn {
      display: flex; align-items: center; gap: 6px;
      padding: 7px 11px; background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.22); border-radius: 12px;
      color: white; font-size: 12px; font-weight: 600; cursor: pointer;
      transition: background .15s, border-color .15s; white-space: nowrap;
      line-height: 1;
    }
    #roleBtn:hover { background: rgba(255,255,255,.22); border-color: rgba(255,255,255,.4); }
    #roleBtn .role-arrow { opacity: .6; font-size: 9px; transition: transform .2s; }
    #roleBtn.open .role-arrow { transform: rotate(180deg); }
    .role-dropdown {
      position: absolute; top: calc(100% + 8px); right: 0;
      background: white; border-radius: 16px;
      box-shadow: 0 12px 40px rgba(0,0,0,.18), 0 2px 8px rgba(0,0,0,.08);
      border: 1px solid #e2e8f0;
      min-width: 260px; overflow: hidden; z-index: 200;
      animation: roleDropIn .18s cubic-bezier(.4,0,.2,1);
    }
    @keyframes roleDropIn { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:none; } }
    .role-opt {
      display: flex; align-items: center; gap: 12px;
      padding: 13px 16px; cursor: pointer; transition: background .1s;
      border-bottom: 1px solid #f1f5f9;
    }
    .role-opt:last-child { border-bottom: none; }
    .role-opt:hover { background: #f8fafc; }
    .role-opt.active { background: #eff6ff; }
    .role-opt .role-icon { font-size: 22px; flex-shrink: 0; width: 30px; text-align: center; }
    .role-opt .role-info { flex: 1; }
    .role-opt .role-name { font-weight: 700; font-size: 13px; color: #1e293b; }
    .role-opt .role-desc { font-size: 11px; color: #94a3b8; margin-top: 1px; line-height: 1.3; }
    .role-opt.active .role-name { color: #1d4ed8; }
    .role-opt .role-check { color: #1d4ed8; font-size: 14px; flex-shrink: 0; }

    /* ── Role dashboard ─────────────────────────────────────────────────────── */
    .dash-kpi { transition: box-shadow .15s, transform .15s; cursor: default; }
    .dash-kpi:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0,0,0,.08); }
  </style>
</head>
<body class="min-h-screen bg-slate-50 font-sans text-slate-900 antialiased">

<!-- ═══════════════════ HEADER ═══════════════════ -->
<header class="bg-gradient-to-br from-blue-900 via-blue-700 to-indigo-700 text-white shadow-xl">
  <div class="max-w-4xl mx-auto px-4 pt-7 pb-8">

    <!-- Branding -->
    <div class="flex items-center justify-between gap-3 mb-7">
      <div class="flex items-center gap-3">
        <div class="w-11 h-11 bg-white/15 rounded-2xl flex items-center justify-center text-2xl shadow-inner">🗂️</div>
        <div>
          <h1 class="text-xl font-bold leading-tight tracking-tight">NSK OpenData Bot</h1>
          <p class="text-blue-300 text-xs mt-0.5">Открытые данные мэрии Новосибирска · opendata.novo-sibirsk.ru</p>
        </div>
      </div>
      <div class="flex items-center gap-2">
        <!-- Role Switcher -->
        <div id="roleSwitcher">
          <button id="roleBtn" onclick="toggleRoleMenu()">
            <span id="roleBtnIcon">👤</span>
            <span id="roleBtnName">Горожанин</span>
            <span class="role-arrow">▾</span>
          </button>
          <div id="roleDropdown" class="role-dropdown hidden"></div>
        </div>
        <!-- 2GIS badge (shown when key is available) -->
        <div id="mapglBadge" class="hidden flex-shrink-0 flex items-center gap-1 px-2.5 py-1.5 bg-emerald-500/20 border border-emerald-400/30 text-emerald-200 text-xs rounded-xl font-medium" title="2GIS API ключ загружен · карты и геокодирование доступны">
          🗺 2GIS
        </div>
        <!-- API Docs -->
        <a href="/docs" target="_blank"
           class="flex-shrink-0 flex items-center gap-1.5 px-3 py-2 bg-white/10 hover:bg-white/20 text-white text-xs font-medium rounded-xl border border-white/20 transition-all whitespace-nowrap"
           title="Открыть документацию REST API (Swagger UI)">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"/>
          </svg>
          API Docs
        </a>
      </div>
    </div>

    <!-- Search bar -->
    <div class="flex gap-3">
      <input
        id="queryInput"
        type="text"
        placeholder="Введите вопрос на русском языке..."
        class="search-glow flex-1 px-5 py-3.5 rounded-2xl bg-white text-slate-900 text-sm shadow-lg focus:outline-none placeholder:text-slate-400 transition-shadow"
        onkeydown="if(event.key==='Enter') ask()"
      >
      <button
        onclick="ask()"
        class="px-6 py-3.5 bg-white text-blue-700 font-semibold text-sm rounded-2xl shadow-lg hover:bg-blue-50 active:scale-95 transition-all whitespace-nowrap"
      >
        Спросить →
      </button>
    </div>

    <!-- Example chips -->
    <div id="chips" class="flex flex-wrap gap-2 mt-4"></div>
  </div>
</header>

<!-- ═══════════════════ ROLE DASHBOARD ═══════════════════ -->
<div id="roleDashboard" class="hidden bg-white border-b border-slate-200 shadow-sm">
  <div class="max-w-4xl mx-auto px-4 py-5">
    <div id="dashContent" class="text-slate-400 text-sm text-center py-2">Загрузка...</div>
  </div>
</div>

<!-- ═══════════════════ MAIN ═══════════════════ -->
<main class="max-w-4xl mx-auto px-4 py-7 space-y-7">

  <!-- Loading indicator -->
  <div id="loadingState" class="hidden items-center gap-3 text-slate-500 text-sm">
    <svg class="spinner w-4 h-4 text-blue-500" fill="none" viewBox="0 0 24 24">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
    </svg>
    <span id="loadingText">Обрабатываю запрос...</span>
  </div>

  <!-- Result area -->
  <div id="resultArea" class="hidden"></div>

  <!-- Topics section -->
  <section>
    <h2 class="text-xs font-semibold uppercase tracking-widest text-slate-400 mb-3">Доступные наборы данных</h2>
    <div id="topicsGrid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-3">
      <div class="col-span-full flex items-center justify-center gap-2 text-slate-400 text-sm py-6">
        <svg class="spinner w-4 h-4" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
        </svg>
        Загрузка...
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="text-center text-xs text-slate-400 pb-4 space-y-1">
    <p>Данные: <a href="http://opendata.novo-sibirsk.ru" target="_blank" class="hover:text-blue-500 transition-colors">opendata.novo-sibirsk.ru</a> · Отключения: <a href="http://051.novo-sibirsk.ru" target="_blank" class="hover:text-blue-500 transition-colors">051.novo-sibirsk.ru</a></p>
    <p>NSK OpenData Bot · ЦИИ НГУ · <a href="/docs" target="_blank" class="hover:text-blue-500 transition-colors">API Docs ↗</a> · <span id="footerTime"></span></p>
  </footer>

</main>

<!-- ═══════════════════ SCRIPT ═══════════════════ -->
<script>

// ─── Example queries ────────────────────────────────────────────────────────
// ─── Role config ──────────────────────────────────────────────────────────────
const ROLES = {
  citizen:  { icon: '👤', name: 'Горожанин',             desc: 'Ежедневные запросы для жителей города' },
  official: { icon: '🏙️', name: 'Служащий умного города', desc: 'Аналитика по районам для сотрудников мэрии' },
  mayor:    { icon: '🏛️', name: 'Мэр',                   desc: 'Сводные KPI и принятие решений по всему городу' },
};

let currentRole = localStorage.getItem('nsk_role') || 'citizen';

// ─── Role-specific chips ───────────────────────────────────────────────────────
// geo: true — запрос возвращает список объектов с адресами → появится кнопка «На карте»
const ROLE_CHIPS = {
  citizen: [
    {q: "нет горячей воды"},
    {q: "отключения электричества сейчас"},
    {q: "топ-5 аптек", geo: true},
    {q: "аптеки в Центральном районе", geo: true},
    {q: "библиотеки для детей", geo: true},
    {q: "нет горячей воды в Ленинском районе"},
    {q: "отключение отопления сегодня"},
    {q: "качество воздуха в городе"},
    {q: "погода в Академгородке"},
    {q: "погода в Кольцово"},
    {q: "как проехать из Академгородка в Дзержинский район"},
    {q: "риски для жизни в городе"},
    {q: "детские спортивные организации", geo: true},
    {q: "школы в Советском районе", geo: true},
    {q: "камеры видеофиксации", geo: true},
    {q: "что ты умеешь"},
  ],
  official: [
    {q: "аварийные отключения ЖКХ сейчас"},
    {q: "плановые отключения на неделю"},
    {q: "отключения тепла сейчас"},
    {q: "отключения воды сейчас"},
    {q: "история отключений за неделю"},
    {q: "превышение ПДК по PM2.5"},
    {q: "качество воздуха по всем районам"},
    {q: "динамика PM2.5 за неделю"},
    {q: "сколько парковок по районам"},
    {q: "школы по районам"},
    {q: "аптеки в Ленинском районе", geo: true},
    {q: "библиотеки города", geo: true},
    {q: "культурные организации", geo: true},
    {q: "камеры фиксации нарушений", geo: true},
  ],
  mayor: [
    {q: "отключения ЖКХ сейчас"},
    {q: "риски для жизни в городе"},
    {q: "качество воздуха в городе"},
    {q: "динамика качества воздуха"},
    {q: "история отключений за неделю"},
    {q: "школы по районам"},
    {q: "сколько парковок по районам"},
    {q: "топ-5 аптек", geo: true},
    {q: "культурные организации", geo: true},
    {q: "аптеки в Центральном районе", geo: true},
    {q: "камеры видеофиксации на дорогах", geo: true},
  ],
};

function buildChips() {
  const el = document.getElementById('chips');
  const chips = ROLE_CHIPS[currentRole] || ROLE_CHIPS.citizen;
  const hasKey = Boolean(_mapglKey);
  el.innerHTML = chips.map(item => {
    const q = item.q;
    const geo = item.geo && hasKey;
    const cls = geo
      ? 'bg-blue-500/20 hover:bg-blue-500/35 text-blue-100 border border-blue-400/30 hover:border-blue-400/60'
      : 'bg-white/15 hover:bg-white/25 text-white border border-white/20';
    const label = geo ? `📍 ${q}` : q;
    return `<button class="chip px-3 py-1.5 ${cls} text-xs rounded-full cursor-pointer" data-query="${esc(q)}" title="${geo ? 'Результат можно показать на карте 2GIS' : ''}">${label}</button>`;
  }).join('');
  el.querySelectorAll('[data-query]').forEach(btn =>
    btn.addEventListener('click', () => setQuery(btn.dataset.query))
  );
}

// ─── Role system ──────────────────────────────────────────────────────────────
function updateRoleBtn() {
  const r = ROLES[currentRole];
  document.getElementById('roleBtnIcon').textContent = r.icon;
  document.getElementById('roleBtnName').textContent = r.name;
}

function setRole(role) {
  currentRole = role;
  localStorage.setItem('nsk_role', role);
  document.getElementById('roleDropdown').classList.add('hidden');
  document.getElementById('roleBtn').classList.remove('open');
  updateRoleBtn();
  buildChips();
  const dash = document.getElementById('roleDashboard');
  if (role === 'official' || role === 'mayor') {
    dash.classList.remove('hidden');
    loadRoleDashboard();
  } else {
    dash.classList.add('hidden');
  }
}

function toggleRoleMenu() {
  const dd = document.getElementById('roleDropdown');
  const btn = document.getElementById('roleBtn');
  const isOpen = !dd.classList.contains('hidden');
  if (isOpen) {
    dd.classList.add('hidden');
    btn.classList.remove('open');
  } else {
    dd.innerHTML = Object.entries(ROLES).map(([key, r]) => `
      <div class="role-opt${key === currentRole ? ' active' : ''}" onclick="setRole('${key}')">
        <span class="role-icon">${r.icon}</span>
        <div class="role-info">
          <div class="role-name">${r.name}</div>
          <div class="role-desc">${r.desc}</div>
        </div>
        ${key === currentRole ? '<span class="role-check">✓</span>' : ''}
      </div>
    `).join('');
    dd.classList.remove('hidden');
    btn.classList.add('open');
  }
}

document.addEventListener('click', function(e) {
  const sw = document.getElementById('roleSwitcher');
  if (sw && !sw.contains(e.target)) {
    document.getElementById('roleDropdown').classList.add('hidden');
    document.getElementById('roleBtn').classList.remove('open');
  }
});

// ─── Role Dashboards ──────────────────────────────────────────────────────────
async function loadRoleDashboard() {
  const dashEl = document.getElementById('dashContent');
  dashEl.innerHTML = '<div class="text-slate-400 text-sm text-center py-3">Загрузка данных...</div>';
  try {
    const fetches = [
      fetch('/ask?q=' + encodeURIComponent('отключения ЖКХ сейчас')),
      fetch('/ecology/status'),
      fetch('/ecology/risks'),
    ];
    if (currentRole === 'official') fetches.push(fetch('/transit/districts'));
    const results = await Promise.all(fetches);
    const power   = results[0].ok ? await results[0].json() : null;
    const eco     = results[1].ok ? await results[1].json() : null;
    const risks   = results[2].ok ? await results[2].json() : null;
    const transit = (currentRole === 'official' && results[3]?.ok) ? await results[3].json() : null;
    dashEl.innerHTML = currentRole === 'mayor'
      ? renderMayorDashboard(power, eco, risks)
      : renderOfficialDashboard(power, eco, risks, transit);
    requestAnimationFrame(() => {
      document.querySelectorAll('.bar-fill[data-pct]').forEach(b => { b.style.width = b.dataset.pct + '%'; });
    });
  } catch(e) {
    dashEl.innerHTML = '<div class="text-red-400 text-sm text-center py-3">Ошибка загрузки данных панели</div>';
  }
}

function _dashAqiClass(aqi) {
  if (!aqi) return { bg:'bg-slate-50', border:'border-slate-200', text:'text-slate-500', label:'—' };
  if (aqi <= 20) return { bg:'bg-emerald-50', border:'border-emerald-200', text:'text-emerald-700', label:'Отличное' };
  if (aqi <= 40) return { bg:'bg-green-50',   border:'border-green-200',   text:'text-green-700',   label:'Хорошее' };
  if (aqi <= 60) return { bg:'bg-yellow-50',  border:'border-yellow-200',  text:'text-yellow-700',  label:'Умеренное' };
  if (aqi <= 80) return { bg:'bg-orange-50',  border:'border-orange-200',  text:'text-orange-700',  label:'Плохое' };
  return               { bg:'bg-red-50',      border:'border-red-200',     text:'text-red-700',     label:'Опасное' };
}

function renderTransitWidget(transit) {
  if (!transit || transit.error || !transit.rows?.length) {
    return `<div class="bg-slate-50 border border-slate-200 rounded-2xl px-4 py-3 text-xs text-slate-400 flex items-center gap-2">
      🚌 <span>Данные об остановках не загружены —
        <button class="text-blue-500 hover:underline" onclick="askNow('остановки по районам')">загрузить</button>
      </span>
    </div>`;
  }
  const rows = transit.rows;
  const total = transit.total_stops || rows.reduce((s,r)=>s+r.stops_count,0);
  const maxVal = Math.max(...rows.map(r => r.stops_count), 1);
  const barsHtml = rows.slice(0, 10).map(r => {
    const pct = Math.round(r.stops_count / maxVal * 100);
    const dist = (r.district || '').replace(' район','').replace('Центральный','Централ.');
    return `<div class="flex items-center gap-2">
      <span class="text-xs text-slate-500 w-20 truncate flex-shrink-0" title="${esc(r.district||'')}">${esc(dist)}</span>
      <div class="flex-1 bg-slate-100 rounded-full h-1.5 overflow-hidden">
        <div class="bar-fill bg-gradient-to-r from-violet-400 to-indigo-400 h-1.5 rounded-full w-0" data-pct="${pct}"></div>
      </div>
      <span class="text-xs font-semibold text-slate-600 w-6 text-right flex-shrink-0">${r.stops_count}</span>
    </div>`;
  }).join('');
  return `
    <div class="bg-white rounded-2xl border border-slate-200 overflow-hidden">
      <div class="px-4 py-3 border-b border-slate-100 flex justify-between items-center">
        <span class="text-xs font-semibold uppercase tracking-widest text-slate-400">🚌 Остановки транспорта по районам</span>
        <span class="text-xs text-slate-400">${total} всего · <button class="text-blue-600 hover:underline" onclick="askNow('остановки по районам')">детали →</button></span>
      </div>
      <div class="px-4 py-3 space-y-2">${barsHtml}</div>
    </div>`;
}

function renderOfficialDashboard(power, eco, risks, transit) {
  const pm = power?.power_meta || {};
  const activeH  = pm.active_houses  || 0;
  const plannedH = pm.planned_houses || 0;
  const ecoRows  = eco?.rows || [];
  const aqis     = ecoRows.map(r => r.aqi).filter(v => v != null);
  const avgAqi   = aqis.length ? Math.round(aqis.reduce((a,b)=>a+b,0)/aqis.length) : null;
  const riskCount = risks?.count || 0;
  const ac = _dashAqiClass(avgAqi);

  const kpis = [
    { icon:'🔴', label:'Аварийных домов',  val: activeH.toLocaleString('ru-RU'),
      color:'text-red-600',    bg:'bg-red-50',    border:'border-red-200',    note:'по всем видам ЖКХ' },
    { icon:'🟡', label:'Плановых домов',   val: plannedH.toLocaleString('ru-RU'),
      color:'text-amber-600',  bg:'bg-amber-50',  border:'border-amber-200',  note:'запланированные' },
    { icon:'🍃', label:'AQI (средний)',    val: avgAqi != null ? String(avgAqi) : '—',
      color: ac.text, bg: ac.bg, border: ac.border, note: ac.label },
    { icon:'⚠️', label:'Активных рисков', val: String(riskCount),
      color: riskCount > 0 ? 'text-amber-700' : 'text-emerald-600',
      bg:    riskCount > 0 ? 'bg-amber-50'    : 'bg-emerald-50',
      border:riskCount > 0 ? 'border-amber-200' : 'border-emerald-200',
      note:  riskCount > 0 ? 'требуют внимания' : 'рисков нет' },
  ];

  const kpiHtml = kpis.map(k => `
    <div class="dash-kpi border rounded-2xl p-4 ${k.bg} ${k.border}">
      <div class="flex items-center gap-1.5 mb-2">
        <span class="text-base">${k.icon}</span>
        <span class="text-xs text-slate-500 font-medium leading-tight">${k.label}</span>
      </div>
      <div class="text-3xl font-bold ${k.color} leading-none tracking-tight">${k.val}</div>
      <div class="text-xs text-slate-400 mt-1">${k.note}</div>
    </div>
  `).join('');

  const pwrRows = (power?.rows || []).filter(r => r.group_type === 'active').slice(0, 5);
  const pwrTable = pwrRows.length ? `
    <div class="bg-white rounded-2xl border border-slate-200 overflow-hidden">
      <div class="px-4 py-3 border-b border-slate-100 flex justify-between items-center">
        <span class="text-xs font-semibold uppercase tracking-widest text-slate-400">Аварийные отключения · топ по районам</span>
        <button class="text-xs text-blue-600 hover:underline" onclick="askNow('аварийные отключения ЖКХ сейчас')">Подробнее →</button>
      </div>
      <table class="w-full">
        <tbody>${pwrRows.map(r => `
          <tr class="border-b border-slate-50 last:border-0 hover:bg-slate-50 transition-colors">
            <td class="px-4 py-2.5 text-xs text-slate-500 w-28">${esc((r.utility||'').split(' ')[0])}</td>
            <td class="px-4 py-2.5 text-sm text-slate-700 font-medium">${esc(r.district||'—')}</td>

function setQuery(q) {
  const input = document.getElementById('queryInput');
  const hadText = input.value.trim().length > 0;
  input.value = q;
  input.focus();
  // Если поле было пустым — сразу отправляем; если уже было что-то напечатано — только подставляем текст
  if (!hadText) {
    ask();
  }
}

function askNow(q) {
  document.getElementById('queryInput').value = q;
  ask();
}

// ─── Ask ─────────────────────────────────────────────────────────────────────
async function ask() {
  const q = document.getElementById('queryInput').value.trim();
  if (!q) return;

  // Reset pagination for a fresh query
  _pageQuery  = q;
  _pageOffset = 0;
  _pageSize   = 20;

  setLoading(q);

  try {
    const resp = await fetch('/ask?q=' + encodeURIComponent(q));
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    renderResult(data, q);
  } catch (e) {
    showError('Ошибка соединения с сервером. Проверьте, что бот запущен: <code class="bg-red-100 px-1 rounded">bot serve</code>');
  }
}

function setLoading(q) {
  _resetMap();
  document.getElementById('loadingState').className = 'flex items-center gap-3 text-slate-500 text-sm';
  document.getElementById('loadingText').textContent = `Ищу ответ на: «${q}»`;
  document.getElementById('resultArea').className = 'hidden';
}

function showError(html) {
  document.getElementById('loadingState').className = 'hidden';
  const el = document.getElementById('resultArea');
  el.className = 'fade-in bg-red-50 border border-red-200 rounded-2xl p-5 text-red-700 text-sm';
  el.innerHTML = `<strong class="font-semibold">Ошибка:</strong> ${html}`;
}

// ─── Render result ────────────────────────────────────────────────────────────
function renderResult(data, query) {
  document.getElementById('loadingState').className = 'hidden';
  const el = document.getElementById('resultArea');

  if (data.error) {
    el.className = 'fade-in bg-amber-50 border border-amber-200 rounded-2xl p-5';
    el.innerHTML = `
      <p class="text-amber-800 font-semibold mb-1.5">⚠ Не удалось найти ответ</p>
      <p class="text-amber-700 text-sm">${esc(data.error)}</p>
      ${data.available_topics ? `<p class="text-slate-500 text-xs mt-3">Попробуйте: ${data.available_topics.slice(0,5).join(', ')}</p>` : ''}
    `;
    return;
  }

  el.className = 'fade-in space-y-4';
  const op = data.operation;

  let html = metaHeader(data);

  if      (op === 'COUNT')                     html += renderCount(data);
  else if (op === 'GROUP')                     html += renderGroup(data);
  else if (op === 'TOP_N' || op === 'FILTER')  html += renderTable(data);
  else if (op && op.startsWith('POWER_'))      html += renderPower(data);
  else if (op && op.startsWith('ECO_'))        html += renderEcology(data);
  else if (op === 'INFO')                      html += renderInfo(data);
  else if (op === 'DISTRICTS')                 html += renderDistricts(data);
  else if (op === 'UNKNOWN')                   html += renderUnknown(data);
  else                                         html += renderTable(data);

  el.innerHTML = html;

  // Animate bar fills after render
  requestAnimationFrame(() => {
    document.querySelectorAll('.bar-fill[data-pct]').forEach(bar => {
      bar.style.width = bar.dataset.pct + '%';
    });
  });

  // Map button for table results
  if (query) maybeShowMapBtn(data, query);
}

// ─── GROUP ────────────────────────────────────────────────────────────────────
function renderGroup(data) {
  const rows = data.rows || [];
  if (!rows.length) return emptyState();
  const max = Math.max(...rows.map(r => r['количество'] || 0), 1);
  const total = data.count || rows.reduce((s, r) => s + (r['количество'] || 0), 0);

  const rowsHtml = rows.map((r, i) => {
    const d = r['район'] || '—';
    const n = r['количество'] || 0;
    const pct = Math.round(n / max * 100);
    const rank = i < 3 ? ['🥇','🥈','🥉'][i] : `${i+1}`;
    return `
      <tr class="hover:bg-slate-50 transition-colors border-b border-slate-50 last:border-0">
        <td class="py-3 px-4 text-sm text-slate-400 w-8 text-center">${rank}</td>
        <td class="py-3 px-4 text-sm text-slate-700 font-medium">${esc(d)}</td>
        <td class="py-3 px-4 w-1/3">
          <div class="flex items-center gap-3">
            <div class="flex-1 bg-slate-100 rounded-full h-2 overflow-hidden">
              <div class="bar-fill bg-gradient-to-r from-blue-500 to-indigo-500 h-2 rounded-full w-0" data-pct="${pct}"></div>
            </div>
            <span class="text-sm font-semibold text-slate-700 w-12 text-right">${n}</span>
          </div>
        </td>
      </tr>
    `;
  }).join('');

  return `
    <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
      <div class="px-5 py-3.5 border-b border-slate-100 flex justify-between items-center">
        <span class="text-xs font-semibold uppercase tracking-widest text-slate-400">По районам</span>
        <span class="text-xs text-slate-400">Итого: <strong class="text-slate-600">${Number(total).toLocaleString('ru-RU')}</strong></span>
      </div>
      <table class="w-full">
        <tbody>${rowsHtml}</tbody>
      </table>
    </div>
  `;
}

  район:'Район', количество:'Кол-во',
};

function colLabel(c) { return COL_LABELS[c] || c; }

function renderTable(data) {
  const rows = data.rows || [];
  const cols = data.columns || [];
  if (!rows.length) return emptyState();

  const count = data.count ?? rows.length;
  const shown = rows.length;

  const headCells = cols.map(c =>
    `<th class="text-left text-xs font-semibold uppercase tracking-wider text-slate-400 px-4 py-3 border-b border-slate-100 whitespace-nowrap">${colLabel(c)}</th>`
  ).join('');

  const body = rows.map(r => {
    const cells = cols.map(c => {
      const raw = r[c] ?? '';
      let val;
      if (c === 'Site' && raw && raw !== '—') {
        val = `<a href="${esc(raw)}" target="_blank" rel="noopener" class="text-blue-600 hover:underline">${esc(raw)}</a>`;
      } else if (c === 'Phone' && raw) {
        val = `<a href="tel:${esc(raw)}" class="text-slate-600 hover:text-blue-600">${esc(String(raw))}</a>`;
      } else {
        val = `<span class="text-slate-700">${esc(String(raw === null || raw === undefined ? '—' : raw))}</span>`;
      }
      return `<td class="px-4 py-2.5 text-sm whitespace-nowrap">${val}</td>`;
    }).join('');
    return `<tr class="border-b border-slate-50 last:border-0 hover:bg-slate-50/80 transition-colors">${cells}</tr>`;
  }).join('');

  // Pagination bar
  const totalShown = _pageOffset + shown;
  const hasPrev = _pageOffset > 0;
  const hasNext = totalShown < count;
  let moreHtml = '';
  if (hasPrev || hasNext) {
    const prevBtn = hasPrev
      ? `<button onclick="fetchPage(${Math.max(0, _pageOffset - _pageSize)})"
           class="px-3 py-1.5 rounded-lg border border-slate-200 bg-white hover:bg-slate-50 text-xs text-slate-600 font-medium transition-colors">← Назад</button>`
      : '';
    const nextBtn = hasNext
      ? `<button onclick="fetchPage(${_pageOffset + _pageSize})"
           class="px-3 py-1.5 rounded-lg border border-blue-200 bg-blue-50 hover:bg-blue-100 text-xs text-blue-700 font-medium transition-colors">Ещё ${Math.min(_pageSize, count - totalShown)} объектов →</button>`
      : '';
    const info = `<span class="text-xs text-slate-400">${_pageOffset + 1}–${totalShown} из ${Number(count).toLocaleString('ru-RU')}</span>`;
    moreHtml = `
      <div class="px-5 py-3 bg-slate-50 border-t border-slate-100 flex items-center justify-between gap-3 flex-wrap">
        ${info}
        <div class="flex gap-2">${prevBtn}${nextBtn}</div>
      </div>`;
  }

  const noteHtml = data.note
    ? `<div class="mt-3 bg-amber-50 border border-amber-200 rounded-xl px-4 py-3 text-sm text-amber-700">ℹ️ ${esc(data.note)}</div>`
    : '';

  return `
    <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
      <div class="px-5 py-3.5 border-b border-slate-100 flex justify-between items-center">
        <span class="text-xs font-semibold uppercase tracking-widest text-slate-400">
          ${data.operation === 'TOP_N' ? `Топ-${shown}` : 'Результаты'}
        </span>
        <span class="text-xs text-slate-400">
          Найдено: <strong class="text-slate-600">${Number(count).toLocaleString('ru-RU')}</strong>
          ${count > shown ? ` · показано ${shown}` : ''}
        </span>
      </div>
      <div class="overflow-x-auto">
        <table class="min-w-full">
          <thead><tr>${headCells}</tr></thead>
          <tbody>${body}</tbody>
        </table>
      </div>
      ${moreHtml}
    </div>
    ${noteHtml}
  `;
}

    'теплоснабж':   'Теплоснабжение',
    'горяч':        'Горячее водоснабжение',
    'холодн':       'Холодное водоснабжение',
    'газоснабж':    'Газоснабжение',
  };
  const utilityRaw  = (data.extra_filters || {}).utility || '';
  const utilityTag  = utilityRaw
    ? (Object.entries(utilityLabels).find(([k]) => utilityRaw.includes(k)) || [null,''])[1]
    : 'Все коммунальные ресурсы';

  return `
    <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
      <div class="px-5 py-3.5 border-b border-slate-100 flex justify-between items-center flex-wrap gap-2">
        <div class="flex flex-col">
          <span class="text-xs font-semibold uppercase tracking-widest text-slate-400">${titles[op] || op}</span>
          ${utilityTag ? `<span class="text-xs text-blue-600 mt-0.5">${utilityTag}</span>` : ''}
        </div>
        <span class="text-xs text-slate-400">${rows.length} записей</span>
      </div>
      ${metaBar}
      <div class="overflow-x-auto">
        <table class="w-full">
          <thead>${thead}</thead>
          <tbody>${tableBody}</tbody>
        </table>
      </div>
    </div>
  `;
}

// ─── ECOLOGY ──────────────────────────────────────────────────────────────────
function aqiColor(aqi) {
  if (aqi == null) return { bg: 'bg-slate-100', text: 'text-slate-500', label: '—' };
  if (aqi <= 20)   return { bg: 'bg-emerald-100', text: 'text-emerald-700', label: 'Отличное' };
  if (aqi <= 40)   return { bg: 'bg-green-100',   text: 'text-green-700',   label: 'Хорошее' };
  if (aqi <= 60)   return { bg: 'bg-yellow-100',  text: 'text-yellow-700',  label: 'Умеренное' };
  if (aqi <= 80)   return { bg: 'bg-orange-100',  text: 'text-orange-700',  label: 'Плохое' };
  return                  { bg: 'bg-red-100',     text: 'text-red-700',     label: 'Опасное' };
}

// ─── Life Indices (вычисляются client-side из ECO_STATUS rows) ────────────────
function computeLifeIndices(rows) {
  if (!rows || !rows.length) return null;
  const n = v => v != null ? Number(v) : null;
  const vals = key => rows.map(r => n(r[key])).filter(v => v !== null);

  const temps = vals('temperature_c'), winds = vals('wind_speed_ms');
  const pm25s = vals('pm25'), aqis = vals('aqi');

  const avg = lst => lst.length ? lst.reduce((a,b)=>a+b,0)/lst.length : null;
  const min = lst => lst.length ? Math.min(...lst) : null;

  const avgT = avg(temps), avgW = avg(winds), avgP = avg(pm25s), avgA = avg(aqis);
  const minT = min(temps);

  // Индекс автомобилиста: 0=безопасно, 10=очень опасно
  let driver = 0;
  if (avgT != null) {
    if (avgT >= -3 && avgT <= 2) driver += 5;    // чёрный лёд
    else if (avgT < -3 && avgT >= -10) driver += 2; // обычный лёд
    if (avgT < -25) driver += 3;
    else if (avgT < -20) driver += 2;
    else if (avgT < -10) driver += 1;
  }
  if (avgW != null && avgW > 12) driver += 2;
  else if (avgW != null && avgW > 8) driver += 1;
  driver = Math.min(10, Math.max(0, Math.round(driver)));
  const driverLabel = driver <= 2 ? 'Безопасно' : driver <= 5 ? 'Осторожно' : driver <= 7 ? 'Опасно' : 'Крайне опасно';
  const driverColor = driver <= 2 ? 'text-emerald-600' : driver <= 5 ? 'text-yellow-600' : driver <= 7 ? 'text-orange-600' : 'text-red-600';
  const driverBg    = driver <= 2 ? 'bg-emerald-50 border-emerald-200' : driver <= 5 ? 'bg-yellow-50 border-yellow-200' : driver <= 7 ? 'bg-orange-50 border-orange-200' : 'bg-red-50 border-red-200';

  // Индекс прогулки: 0=сиди дома, 10=идеально
  let walk = 10;
  if (avgP != null) {
    if (avgP > 35) walk -= 4;
    else if (avgP > 25) walk -= 2;
    else if (avgP > 15) walk -= 1;
  }
  if (avgA != null) {
    if (avgA > 80) walk -= 3;
    else if (avgA > 60) walk -= 2;
    else if (avgA > 40) walk -= 1;
  }
  if (avgT != null) {
    if (avgT < -25) walk -= 3;
    else if (avgT < -15) walk -= 2;
    else if (avgT < -5) walk -= 1;
  }
  if (avgW != null && avgW > 10) walk -= 1;
  walk = Math.min(10, Math.max(0, Math.round(walk)));
  const walkLabel = walk >= 8 ? 'Отличные условия' : walk >= 6 ? 'Хорошие условия' : walk >= 4 ? 'Ограниченно' : 'Рекомендуется остаться дома';
  const walkColor = walk >= 8 ? 'text-emerald-600' : walk >= 6 ? 'text-green-600' : walk >= 4 ? 'text-yellow-600' : 'text-red-600';
  const walkBg    = walk >= 8 ? 'bg-emerald-50 border-emerald-200' : walk >= 6 ? 'bg-green-50 border-green-200' : walk >= 4 ? 'bg-yellow-50 border-yellow-200' : 'bg-red-50 border-red-200';

  // Индекс коммунального напряжения: 0=норма, 10=критично
  let utility = 0;
  if (minT != null) {
    if (minT < -30) utility += 4;
    else if (minT < -20) utility += 3;
    else if (minT < -10) utility += 2;
    else if (minT < -5) utility += 1;
  }
  if (avgW != null && avgP != null && avgW < 1.5 && avgP > 20) utility += 2;
  utility = Math.min(10, Math.max(0, Math.round(utility)));
  const utilLabel = utility <= 2 ? 'Норма' : utility <= 5 ? 'Повышенная нагрузка' : utility <= 7 ? 'Высокое напряжение' : 'Критично';
  const utilColor = utility <= 2 ? 'text-emerald-600' : utility <= 5 ? 'text-yellow-600' : utility <= 7 ? 'text-orange-600' : 'text-red-600';
  const utilBg    = utility <= 2 ? 'bg-emerald-50 border-emerald-200' : utility <= 5 ? 'bg-yellow-50 border-yellow-200' : utility <= 7 ? 'bg-orange-50 border-orange-200' : 'bg-red-50 border-red-200';

  return {
    driver:  { score: driver,  label: driverLabel,  color: driverColor,  bg: driverBg,  icon: '🚗', name: 'Индекс водителя' },
    walk:    { score: walk,    label: walkLabel,    color: walkColor,    bg: walkBg,    icon: '🚶', name: 'Индекс прогулки' },
    utility: { score: utility, label: utilLabel,    color: utilColor,    bg: utilBg,    icon: '🏗️', name: 'Коммунальное напряжение' },
  };
}

function renderLifeIndices(indices) {
  if (!indices) return '';
  return `
    <div class="grid grid-cols-3 gap-3 mb-4">
      ${['driver','walk','utility'].map(key => {
        const ix = indices[key];
        const barPct = key === 'walk'
          ? ix.score * 10          // walk: higher = better, bar goes right
          : ix.score * 10;         // driver/utility: higher = worse, still visual scale
        const barClass = key === 'walk'
          ? (ix.score >= 7 ? 'bg-emerald-400' : ix.score >= 5 ? 'bg-yellow-400' : 'bg-red-400')
          : (ix.score <= 3 ? 'bg-emerald-400' : ix.score <= 6 ? 'bg-yellow-400' : 'bg-red-400');
        const scoreDisplay = key === 'walk'
          ? `${ix.score}/10`
          : `${ix.score}/10`;
        return `
          <div class="border rounded-2xl p-4 ${ix.bg} flex flex-col gap-1">
            <div class="flex items-center justify-between">
              <span class="text-lg">${ix.icon}</span>
              <span class="text-xl font-bold ${ix.color}">${scoreDisplay}</span>
            </div>
            <div class="text-xs font-semibold text-slate-700 leading-tight">${ix.name}</div>
            <div class="text-xs ${ix.color} font-medium">${ix.label}</div>
            <div class="mt-1 h-1.5 bg-white/60 rounded-full overflow-hidden">
              <div class="${barClass} h-full rounded-full transition-all" style="width:${barPct}%"></div>
            </div>
          </div>`;
      }).join('')}
    </div>`;
}

// ─── Risk Cards ────────────────────────────────────────────────────────────────
function renderRiskCards(risks) {
  if (!risks || !risks.length) return '';
  const cards = risks.map(r => {
    const isCritical = r.severity === 'critical';
    const bg    = isCritical ? 'bg-red-50 border-red-200'     : 'bg-amber-50 border-amber-200';
    const hdr   = isCritical ? 'bg-red-100/60 border-red-200' : 'bg-amber-100/60 border-amber-200';
    const badge = isCritical
      ? `<span class="bg-red-100 text-red-700 border border-red-300 text-xs px-2 py-0.5 rounded-full font-bold">Критично</span>`
      : `<span class="bg-amber-100 text-amber-700 border border-amber-300 text-xs px-2 py-0.5 rounded-full font-bold">Внимание</span>`;
    return `
      <div class="border rounded-2xl overflow-hidden ${bg}">
        <div class="px-4 py-3 border-b ${hdr} flex items-center gap-3">
          <span class="text-xl">${r.icon || '⚠️'}</span>
          <div class="flex-1 min-w-0">
            <div class="font-semibold text-sm text-slate-800 leading-tight">${esc(r.title)}</div>
            <div class="text-xs text-slate-500 mt-0.5">${esc(r.metrics || '')}</div>
          </div>
          ${badge}
        </div>
        <div class="px-4 py-3 grid grid-cols-1 sm:grid-cols-2 gap-3 text-xs">
          <div>
            <div class="font-semibold text-slate-500 uppercase tracking-wider text-[10px] mb-1">👤 Горожанам</div>
            <p class="text-slate-700 leading-relaxed">${esc(r.citizen || '')}</p>
          </div>
          <div>
            <div class="font-semibold text-slate-500 uppercase tracking-wider text-[10px] mb-1">🏛️ Службам города</div>
            <p class="text-slate-700 leading-relaxed">${esc(r.official || '')}</p>
          </div>
        </div>
      </div>`;
  }).join('');
  return `
    <div class="space-y-3">
      <div class="flex items-center gap-2">
        <span class="text-xs font-semibold uppercase tracking-widest text-slate-400">Активные риски</span>
        <span class="bg-red-100 text-red-600 text-xs px-2 py-0.5 rounded-full font-bold">${risks.length}</span>
      </div>
      ${cards}
    </div>`;
}

function renderEcology(data) {

        <p class="text-xs text-slate-400 mt-2">Попробуйте <code class="bg-slate-100 px-1 rounded">bot ecology update</code> для обновления</p>
      </div>`;
  }

  // ── ECO_RISKS ─────────────────────────────────────────────────────────────
  if (op === 'ECO_RISKS') {
    const risks = data.risks || rows;  // /ask отдаёт risks, прямой /ecology/risks — тоже
    if (!risks.length) {
      return `
        <div class="bg-emerald-50 border border-emerald-200 rounded-2xl p-8 text-center">
          <span class="text-3xl block mb-2">✅</span>
          <p class="text-emerald-700 font-semibold text-base">Рисков не обнаружено</p>
          <p class="text-sm text-emerald-600 mt-1">Текущие показатели воздуха и погоды в пределах нормы</p>

      <div class="space-y-4">
        ${renderRiskCards(risks)}

      </div>`;
  }

  // ── ECO_STATUS ────────────────────────────────────────────────────────────
  if (op === 'ECO_STATUS') {

    const risks   = data.risks || [];   // backend включает risks в ECO_STATUS ответ

    const cards = rows.map(r => {
      const c    = aqiColor(r.aqi);
      const pm25 = r.pm25  != null ? Number(r.pm25).toFixed(1)           : '—';
      const temp = r.temperature_c != null
        ? (r.temperature_c > 0 ? '+' : '') + Number(r.temperature_c).toFixed(1) + '°'
        : '—';
      const wind = r.wind_speed_ms != null ? Number(r.wind_speed_ms).toFixed(1) + ' м/с' : '—';
      const hum  = r.humidity_pct != null  ? Number(r.humidity_pct).toFixed(0)  + '%'    : '—';
      const dist = (r.district || '').replace(' район', '');
      return `
        <div class="bg-white border border-slate-200 rounded-2xl p-4 hover:shadow-md transition-shadow cursor-pointer"
             onclick="setQuery('качество воздуха в ${esc(dist)}')">
          <div class="flex items-start justify-between mb-1">
            <div class="text-sm font-semibold text-slate-800 leading-tight">${esc(dist)}</div>
            <span class="${c.bg} ${c.text} text-xs font-bold px-2 py-0.5 rounded-full whitespace-nowrap ml-1">
              AQI ${r.aqi ?? '—'}

            <span class="text-slate-400">Ветер</span><span class="font-medium text-slate-700">${wind}</span>
            <span class="text-slate-400">Влажн.</span><span class="font-medium text-slate-700">${hum}</span>
          </div>
        </div>`;

  }

  // ── ECO_PDK ───────────────────────────────────────────────────────────────
  if (op === 'ECO_PDK') {
    const threshold = data.threshold || 35;
    if (!rows.length) {
      return `
        <div class="bg-emerald-50 border border-emerald-200 rounded-2xl p-8 text-center">

          Порог WHO: PM2.5 &gt; ${threshold} мкг/м³ (среднесуточный). ⏱ ${metaTs}
        </div>
      </div>`;
  }

  // ── ECO_HISTORY ───────────────────────────────────────────────────────────
  if (op === 'ECO_HISTORY') {
    const days = data.days || 7;
    const head = `<tr>
      <th class="text-left text-xs text-slate-400 px-4 py-3 border-b border-slate-100">День</th>

      <th class="text-left text-xs text-slate-400 px-4 py-3 border-b border-slate-100">AQI ср.</th>

      let risks = '';
      if (r.cold_risk)  risks += `<span class="inline-flex items-center gap-1 text-xs bg-blue-100 text-blue-800 px-2 py-0.5 rounded-full">🥶 Сильный мороз</span> `;
      if (r.ice_risk)   risks += `<span class="inline-flex items-center gap-1 text-xs bg-amber-100 text-amber-800 px-2 py-0.5 rounded-full">🧊 Риск гололёда</span> `;
      if (r.snow_risk)  risks += `<span class="inline-flex items-center gap-1 text-xs bg-slate-100 text-slate-700 px-2 py-0.5 rounded-full">❄️ Снегопад</span> `;

      // Цвет карточки по температуре
      const tNum = r.temp_min ?? r.temp_max ?? 0;
      const cardBg = tNum < -20 ? 'bg-blue-50 border-blue-200'
                   : tNum < 0   ? 'bg-slate-50 border-slate-200'
                   : tNum < 10  ? 'bg-green-50 border-green-100'
                   :              'bg-amber-50 border-amber-100';

      return `
        <div class="rounded-2xl border ${cardBg} p-4 flex flex-col gap-2">
          <div class="flex items-center justify-between">
            <span class="text-sm font-semibold text-slate-700">${esc(r.day_name || r.forecast_date)}</span>
            <span class="text-2xl" title="${esc(r.weather_desc || '')}">${esc(r.weather_icon || '🌡')}</span>
          </div>
          <div class="flex items-end gap-3">
            <span class="text-2xl font-bold text-slate-800">${tMax}</span>
            <span class="text-base text-slate-500 mb-0.5">${tMin}</span>
          </div>
          <div class="text-xs text-slate-500">${esc(r.weather_desc || '')}</div>
          <div class="flex gap-3 text-xs text-slate-500">
            <span>💨 ${wind}</span>
            <span>🌧 ${prec}</span>
          </div>
          ${risks ? `<div class="flex flex-wrap gap-1 mt-1">${risks}</div>` : ''}
        </div>`;
    }).join('');

    // Предупреждения для муниципальных служб (из первых 2 дней)
    const warningDays = rows.slice(0, 3);
    const warnings = [];
    if (warningDays.some(r => r.cold_risk))
      warnings.push('❗ Экстремальные морозы ожидаются в ближайшие дни — усилить теплоснабжение социальных объектов, открыть пункты обогрева.');
    if (warningDays.some(r => r.ice_risk))
      warnings.push('⚠️ Риск гололёда по прогнозу — вывести пескоразбрасывающую технику на мосты, перекрёстки, пешеходные зоны у больниц и школ.');
    if (warningDays.some(r => r.snow_risk))
      warnings.push('🌨 Ожидается снегопад — подготовить снегоуборочную технику, скорректировать расписание общественного транспорта.');

    const warningsHtml = warnings.length ? `
      <div class="bg-amber-50 border border-amber-200 rounded-2xl p-4 space-y-2">
        <div class="text-xs font-semibold text-amber-700 uppercase tracking-wide mb-1">Рекомендации для городских служб</div>
        ${warnings.map(w => `<p class="text-sm text-amber-800">${w}</p>`).join('')}
      </div>` : '';

    return `
      <div class="space-y-4">
        <div class="flex items-center gap-2 text-sm text-slate-500">
          <span>📅 Прогноз на ${days} дней${dist}</span>
          <span class="text-xs text-slate-400">· Open-Meteo · обн. каждые 6 ч</span>
        </div>
        <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-3">${cards}</div>
        ${warningsHtml}
      </div>`;
  }

  // Fallback
  return renderTable(data);
}

let _pageQuery = '';       // последний запрос для пагинации
let _pageOffset = 0;       // текущее смещение
let _pageSize  = 20;       // размер страницы

async function fetchPage(offset) {
  const q = _pageQuery;
  if (!q) return;
  _pageOffset = offset;
  _resetMap();   // сбросить стейт карты — новая страница, новые строки
  document.getElementById('loadingState').className = 'flex items-center gap-3 text-slate-500 text-sm';
  document.getElementById('loadingText').textContent = `Загружаю страницу…`;
  document.getElementById('resultArea').className = 'hidden';
  try {
    const url = `/ask?q=${encodeURIComponent(q)}&offset=${offset}&page_size=${_pageSize}`;
    const resp = await fetch(url);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    document.getElementById('loadingState').className = 'hidden';
    renderResult(data, q);
  } catch (e) {
    showError('Ошибка загрузки страницы.');
  }
}

// ─── 2GIS Map ─────────────────────────────────────────────────────────────────
let _mapglKey = null;
let _mapInstance = null;
let _currentMapRows = null;
let _lastMapQuery = '';
let _lastMapCoordsEnriched = false; // true если ответ уже содержит _lat/_lon (камеры)
let _lastPageRows = null;           // строки текущей страницы (для coords_enriched — без ре-фетча)

async function initMapgl() {
  try {
    const r = await fetch('/mapgl-key');
    const d = await r.json();
    if (d.available) {
      _mapglKey = d.key;
      const badge = document.getElementById('mapglBadge');
      if (badge) badge.classList.remove('hidden');
      buildChips(); // перерисовать чипы с подсветкой 📍 гео-запросов
    }
  } catch(e) {}
}

function _resetMap() {
  _currentMapRows = null;
  _lastMapCoordsEnriched = false;
  _lastPageRows = null;
  if (_mapInstance) {
    try { _mapInstance.destroy(); } catch(e) {}
    _mapInstance = null;
  }
}

function maybeShowMapBtn(data, query) {
  if (!_mapglKey) return;
  if (!['FILTER', 'TOP_N'].includes(data.operation)) return;
  if (!data.rows || !data.rows.length) return;
  _lastMapQuery = query;
  _lastMapCoordsEnriched = Boolean(data.coords_enriched);
  _lastPageRows = data.rows;  // сохраняем строки для coords_enriched-сценария
  const el = document.getElementById('resultArea');
  const wrap = document.createElement('div');
  wrap.id = 'mapBtnArea';
  wrap.className = 'flex flex-col gap-3';
  wrap.innerHTML = `
    <div class="flex items-center gap-3">
      <button id="mapToggleBtn"
        class="flex items-center gap-2 px-4 py-2.5 bg-blue-600 hover:bg-blue-700 active:scale-95 text-white text-sm font-semibold rounded-xl transition-all shadow-sm"
        onclick="loadMap()">
        📍 Показать на карте
      </button>
      <span id="mapStatusMsg" class="text-xs text-slate-400 hidden"></span>
    </div>
    <div id="mapPanelWrap" class="hidden"></div>
  `;
  el.appendChild(wrap);
}

async function loadMap() {
  const btn = document.getElementById('mapToggleBtn');
  const panel = document.getElementById('mapPanelWrap');
  const status = document.getElementById('mapStatusMsg');
  if (!btn || !panel) return;

  // Toggle if already loaded
  if (_currentMapRows) {
    panel.classList.toggle('hidden');
    btn.textContent = panel.classList.contains('hidden') ? '📍 Показать на карте' : '🗺 Скрыть карту';
    return;
  }

  btn.disabled = true;
  const _coordsPre = _lastMapCoordsEnriched;
  btn.textContent = _coordsPre ? '⏳ Загрузка...' : '⏳ Геокодирование адресов...';
  status.classList.remove('hidden');
  status.textContent = _coordsPre ? '' : 'Это может занять до 30 с при первом запросе';

  try {
    let rows;
    if (_coordsPre && _lastPageRows) {
      // Координаты уже предзагружены (камеры OSM) — берём строки текущей страницы напрямую
      rows = _lastPageRows.filter(row => row._lat && row._lon);
      status.classList.add('hidden');
    } else {
      // Обычные темы — геокодируем текущую страницу
      const url = '/ask?q=' + encodeURIComponent(_lastMapQuery)
        + '&with_coords=true'
        + `&offset=${_pageOffset}&page_size=${_pageSize}`;
      const r = await fetch(url);
      const d = await r.json();
      rows = (d.rows || []).filter(row => row._lat && row._lon);
    }
    status.classList.add('hidden');

    if (!rows.length) {
      btn.disabled = false;
      btn.textContent = '📍 Координаты не найдены';
      return;
    }

    _currentMapRows = rows;
    btn.disabled = false;
    btn.textContent = `🗺 Скрыть карту`;

    panel.innerHTML = '<div id="map2gis" style="height:420px;border-radius:1rem;overflow:hidden;border:1px solid #e2e8f0;box-shadow:0 1px 8px rgba(0,0,0,.08)"></div>';
    panel.classList.remove('hidden');

    if (!window.mapgl) {
      const s = document.createElement('script');
      s.src = 'https://mapgl.2gis.com/api/js/v1';
      s.onload = _renderMap;
      s.onerror = () => { panel.innerHTML = '<div class="p-4 text-sm text-red-500 bg-red-50 border border-red-200 rounded-xl">Не удалось загрузить MapGL JS — проверьте соединение с интернетом</div>'; };
      document.head.appendChild(s);
    } else {
      _renderMap();
    }
  } catch(e) {
    status.classList.add('hidden');
    btn.disabled = false;
    btn.textContent = '⚠ Ошибка загрузки координат';
  }
}

function _buildMarkerLabel(row) {
  // Камера фиксации (OSM): osm_id, maxspeed, name, ref
  if (row.osm_id !== undefined) {
    const title = row.name || 'Камера фиксации';
    const speed = row.maxspeed ? `<span style="color:#fbbf24">⚡ ${row.maxspeed} км/ч</span>` : '';
    const ref   = row.ref ? `<span style="color:#94a3b8">${row.ref}</span>` : '';
    const parts = [speed, ref].filter(Boolean).join(' · ');
    return `<b style="display:block;margin-bottom:2px">${title}</b>${parts}`;
  }
  // Имя объекта — перебираем известные поля по всем датасетам
  const name = row.Name || row.BiblName || row.SchoolName || row.OrgName
             || row.SportOrgName || row.CultureName || '';
  // Адрес — улица + дом
  const street = row.AdrStreet || row.AdrStr || row.Ulica || row.Street || '';
  const house  = row.AdrDom   || row.Dom    || row.House  || '';
  const addr   = street ? (house ? `${street}, ${house}` : street) : '';
  if (name && addr) return `<b style="display:block;margin-bottom:2px">${name}</b>${addr}`;
  if (name) return `<b>${name}</b>`;
  if (addr) return addr;
  return 'Объект';
}

function _renderMap() {
  const container = document.getElementById('map2gis');
  if (!container || !_currentMapRows || !_mapglKey) return;

  const lats = _currentMapRows.map(r => r._lat);
  const lons = _currentMapRows.map(r => r._lon);
  const centerLat = lats.reduce((a, b) => a + b, 0) / lats.length;
  const centerLon = lons.reduce((a, b) => a + b, 0) / lons.length;

  try {
    _mapInstance = new mapgl.Map('map2gis', {
      center: [centerLon, centerLat],
      zoom: 13,
      key: _mapglKey,
    });

    // Tooltip — плавающий div внутри контейнера карты
    container.style.position = 'relative';
    const tooltip = document.createElement('div');
    tooltip.style.cssText = [
      'position:absolute', 'background:#1e293b', 'color:#e2e8f0',
      'padding:7px 11px', 'border-radius:9px', 'font-size:12px',
      'line-height:1.45', 'pointer-events:none', 'z-index:200',
      'display:none', 'max-width:240px', 'white-space:normal',
      'box-shadow:0 4px 16px rgba(0,0,0,.5)', 'border:1px solid #334155',
    ].join(';');
    container.appendChild(tooltip);

    _currentMapRows.forEach(row => {
      const markerEl = document.createElement('div');
      markerEl.style.cssText =
        'width:20px;height:20px;background:#3b82f6;border-radius:50%;' +
        'border:3px solid #fff;cursor:pointer;' +
        'box-shadow:0 2px 6px rgba(0,0,0,.5);' +
        'transition:transform .12s;flex-shrink:0';

      markerEl.addEventListener('mouseenter', () => {
        markerEl.style.transform = 'scale(1.35)';
        tooltip.innerHTML = _buildMarkerLabel(row);
        tooltip.style.display = 'block';
        const mr = markerEl.getBoundingClientRect();
        const cr = container.getBoundingClientRect();
        // Position tooltip to the right and slightly above marker center
        let x = mr.left - cr.left + mr.width + 8;
        let y = mr.top  - cr.top  + mr.height / 2 - 20;
        // If overflows right edge, show to the left
        if (x + 250 > cr.width) x = mr.left - cr.left - 258;
        // Don't go above container
        if (y < 0) y = 4;
        tooltip.style.left = x + 'px';
        tooltip.style.top  = y + 'px';
      });
      markerEl.addEventListener('mouseleave', () => {
        markerEl.style.transform = '';
        tooltip.style.display = 'none';
      });

      new mapgl.Marker(_mapInstance, { coordinates: [row._lon, row._lat], element: markerEl });
    });
  } catch(e) {
    container.innerHTML = '<div class="p-4 text-sm text-red-500">Ошибка инициализации карты: ' + esc(String(e)) + '</div>';
  }
}

// ─── Init ─────────────────────────────────────────────────────────────────────
updateRoleBtn();
buildChips();
loadTopics();
initMapgl();
document.getElementById('queryInput').focus();
if (currentRole !== 'citizen') {
  document.getElementById('roleDashboard').classList.remove('hidden');
  loadRoleDashboard();
}

// Footer time
(function updateTime() {
  const el = document.getElementById('footerTime');
  if (el) {
    const now = new Date();
    el.textContent = now.toLocaleString('ru-RU', {
      day:'2-digit', month:'long', hour:'2-digit', minute:'2-digit'
    });
  }
  setTimeout(updateTime, 30000);
})();

</script>
