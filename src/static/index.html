<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Сигма — Открытые данные Новосибирска</title>
  <link rel="icon" type="image/svg+xml" href="/static/img/favicon.svg">
  <link rel="icon" type="image/png" href="/static/img/sigma-cat.png">
  <link rel="apple-touch-icon" href="/static/img/sigma-cat.png">
  <link rel="manifest" href="/static/manifest.json">
  <link rel="stylesheet" href="/static/tailwind.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script>
    if (window.tailwind) {
      tailwind.config = {
        theme: { fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] } }
      }
    }
  </script>
  <style>
    .chip { transition: all .15s ease; }
    .chip:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(0,0,0,.15); }
    .chip:active { transform: translateY(0); }
    .topic-card { transition: all .15s ease; }
    .topic-card:hover { transform: translateY(-2px); }
    .topic-card:active { transform: scale(.98); }
    .spinner { animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .fade-in { animation: fadeIn .25s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
    .bar-fill { transition: width .7s cubic-bezier(.4,0,.2,1); }
    .search-glow:focus { box-shadow: 0 0 0 3px rgba(255,255,255,.35); }
    input::placeholder { color: #94a3b8; }

    /* ── Role system ────────────────────────────────────────────────────────── */
    #roleSwitcher { position: relative; }
    #roleBtn {
      display: flex; align-items: center; gap: 6px;
      padding: 7px 11px; background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.22); border-radius: 12px;
      color: white; font-size: 12px; font-weight: 600; cursor: pointer;
      transition: background .15s, border-color .15s; white-space: nowrap;
      line-height: 1;
    }
    #roleBtn:hover { background: rgba(255,255,255,.22); border-color: rgba(255,255,255,.4); }
    #roleBtn .role-arrow { opacity: .6; font-size: 9px; transition: transform .2s; }
    #roleBtn.open .role-arrow { transform: rotate(180deg); }
    .role-dropdown {
      position: absolute; top: calc(100% + 8px); right: 0;
      background: white; border-radius: 16px;
      box-shadow: 0 12px 40px rgba(0,0,0,.18), 0 2px 8px rgba(0,0,0,.08);
      border: 1px solid #e2e8f0;
      min-width: 260px; max-width: calc(100vw - 16px);
      overflow-y: auto; max-height: 75vh; z-index: 200;
      animation: roleDropIn .18s cubic-bezier(.4,0,.2,1);
    }
    @keyframes roleDropIn { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:none; } }
    .role-opt {
      display: flex; align-items: center; gap: 12px;
      padding: 13px 16px; cursor: pointer; transition: background .1s;
      border-bottom: 1px solid #f1f5f9;
    }
    .role-opt:last-child { border-bottom: none; }
    .role-opt:hover { background: #f8fafc; }
    .role-opt.active { background: #eff6ff; }
    .role-opt .role-icon { font-size: 22px; flex-shrink: 0; width: 30px; text-align: center; }
    .role-opt .role-info { flex: 1; }
    .role-opt .role-name { font-weight: 700; font-size: 13px; color: #1e293b; }
    .role-opt .role-desc { font-size: 11px; color: #94a3b8; margin-top: 1px; line-height: 1.3; }
    .role-opt.active .role-name { color: #1d4ed8; }
    .role-opt .role-check { color: #1d4ed8; font-size: 14px; flex-shrink: 0; }

    /* ── Role dashboard ─────────────────────────────────────────────────────── */
    .dash-kpi { transition: box-shadow .15s, transform .15s; cursor: default; }
    .dash-kpi:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0,0,0,.08); }

    /* ── District picker ─────────────────────────────────────────────────────── */
    .role-district-chevron {
      flex-shrink: 0; background: #f1f5f9; border: none; border-radius: 8px;
      color: #64748b; font-size: 18px; line-height: 1; padding: 4px 10px;
      cursor: pointer; transition: background .1s, color .1s;
    }
    .role-district-chevron:hover { background: #dbeafe; color: #1d4ed8; }
    .role-dropdown-header {
      padding: 10px 16px 6px; font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .06em;
      color: #94a3b8; border-bottom: 1px solid #f1f5f9;
    }
    .role-picker-back { background: #f8fafc; }
    .role-picker-back .role-icon { font-size: 16px; color: #64748b; }
    .role-picker-back .role-name { font-size: 12px; color: #64748b; font-weight: 600; }
    .dist-filter-bar {
      display: flex; align-items: center; gap: 6px; flex-wrap: nowrap;
      padding: 6px 8px; background: #f8fafc; border-radius: 10px;
      font-size: 11px; overflow-x: auto; scrollbar-width: none;
    }
    .dist-filter-bar::-webkit-scrollbar { display: none; }
    .dist-filter-tag {
      padding: 3px 10px; border-radius: 99px; font-size: 11px; font-weight: 600;
      cursor: pointer; border: 1px solid transparent; transition: all .12s;
    }
    .dist-filter-tag.active { background: #1d4ed8; color: white; border-color: #1d4ed8; }
    .dist-filter-tag:not(.active) { background: white; color: #475569; border-color: #e2e8f0; }
    .dist-filter-tag:not(.active):hover { border-color: #93c5fd; color: #1d4ed8; }
  </style>
</head>
<body class="min-h-screen bg-slate-50 font-sans text-slate-900 antialiased">

<!-- ═══════════════════ HEADER ═══════════════════ -->
<header class="bg-gradient-to-br from-blue-900 via-blue-700 to-indigo-700 text-white shadow-xl">
  <div class="max-w-4xl mx-auto px-4 pt-5 sm:pt-7 pb-6 sm:pb-8">

    <!-- Branding — row on desktop, stacked on mobile -->
    <div class="flex flex-wrap items-center gap-y-3 gap-x-3 mb-5 sm:mb-7">

      <!-- Left: cat + title -->
      <div class="flex items-center gap-3 min-w-0">
        <img src="/static/img/sigma-cat.png"
             class="h-14 sm:h-20 w-auto object-contain flex-shrink-0 cursor-pointer active:scale-95 transition-transform"
             alt="Сигма"
             title="Что умеет Сигма?"
             onclick="setQuery('что ты умеешь');ask()"
             style="filter:drop-shadow(0 2px 8px rgba(0,0,0,.5))">
        <div class="min-w-0">
          <h1 class="text-2xl sm:text-3xl font-bold leading-tight tracking-tight">Сигма</h1>
          <p class="text-blue-300 text-xs sm:text-sm mt-0.5 sm:mt-1">Открытые данные — только спроси</p>
        </div>
      </div>

      <!-- Right: controls — full-width on mobile so role btn hugs right edge -->
      <div class="flex items-center gap-1.5 sm:gap-2 flex-shrink-0 ml-auto justify-end">
        <!-- Role Switcher -->
        <div id="roleSwitcher">
          <button id="roleBtn" onclick="toggleRoleMenu()">
            <span id="roleBtnIcon">👤</span>
            <span id="roleBtnName">Горожанин</span>
            <span class="role-arrow">▾</span>
          </button>
          <div id="roleDropdown" class="role-dropdown hidden"></div>
        </div>
        <!-- 2GIS badge — icon+text on desktop, icon-only on mobile -->
        <div id="mapglBadge" class="hidden flex-shrink-0 flex items-center gap-1 px-2 sm:px-2.5 py-1.5 bg-emerald-500/20 border border-emerald-400/30 text-emerald-200 text-xs rounded-xl font-medium" title="2GIS API ключ загружен · карты и геокодирование доступны">
          📍<span class="hidden sm:inline"> 2GIS</span>
        </div>
      </div>
    </div>

    <!-- Search bar -->
    <div class="flex gap-2 sm:gap-3">
      <input
        id="queryInput"
        type="text"
        placeholder="Введите вопрос..."
        class="search-glow flex-1 min-w-0 px-4 sm:px-5 py-3.5 rounded-2xl bg-white text-slate-900 text-sm shadow-lg focus:outline-none placeholder:text-slate-400 transition-shadow"
        onkeydown="if(event.key==='Enter') ask()"
      >
      <button
        onclick="ask()"
        class="flex-shrink-0 px-4 sm:px-6 py-3.5 bg-white text-blue-700 font-semibold text-sm rounded-2xl shadow-lg hover:bg-blue-50 active:scale-95 transition-all"
      >
        <span class="hidden sm:inline">Спросить </span>→
      </button>
      <button
        id="micBtn"
        onclick="toggleVoice()"
        title="Голосовой ввод — скажите «Сигма!» и ваш вопрос"
        class="flex-shrink-0 w-12 sm:w-auto sm:px-4 py-3.5 bg-white/15 hover:bg-white/25 text-white text-xl rounded-2xl border border-white/20 transition-all active:scale-95"
      >🎙</button>
    </div>

    <!-- Example chips — сворачиваемый блок подсказок -->
    <div class="mt-3">
      <button id="chipsToggleBtn" onclick="toggleChips()"
        class="flex items-center gap-1.5 text-white/45 hover:text-white/80 text-xs transition-colors mb-2 select-none">
        <span>Примеры вопросов</span>
        <span id="chipsChevron" style="display:inline-block;transition:transform .2s ease;font-size:10px;line-height:1">▼</span>
      </button>
      <div id="chips" class="flex flex-wrap gap-2"></div>
    </div>
  </div>
</header>

<!-- ═══════════════════ ROLE DASHBOARD ═══════════════════ -->
<div id="roleDashboard" class="hidden bg-white border-b border-slate-200 shadow-sm">
  <div class="max-w-4xl mx-auto px-4 py-5">
    <div id="dashContent" class="text-slate-400 text-sm text-center py-2">Загрузка...</div>
  </div>
</div>

<!-- ═══════════════════ MAIN ═══════════════════ -->
<main class="max-w-4xl mx-auto px-4 pt-4 pb-7 space-y-5">

  <!-- Loading indicator -->
  <div id="loadingState" class="hidden items-center gap-3 text-slate-500 text-sm">
    <svg class="spinner w-4 h-4 text-blue-500" fill="none" viewBox="0 0 24 24">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
    </svg>
    <span id="loadingText">Обрабатываю запрос...</span>
  </div>

  <!-- Result area -->
  <div id="resultArea" class="hidden"></div>

  <!-- Topics section -->
  <section>
    <h2 class="text-xs font-semibold uppercase tracking-widest text-slate-400 mb-3">Доступные наборы данных</h2>
    <div id="topicsGrid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-3">
      <div class="col-span-full flex items-center justify-center gap-2 text-slate-400 text-sm py-6">
        <svg class="spinner w-4 h-4" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
        </svg>
        Загрузка...
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="text-center text-xs text-slate-400 pb-4 space-y-1">
    <p>Данные: <a href="http://opendata.novo-sibirsk.ru" target="_blank" class="hover:text-blue-500 transition-colors">opendata.novo-sibirsk.ru</a> · Отключения: <a href="http://051.novo-sibirsk.ru" target="_blank" class="hover:text-blue-500 transition-colors">051.novo-sibirsk.ru</a></p>
    <p>
      Сигма · ЦИИ НГУ ·
      <a href="#" onclick="_openDevDocs(event)" class="hover:text-blue-500 transition-colors">API Docs 🔒</a> ·
      <a href="https://github.com/Barbashin1970/NSK_OpenData_Bot" target="_blank" class="hover:text-blue-500 transition-colors">Инструкция (GitHub) ↗</a> · 
      <span id="footerTime"></span>
    </p>
  </footer>


</main>

<!-- ═══════════════════ SCRIPT ═══════════════════ -->
<script>

// ─── Example queries ────────────────────────────────────────────────────────
// ─── Role config ──────────────────────────────────────────────────────────────
const ROLES = {
  citizen:  { icon: '👤', name: 'Горожанин',             desc: 'Ежедневные запросы для жителей города' },
  official: { icon: '🏙️', name: 'Служащий умного города', desc: 'Аналитика по районам для сотрудников мэрии' },
  mayor:    { icon: '🏛️', name: 'Мэр',                   desc: 'Сводные KPI и принятие решений по всему городу' },
};

let currentRole = localStorage.getItem('nsk_role') || 'citizen';
let officialDistrict = localStorage.getItem('nsk_official_district') || '';  // '' = весь город

// Список районов — загружается из /api/city-config при старте.
// NSK_DISTRICTS — константа переменная: `let`, чтобы её можно было перезаписать.
let NSK_DISTRICTS = [
  { val: '', label: 'Весь город', desc: 'Сводные данные по всем районам' },
];
// Флаг: доступны ли стандартные CSV-темы (парковки, школы…) для текущего города
let _cityHasOpendataCsv = false;
// Полный конфиг города — заполняется loadCityConfig(); до загрузки = null (NSK-дефолты)
let _cityCfg = null;

// ─── Role-specific chips ───────────────────────────────────────────────────────
// geo: true    — запрос возвращает список объектов с адресами → появится кнопка «На карте»
// requires:    — "metro"|"airport"|"opendata" — чип скрывается если функция недоступна в городе
// Плейсхолдеры {D1}/{D2}/{D3} и т.д. заменяются динамически в _resolveChips() после loadCityConfig()
const ROLE_CHIPS_TPL = {
  citizen: [
    {q: "что ты умеешь", bold: true},
    {q: "нет горячей воды"},
    {q: "отключения электричества сейчас"},
    {q: "метро {METRO}", geo: true, requires: "metro"},
    {q: "аэропорт {AIRPORT}", geo: true, requires: "airport"},
    {q: "топ-5 аптек", geo: true, requires: "opendata"},
    {q: "аптеки в {D1}", geo: true, requires: "opendata"},
    {q: "библиотеки для детей", geo: true, requires: "opendata"},
    {q: "нет горячей воды в {D2}"},
    {q: "отключение отопления сегодня"},
    {q: "качество воздуха в городе"},
    {q: "погода в {SUBURB}"},
    {q: "как проехать из {D3_SHORT} в {D1_SHORT}"},
    {q: "пробки сейчас"},
    {q: "риски для жизни в городе"},
    {q: "детские спортивные организации", geo: true, requires: "opendata"},
    {q: "школы в {D2}", geo: true, requires: "opendata"},
    {q: "камеры видеофиксации", geo: true},
    {q: "больницы {CITY_GEN}", geo: true},
    {q: "поликлиники в {D1}", geo: true},
    {q: "активные стройки", geo: true, requires: "opendata"},
  ],
  official: [
    {q: "аварийные отключения ЖКХ сейчас"},
    {q: "плановые отключения на неделю"},
    {q: "отключения тепла сейчас"},
    {q: "отключения воды сейчас"},
    {q: "история отключений за неделю"},
    {q: "превышение ПДК по PM2.5"},
    {q: "качество воздуха по всем районам"},
    {q: "динамика PM2.5 за неделю"},
    {q: "сколько парковок по районам", requires: "opendata"},
    {q: "школы по районам", requires: "opendata"},
    {q: "аптеки в {D1}", geo: true, requires: "opendata"},
    {q: "библиотеки города", geo: true, requires: "opendata"},
    {q: "культурные организации", geo: true, requires: "opendata"},
    {q: "камеры фиксации нарушений", geo: true},
    {q: "больницы по районам"},
    {q: "поликлиники города", geo: true},
    {q: "активные стройки", geo: true, requires: "opendata"},
    {q: "стройки по районам", requires: "opendata"},
  ],
  mayor: [
    {q: "отключения ЖКХ сейчас"},
    {q: "риски для жизни в городе"},
    {q: "качество воздуха в городе"},
    {q: "динамика качества воздуха"},
    {q: "история отключений за неделю"},
    {q: "школы по районам", requires: "opendata"},
    {q: "сколько парковок по районам", requires: "opendata"},
    {q: "топ-5 аптек", geo: true, requires: "opendata"},
    {q: "культурные организации", geo: true, requires: "opendata"},
    {q: "аптеки в {D1}", geo: true, requires: "opendata"},
    {q: "камеры видеофиксации на дорогах", geo: true},
    {q: "больницы по районам"},
    {q: "больницы с приёмным покоем", geo: true},
    {q: "активные стройки", geo: true, requires: "opendata"},
    {q: "стройки по районам", requires: "opendata"},
  ],
};

// ── District name helpers ──────────────────────────────────────────────────────

/** "Советский район" → "Советском районе" (предложный падеж для chips) */
function _distPrep(name) {
  return name
    .replace(/ский\s+(район|округ)/gi, (_, t) => `ском ${t}е`)
    .replace(/ный\s+(район|округ)/gi,  (_, t) => `ном ${t}е`);
}

/** "Академгородок" → "Академгородке" (предложный для подрайонов) */
function _subDistPrep(name) {
  if (/ок$/i.test(name))  return name.slice(0, -2) + 'ке';
  if (/[бвгджзклмнпрстфхцчшщ]$/i.test(name)) return name + 'е';
  return name; // неизменяемые: "Кольцово" → "Кольцово"
}

/** Подставляет плейсхолдеры {D1}…{SUBURB} и фильтрует по features */
function _resolveChips(vars, features) {
  function r(tpl) {
    return tpl.replace(/\{([A-Z1-9_]+)\}/g, (_, k) => (k in vars ? vars[k] : ''));
  }
  const result = {};
  for (const [role, chips] of Object.entries(ROLE_CHIPS_TPL)) {
    result[role] = chips
      .filter(c => !c.requires || features[c.requires])
      .map(c => ({...c, q: r(c.q)}));
  }
  return result;
}

// Начальное значение — NSK-дефолты (перезаписываются через ~10ms в loadCityConfig)
let ROLE_CHIPS = _resolveChips(
  { D1: 'Центральном районе', D1_SHORT: 'Центральный',
    D2: 'Ленинском районе',   D2_SHORT: 'Ленинский',
    D3: 'Советском районе',   D3_SHORT: 'Советский',
    CITY: 'Новосибирск', CITY_GEN: 'Новосибирска',
    AIRPORT: 'Толмачёво', METRO: 'Новосибирск',
    SUBURB: 'Академгородке' },
  { metro: true, airport: true, opendata: true }
);

// Состояние сворачивания подсказок — сохраняется в localStorage
// По умолчанию открыто; опытный пользователь может свернуть и это запомнится
let _chipsOpen = localStorage.getItem('nsk_chips_open') !== 'false';

function buildChips() {
  const el = document.getElementById('chips');
  const chips = ROLE_CHIPS[currentRole] || ROLE_CHIPS.citizen;
  const hasKey = Boolean(_mapglKey);
  el.innerHTML = chips.map(item => {
    const q    = item.q;
    const geo  = item.geo && hasKey;
    const bold = item.bold;  // флаг для выделения ключевого чипа жирным

    // Жирный чип (что ты умеешь) — выделен сильнее чем обычный
    if (bold) {
      return `<button class="chip px-3.5 py-1.5 bg-white/25 hover:bg-white/40 text-white border border-white/40 text-xs rounded-full cursor-pointer font-semibold" data-query="${esc(q)}" title="Узнайте все возможности бота">${q}</button>`;
    }
    const cls = geo
      ? 'bg-blue-500/20 hover:bg-blue-500/35 text-blue-100 border border-blue-400/30 hover:border-blue-400/60'
      : 'bg-white/15 hover:bg-white/25 text-white border border-white/20';
    const label = geo ? `📍 ${q}` : q;
    return `<button class="chip px-3 py-1.5 ${cls} text-xs rounded-full cursor-pointer" data-query="${esc(q)}" title="${geo ? 'Результат можно показать на карте 2GIS' : ''}">${label}</button>`;
  }).join('');
  el.querySelectorAll('[data-query]').forEach(btn =>
    btn.addEventListener('click', () => setQuery(btn.dataset.query))
  );
  _applyChipsState();
}

/** Применяет текущее состояние открыт/свёрнут к DOM */
function _applyChipsState() {
  const el      = document.getElementById('chips');
  const chevron = document.getElementById('chipsChevron');
  if (!el) return;
  if (_chipsOpen) {
    el.style.display = 'flex';
    if (chevron) chevron.style.transform = 'rotate(0deg)';
  } else {
    el.style.display = 'none';
    if (chevron) chevron.style.transform = 'rotate(-90deg)';
  }
}

/** Сворачивает/разворачивает блок примеров вопросов */
function toggleChips() {
  _chipsOpen = !_chipsOpen;
  localStorage.setItem('nsk_chips_open', _chipsOpen);
  _applyChipsState();
}

// ─── Role system ──────────────────────────────────────────────────────────────
function updateRoleBtn() {
  const r = ROLES[currentRole];
  document.getElementById('roleBtnIcon').textContent = r.icon;
  if (currentRole === 'official' && officialDistrict) {
    const short = officialDistrict.replace(' район', '');
    document.getElementById('roleBtnName').textContent = short;
  } else {
    document.getElementById('roleBtnName').textContent = r.name;
  }
}

function setRole(role, district) {
  currentRole = role;
  localStorage.setItem('nsk_role', role);
  if (role === 'official' && district !== undefined) {
    officialDistrict = district;
    localStorage.setItem('nsk_official_district', district);
  }
  document.getElementById('roleDropdown').classList.add('hidden');
  document.getElementById('roleBtn').classList.remove('open');
  updateRoleBtn();
  buildChips();
  const dash = document.getElementById('roleDashboard');
  if (role === 'official' || role === 'mayor') {
    dash.classList.remove('hidden');
    loadRoleDashboard();
  } else {
    dash.classList.add('hidden');
  }
}

function toggleRoleMenu() {
  const dd = document.getElementById('roleDropdown');
  const btn = document.getElementById('roleBtn');
  const isOpen = !dd.classList.contains('hidden');
  if (isOpen) {
    dd.classList.add('hidden');
    btn.classList.remove('open');
  } else {
    _showRoleList(dd);
    dd.classList.remove('hidden');
    btn.classList.add('open');
  }
}

function _showRoleList(dd) {
  dd.innerHTML = Object.entries(ROLES).map(([key, r]) => {
    const isActive = key === currentRole;
    const distNote = key === 'official' && officialDistrict
      ? officialDistrict.replace(' район', '') : '';
    const desc = key === 'official'
      ? (officialDistrict ? `Район: ${officialDistrict}` : 'Весь город — все районы')
      : r.desc;
    // For official: left side sets role (keeps current district), right chevron opens district picker
    if (key === 'official') {
      return `
        <div class="role-opt${isActive ? ' active' : ''}" style="padding-right:8px" onclick="setRole('official')">
          <span class="role-icon">${r.icon}</span>
          <div class="role-info">
            <div class="role-name">${r.name}${distNote ? ` <span class="text-blue-500 font-normal text-xs">· ${distNote}</span>` : ''}</div>
            <div class="role-desc">${desc}</div>
          </div>
          <button class="role-district-chevron" onclick="event.stopPropagation();_showDistrictPicker()" title="Выбрать район">›</button>
        </div>`;
    }
    const check = isActive ? `<span class="role-check">✓</span>` : '';
    return `
      <div class="role-opt${isActive ? ' active' : ''}" onclick="setRole('${key}')">
        <span class="role-icon">${r.icon}</span>
        <div class="role-info">
          <div class="role-name">${r.name}</div>
          <div class="role-desc">${desc}</div>
        </div>
        ${check}
      </div>`;
  }).join('');
}

function _showDistrictPicker() {
  const dd = document.getElementById('roleDropdown');
  dd.innerHTML = `
    <div class="role-opt role-picker-back" onclick="_showRoleList(document.getElementById('roleDropdown'))">
      <span class="role-icon" style="font-size:14px;color:#64748b">‹</span>
      <div class="role-info"><div class="role-name" style="color:#64748b;font-size:12px">Назад к ролям</div></div>
    </div>
    <div class="role-dropdown-header">Район ответственности</div>
    ${NSK_DISTRICTS.map(d => {
      const isActive = officialDistrict === d.val;
      const safeVal = d.val.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
      return `
        <div class="role-opt${isActive ? ' active' : ''}" onclick="setRole('official', '${safeVal}')">
          <div class="role-info">
            <div class="role-name">${d.label}</div>
            ${d.desc ? `<div class="role-desc">${d.desc}</div>` : ''}
          </div>
          ${isActive ? '<span class="role-check">✓</span>' : ''}
        </div>`;
    }).join('')}
  `;
}

document.addEventListener('click', function(e) {
  const sw = document.getElementById('roleSwitcher');
  if (sw && !sw.contains(e.target)) {
    document.getElementById('roleDropdown').classList.add('hidden');
    document.getElementById('roleBtn').classList.remove('open');
  }
});

// ─── Role Dashboards ──────────────────────────────────────────────────────────
function setDistrictFilter(dist) {
  officialDistrict = dist;
  localStorage.setItem('nsk_official_district', dist);
  updateRoleBtn();
  loadRoleDashboard();
}

async function loadRoleDashboard() {
  const dashEl = document.getElementById('dashContent');
  dashEl.innerHTML = '<div class="text-slate-400 text-sm text-center py-3">Загрузка данных...</div>';
  try {
    const fetches = [
      fetch('/ask?q=' + encodeURIComponent('отключения ЖКХ сейчас')),
      fetch('/ecology/status'),
      fetch('/ecology/risks'),
    ];
    if (currentRole === 'official') {
      fetches.push(fetch('/transit/districts'));
      fetches.push(fetch('/traffic-index'));
    }
    const results = await Promise.all(fetches);
    const power       = results[0].ok ? await results[0].json() : null;
    const eco         = results[1].ok ? await results[1].json() : null;
    const risks       = results[2].ok ? await results[2].json() : null;
    const transit     = (currentRole === 'official' && results[3]?.ok) ? await results[3].json() : null;
    const trafficData = (currentRole === 'official' && results[4]?.ok) ? await results[4].json() : null;
    dashEl.innerHTML = currentRole === 'mayor'
      ? renderMayorDashboard(power, eco, risks)
      : renderOfficialDashboard(power, eco, risks, transit, officialDistrict, trafficData);
    // Скрыть info-карточку "панель загружается…" после рендера дашборда
    const ra = document.getElementById('resultArea');
    if (ra && ra.classList.contains('bg-violet-50')) ra.className = 'hidden';
    requestAnimationFrame(() => {
      document.querySelectorAll('.bar-fill[data-pct]').forEach(b => { b.style.width = b.dataset.pct + '%'; });
    });
  } catch(e) {
    dashEl.innerHTML = '<div class="text-red-400 text-sm text-center py-3">Ошибка загрузки данных панели</div>';
  }
}

function _dashAqiClass(aqi) {
  if (!aqi) return { bg:'bg-slate-50', border:'border-slate-200', text:'text-slate-500', label:'—' };
  if (aqi <= 20) return { bg:'bg-emerald-50', border:'border-emerald-200', text:'text-emerald-700', label:'Отличное' };
  if (aqi <= 40) return { bg:'bg-green-50',   border:'border-green-200',   text:'text-green-700',   label:'Хорошее' };
  if (aqi <= 60) return { bg:'bg-yellow-50',  border:'border-yellow-200',  text:'text-yellow-700',  label:'Умеренное' };
  if (aqi <= 80) return { bg:'bg-orange-50',  border:'border-orange-200',  text:'text-orange-700',  label:'Плохое' };
  return               { bg:'bg-red-50',      border:'border-red-200',     text:'text-red-700',     label:'Опасное' };
}

function renderTransitWidget(transit, district) {
  if (!transit || transit.error || !transit.rows?.length) {
    return `<div class="bg-slate-50 border border-slate-200 rounded-2xl px-4 py-3 text-xs text-slate-400 flex items-center gap-2">
      🚌 <span>Данные об остановках не загружены —
        <button class="text-blue-500 hover:underline" onclick="updateAndReload('stops')">обновить данные</button>
      </span>
    </div>`;
  }
  const d = district || '';
  const dKey = d.split(' ')[0].toLowerCase();
  // Если выбран район — показываем только его строку (выделенную) + остальные серые
  let rows = transit.rows;
  if (d) {
    // Поднимаем строку с нужным районом наверх
    rows = [
      ...rows.filter(r => (r.district||'').toLowerCase().includes(dKey)),
      ...rows.filter(r => !(r.district||'').toLowerCase().includes(dKey)),
    ];
  }
  const total  = transit.total_stops || rows.reduce((s,r)=>s+r.stops_count,0);
  const maxVal = Math.max(...rows.map(r => r.stops_count), 1);
  const barsHtml = rows.slice(0, 10).map(r => {
    const isHighlighted = d && (r.district||'').toLowerCase().includes(dKey);
    const pct  = Math.round(r.stops_count / maxVal * 100);
    const dist = (r.district || '').replace(' район','').replace('Центральный','Централ.');
    const barCls = isHighlighted
      ? 'bg-gradient-to-r from-blue-500 to-indigo-500'
      : 'bg-gradient-to-r from-violet-400 to-indigo-400';
    const rowCls = isHighlighted ? 'bg-blue-50 rounded-lg' : '';
    return `<div class="flex items-center gap-2 cursor-pointer hover:bg-slate-50 rounded px-1 -mx-1 transition-colors ${rowCls}"
        onclick="askNow('остановки в ${esc(r.district||'')}')">
      <span class="text-xs ${isHighlighted ? 'text-blue-700 font-semibold' : 'text-slate-500'} w-20 truncate flex-shrink-0" title="${esc(r.district||'')}">${esc(dist)}</span>
      <div class="flex-1 bg-slate-100 rounded-full h-1.5 overflow-hidden">
        <div class="bar-fill ${barCls} h-1.5 rounded-full w-0" data-pct="${pct}"></div>
      </div>
      <span class="text-xs font-semibold ${isHighlighted ? 'text-blue-700' : 'text-slate-600'} w-6 text-right flex-shrink-0">${r.stops_count}</span>
    </div>`;
  }).join('');
  const titleSuffix = d ? ` · ${d.replace(' район','')}` : ' по районам';
  return `
    <div class="bg-white rounded-2xl border border-slate-200 overflow-hidden">
      <div class="px-4 py-3 border-b border-slate-100 flex justify-between items-center">
        <span class="text-xs font-semibold uppercase tracking-widest text-slate-400">🚌 Остановки транспорта${titleSuffix}</span>
        <span class="text-xs text-slate-400">${total} всего · <button class="text-blue-600 hover:underline" onclick="askNow('остановки по районам')">все районы →</button></span>
      </div>
      <div class="px-4 py-3 space-y-2">${barsHtml}</div>
    </div>`;
}

function renderTrafficCompact(data) {
  if (!data || data.error) return '';
  const idx    = data.index ?? '—';
  const level  = data.level || '';
  const emoji  = data.emoji || '🚗';
  const tip    = data.official_tip || data.citizen_tip || '';
  const nextPk = data.next_peak || '';
  const pct    = Math.min(100, Math.round((parseFloat(idx) || 0) / 10 * 100));
  const colorMap = {
    'Свободно':     'bg-emerald-100 text-emerald-700 border-emerald-200',
    'Умеренно':     'bg-yellow-100  text-yellow-700  border-yellow-200',
    'Затруднено':   'bg-orange-100  text-orange-700  border-orange-200',
    'Сложно':       'bg-red-100     text-red-700     border-red-200',
    'Очень сложно': 'bg-red-200     text-red-800     border-red-300',
    'Коллапс':      'bg-red-300     text-red-900     border-red-400',
  };
  const badge    = colorMap[level] || 'bg-slate-100 text-slate-700 border-slate-200';
  const barColor = pct < 35 ? 'bg-emerald-500' : pct < 65 ? 'bg-orange-400' : 'bg-red-500';
  return `
    <div class="bg-white rounded-2xl border border-slate-200 overflow-hidden cursor-pointer hover:shadow-md transition-shadow"
         onclick="askNow('пробки сейчас')">
      <div class="px-4 py-3 border-b border-slate-100 flex justify-between items-center">
        <span class="text-xs font-semibold uppercase tracking-widest text-slate-400">🚦 Дорожная нагрузка</span>
        <span class="text-xs text-blue-600 hover:underline">Подробнее →</span>
      </div>
      <div class="px-4 py-3 flex items-center gap-4">
        <div class="flex items-center gap-2 flex-shrink-0">
          <span class="text-2xl font-bold text-slate-800">${idx}</span>
          <span class="text-slate-400 text-xs">/10</span>
          <span class="px-2 py-0.5 rounded-full border text-xs font-semibold ${badge}">${emoji} ${esc(level)}</span>
        </div>
        <div class="flex-1 min-w-0">
          <div class="bg-slate-100 rounded-full h-2 overflow-hidden mb-1.5">
            <div class="${barColor} h-2 rounded-full" style="width:${pct}%"></div>
          </div>
          ${tip ? `<p class="text-xs text-slate-600 leading-snug truncate" title="${esc(tip)}">${esc(tip)}</p>` : ''}
        </div>
      </div>
      ${nextPk ? `<div class="px-4 pb-3 text-xs text-slate-400">⏱ ${esc(nextPk)}</div>` : ''}
    </div>`;
}

function renderOfficialDashboard(power, eco, risks, transit, district, trafficData) {
  const d = district || '';  // '' = весь город
  const dShort = d.replace(' район', '');

  // ─ helper: фильтрация по подстроке района ────────────────────────────────
  // Для подрайонов (Академгородок) матчим родительский район (Советский)
  const _subToParent = { 'Академгородок': 'Советский' };
  const matchDist = (str) => {
    if (!d) return true;
    const key = (_subToParent[d] || d.split(' ')[0]).toLowerCase();
    return (str || '').toLowerCase().includes(key);
  };

  // ─ Power: считаем из строк (не из power_meta, чтобы фильтр работал) ──────
  const allPwrRows = (power?.rows || []).filter(r => r.district !== 'all');
  const distPwrRows = d ? allPwrRows.filter(r => matchDist(r.district)) : allPwrRows;
  const activeH  = distPwrRows
    .filter(r => r.group_type === 'active'  && Number(r.houses||0) > 0)
    .reduce((s, r) => s + Number(r.houses||0), 0);
  const plannedH = distPwrRows
    .filter(r => r.group_type === 'planned' && Number(r.houses||0) > 0)
    .reduce((s, r) => s + Number(r.houses||0), 0);

  // ─ Ecology ───────────────────────────────────────────────────────────────
  const allEcoRows = eco?.rows || [];
  const ecoRows = d ? allEcoRows.filter(r => matchDist(r.district)) : allEcoRows;
  const aqis    = ecoRows.map(r => r.aqi).filter(v => v != null);
  const avgAqi  = aqis.length ? Math.round(aqis.reduce((a,b)=>a+b,0)/aqis.length) : null;
  const ac = _dashAqiClass(avgAqi);

  // ─ Risks (городские, фильтровать по дистрикту не имеет смысла) ───────────
  const riskCount = risks?.count || 0;

  // ─ KPI onclicks с учётом района ──────────────────────────────────────────
  const qEmerg    = d ? `аварийные отключения ЖКХ в ${dShort} районе`   : `аварийные отключения ЖКХ сейчас`;
  const qPlan     = d ? `плановые отключения в ${dShort} районе`         : `плановые отключения ЖКХ`;
  const qEco      = d ? `качество воздуха в ${dShort} районе`            : `качество воздуха в городе`;
  const qRisks    = `риски для жизни в городе`;

  const kpis = [
    { icon: activeH  === 0 ? '✅' : '🔴', label:'Аварийных домов',  val: activeH.toLocaleString('ru-RU'),
      color:  activeH === 0 ? 'text-emerald-600' : activeH <= 100 ? 'text-amber-600' : 'text-red-600',
      bg:     activeH === 0 ? 'bg-emerald-50'    : activeH <= 100 ? 'bg-amber-50'    : 'bg-red-50',
      border: activeH === 0 ? 'border-emerald-200': activeH <= 100 ? 'border-amber-200': 'border-red-200',
      note: activeH === 0 ? (d ? `в ${dShort}: аварий нет` : 'аварий нет') : (d ? `в ${dShort}` : 'по всем видам ЖКХ'),
      onclick:`askNow('${qEmerg}')` },
    { icon: plannedH === 0 ? '✅' : '🟡', label:'Плановых домов',   val: plannedH.toLocaleString('ru-RU'),
      color:  plannedH === 0 ? 'text-emerald-600' : 'text-amber-600',
      bg:     plannedH === 0 ? 'bg-emerald-50'    : 'bg-amber-50',
      border: plannedH === 0 ? 'border-emerald-200': 'border-amber-200',
      note: plannedH === 0 ? (d ? `в ${dShort}: плановых нет` : 'плановых нет') : (d ? `плановые в ${dShort}` : 'запланированные'),
      onclick:`askNow('${qPlan}')` },
    { icon:'🍃', label:'AQI (средний)',    val: avgAqi != null ? String(avgAqi) : '—',
      color: ac.text, bg: ac.bg, border: ac.border,
      note: ac.label + (d ? ` · ${dShort}` : ''),
      onclick:`askNow('${qEco}')` },
    { icon:'⚠️', label:'Активных рисков', val: String(riskCount),
      color: riskCount > 0 ? 'text-amber-700' : 'text-emerald-600',
      bg:    riskCount > 0 ? 'bg-amber-50'    : 'bg-emerald-50',
      border:riskCount > 0 ? 'border-amber-200' : 'border-emerald-200',
      note:  riskCount > 0 ? 'требуют внимания' : 'рисков нет',
      onclick:`askNow('${qRisks}')` },
  ];

  const kpiHtml = kpis.map(k => `
    <div class="dash-kpi border rounded-2xl p-4 ${k.bg} ${k.border} cursor-pointer hover:shadow-md active:scale-95 transition-all"
         onclick="${k.onclick}" title="Нажмите для подробностей">
      <div class="flex items-center gap-1.5 mb-2">
        <span class="text-base">${k.icon}</span>
        <span class="text-xs text-slate-500 font-medium leading-tight">${k.label}</span>
      </div>
      <div class="text-3xl font-bold ${k.color} leading-none tracking-tight">${k.val}</div>
      <div class="text-xs text-slate-400 mt-1">${k.note}</div>
    </div>
  `).join('');

  // ─ Таблица аварийных отключений ──────────────────────────────────────────
  const pwrRows = distPwrRows
    .filter(r => r.group_type === 'active' && Number(r.houses||0) > 0)
    .sort((a,b) => Number(b.houses||0) - Number(a.houses||0))
    .slice(0, d ? 10 : 5);  // при фокусе на районе — больше строк

  const pwrTitle = d
    ? `Аварийные отключения · ${dShort}`
    : `Аварийные отключения · топ по районам`;
  const pwrMore  = d
    ? `askNow('отключения ЖКХ в ${dShort} районе')`
    : `askNow('отключения ЖКХ сейчас')`;

  const pwrTable = `
    <div class="bg-white rounded-2xl border border-slate-200 overflow-hidden">
      <div class="px-4 py-3 border-b border-slate-100 flex justify-between items-center">
        <span class="text-xs font-semibold uppercase tracking-widest text-slate-400">${pwrTitle}</span>
        <button class="text-xs text-blue-600 hover:underline" onclick="${pwrMore}">Подробнее →</button>
      </div>
      ${pwrRows.length ? `<table class="w-full"><tbody>${pwrRows.map(r => {
          const _q = `отключения ${(r.utility||'').split(' ')[0].toLowerCase()} в ${r.district||''}`;
          return `
          <tr class="border-b border-slate-50 last:border-0 hover:bg-slate-50 transition-colors cursor-pointer"
              onclick="askNow(decodeURIComponent('${encodeURIComponent(_q)}'))">
            <td class="px-4 py-2.5 text-xs text-slate-500 w-28">${esc((r.utility||'').split(' ')[0])}</td>
            <td class="px-4 py-2.5 text-sm text-slate-700 font-medium">${esc(r.district||'—')}</td>
            <td class="px-4 py-2.5 text-sm font-bold text-red-600 text-right">${r.houses} д.</td>
          </tr>`;
        }).join('')}</tbody></table>`
      : `<div class="px-4 py-4 text-sm text-emerald-600 font-medium flex items-center gap-2">
           <span>✅</span><span>Аварийных отключений нет${d ? ` в ${dShort}` : ''}</span>
         </div>`}
    </div>`;

  // ─ AQI chips ──────────────────────────────────────────────────────────────
  const ecoChipRows = d ? ecoRows : allEcoRows.slice(0, 8);
  const ecoChips = ecoChipRows.map(r => {
    const c2 = aqiColor(r.aqi);
    const dist = (r.district||'').replace(' район','');
    const _q = `качество воздуха в ${dist} районе`;
    return `<span class="${c2.bg} ${c2.text} border border-current/20 px-2.5 py-1 rounded-full text-xs font-medium cursor-pointer hover:opacity-80 transition-opacity"
      onclick="askNow(decodeURIComponent('${encodeURIComponent(_q)}')">${dist}: ${r.aqi??'—'}</span>`;
  }).join('');

  // ─ Фильтр по районам — полоска под заголовком ─────────────────────────────
  const distFilterBar = `
    <div class="dist-filter-bar">
      <span class="text-xs text-slate-400 flex-shrink-0">Район:</span>
      ${NSK_DISTRICTS.map(di => {
        const safeVal = di.val.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
        const isAct   = officialDistrict === di.val;
        return `<span class="dist-filter-tag${isAct ? ' active' : ''}"
          onclick="setDistrictFilter('${safeVal}')">${di.label}</span>`;
      }).join('')}
    </div>`;

  const ts = new Date().toLocaleString('ru-RU', {day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
  const headTitle = d
    ? `📊 Панель диспетчера · ${dShort} · ${ts}`
    : `📊 Панель диспетчера · ${ts}`;
  return `
    <div class="space-y-4">
      <div class="flex items-center justify-between">
        <h3 class="text-sm font-bold text-slate-700">${headTitle}</h3>
        <button onclick="loadRoleDashboard()" class="text-xs text-blue-600 hover:underline">↻ Обновить</button>
      </div>
      ${distFilterBar}
      <div class="grid grid-cols-2 sm:grid-cols-4 gap-3">${kpiHtml}</div>
      ${renderTrafficCompact(trafficData)}
      ${pwrTable}
      ${ecoChips ? `<div class="flex flex-wrap gap-2 items-center">
        <span class="text-xs text-slate-400">AQI${d ? ` · ${dShort}` : ' по районам'}:</span>${ecoChips}</div>` : ''}
    </div>`;
}

function renderMayorDashboard(power, eco, risks) {
  const pm = power?.power_meta || {};
  const activeH  = pm.active_houses  || 0;
  const plannedH = pm.planned_houses || 0;
  const riskCount = risks?.count || 0;
  const riskItems = risks?.risks || [];
  const ecoRows = eco?.rows || [];
  const aqis  = ecoRows.map(r => r.aqi).filter(v => v != null);
  const pm25s = ecoRows.map(r => r.pm25).filter(v => v != null);
  const avgAqi  = aqis.length  ? Math.round(aqis.reduce((a,b)=>a+b,0)/aqis.length) : null;
  const avgPm25 = pm25s.length ? (pm25s.reduce((a,b)=>a+b,0)/pm25s.length).toFixed(1) : '—';
  const ac = _dashAqiClass(avgAqi);

  const bigStats = [
    { label:'Домов без ЖКХ (аварийно)', val: activeH.toLocaleString('ru-RU'),
      icon:   activeH === 0 ? '✅' : '🔴',
      color:  activeH === 0 ? 'text-emerald-700' : activeH <= 200 ? 'text-amber-700' : 'text-red-700',
      bg:     activeH === 0 ? 'bg-emerald-50'    : activeH <= 200 ? 'bg-amber-50'    : 'bg-red-50',
      border: activeH === 0 ? 'border-emerald-200': activeH <= 200 ? 'border-amber-200': 'border-red-200',
      sub: activeH === 0 ? 'аварийных отключений нет' : 'электро · тепло · вода · газ',
      link:"askNow('аварийные отключения ЖКХ сейчас')" },
    { label:'Плановых отключений (домов)', val: plannedH.toLocaleString('ru-RU'),
      icon:   plannedH === 0 ? '✅' : '📋',
      color:  plannedH === 0 ? 'text-emerald-700' : 'text-amber-700',
      bg:     plannedH === 0 ? 'bg-emerald-50'    : 'bg-amber-50',
      border: plannedH === 0 ? 'border-emerald-200': 'border-amber-200',
      sub: plannedH === 0 ? 'плановых отключений нет' : 'запланировано',
      link:"askNow('плановые отключения на неделю')" },
    { label:'Качество воздуха (AQI ср.)', val: avgAqi != null ? String(avgAqi) : '—', icon:'🍃',
      color: ac.text, bg: ac.bg, border: ac.border,
      sub: ac.label + ' · PM2.5 ср. ' + avgPm25 + ' мкг/м³', link:"askNow('качество воздуха в городе')" },
    { label:'Активных угроз городу', val: String(riskCount), icon:'⚠️',
      color: riskCount > 0 ? 'text-amber-700' : 'text-emerald-600',
      bg:    riskCount > 0 ? 'bg-amber-50'    : 'bg-emerald-50',
      border:riskCount > 0 ? 'border-amber-200' : 'border-emerald-200',
      sub: riskCount > 0 ? riskItems.map(r=>r.scenario).join(' · ') : 'рисков не обнаружено',
      link:"askNow('риски для жизни в городе')" },
  ];

  const statsHtml = bigStats.map(s => `
    <div class="dash-kpi ${s.bg} border ${s.border} rounded-2xl p-5 flex flex-col gap-2 shadow-sm cursor-pointer"
         onclick="${s.link}">
      <div class="flex items-center gap-2">
        <span class="text-2xl">${s.icon}</span>
        <span class="text-xs text-slate-500 font-medium leading-snug">${s.label}</span>
      </div>
      <div class="text-4xl font-black ${s.color} leading-none tracking-tight">${s.val}</div>
      <div class="text-xs text-slate-400 leading-snug">${esc(s.sub)}</div>
    </div>`).join('');

  const risksHtml = riskItems.length ? `
    <div class="space-y-2">
      <div class="text-xs font-semibold uppercase tracking-widest text-slate-400">Активные угрозы</div>
      ${riskItems.slice(0,3).map(r => {
        const isCrit = r.severity === 'critical';
        return `<div class="flex items-center gap-3 px-4 py-3 rounded-xl border cursor-pointer hover:opacity-80 transition-opacity
          ${isCrit ? 'bg-red-50 border-red-200' : 'bg-amber-50 border-amber-200'}"
          onclick="askNow('риски для жизни в городе')">
          <span class="text-xl flex-shrink-0">${r.icon||'⚠️'}</span>
          <div class="flex-1 min-w-0">
            <div class="text-sm font-semibold ${isCrit ? 'text-red-700' : 'text-amber-700'} leading-tight">${esc(r.title)}</div>
            <div class="text-xs text-slate-500 mt-0.5">${esc(r.metrics||'')}</div>
          </div>
          <div class="text-xs font-semibold whitespace-nowrap ${isCrit ? 'text-red-600' : 'text-amber-600'}">${isCrit ? '🔴 Критично' : '🟡 Внимание'}</div>
        </div>`;
      }).join('')}
    </div>` : '';

  const ts = new Date().toLocaleString('ru-RU', {day:'2-digit',month:'long',hour:'2-digit',minute:'2-digit'});
  return `
    <div class="space-y-4">
      <div class="flex items-center justify-between flex-wrap gap-2">
        <h3 class="text-sm font-bold text-slate-700">🏛️ Сводка по городу · ${ts}</h3>
        <button onclick="loadRoleDashboard()" class="text-xs text-blue-600 hover:underline">↻ Обновить</button>
      </div>
      <div class="grid grid-cols-2 sm:grid-cols-4 gap-3">${statsHtml}</div>
      ${risksHtml}
    </div>`;
}

function setQuery(q) {
  const input = document.getElementById('queryInput');
  const hadText = input.value.trim().length > 0;
  input.value = q;
  input.focus();
  // Если поле было пустым — сразу отправляем; если уже было что-то напечатано — только подставляем текст
  if (!hadText) {
    ask();
  }
}

function askNow(q) {
  document.getElementById('queryInput').value = q;
  ask();
}

async function updateAndReload(topic) {
  try {
    const r = await fetch('/update?topic=' + encodeURIComponent(topic), {method:'POST'});
    if (r.ok) loadRoleDashboard();
  } catch(e) { /* ignore */ }
}

// ─── Special query shortcuts (roles + ЦИИ) ───────────────────────────────────
function _extractDistrict(text) {
  // Search by stem (label without last 2 chars) so all declensions match:
  // "советский"→"советск", "центральный"→"центральн", "кольцово"→"кольцо"
  const t = text.toLowerCase();
  for (const d of NSK_DISTRICTS) {
    if (!d.val) continue;
    const stem = d.label.toLowerCase().slice(0, -2);
    if (stem.length >= 4 && t.includes(stem)) return d.val;
  }
  return '';
}

function _showInfoCard(icon, msg) {
  document.getElementById('loadingState').className = 'hidden';
  const el = document.getElementById('resultArea');
  el.className = 'fade-in bg-violet-50 border border-violet-200 rounded-2xl p-4';
  el.innerHTML = `<div class="flex items-center gap-2 text-violet-800"><span class="text-xl">${icon}</span><span class="font-semibold text-sm">${msg}</span></div>`;
}

function _trySpecialQuery(raw) {
  // Strip «Сигма» wake-word prefix
  const q = raw.replace(/^(?:с[ие]г?м[ао]|si(?:gm?a|ma))[!,.:)?\s]*/i, '').trim();
  const ql = q.toLowerCase();

  // ── Роли ──────────────────────────────────────────────────────────────────
  if (/^(?:я\s+)?(?:горожанин[а-яё]*|горожанк[а-яё]+|жительниц[аеу]?|житель[яю]?|пользователь(?:\s+города)?)(?:\s|$)/i.test(ql)) {
    setRole('citizen');
    document.getElementById('queryInput').value = '';
    document.getElementById('loadingState').className = 'hidden';
    const el = document.getElementById('resultArea');
    const chips = ROLE_CHIPS.citizen.slice(0, 8).map(c => {
      const sq = c.q.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
      return `<button onclick="setQuery('${sq}')" class="text-xs px-3 py-1.5 rounded-full border bg-white text-slate-600 border-slate-200 hover:border-blue-300 hover:text-blue-600 transition-colors">${esc(c.q)}</button>`;
    }).join('');
    el.className = 'fade-in';
    el.innerHTML = `
      <div class="bg-violet-50 border border-violet-200 rounded-2xl p-4">
        <div class="flex items-center gap-2 mb-2">
          <span class="text-xl">👤</span>
          <span class="font-semibold text-violet-800">Режим: Горожанин</span>
        </div>
        <p class="text-violet-700 text-sm mb-3">Я знаю Новосибирск. Спросите о городских сервисах:</p>
        <div class="flex flex-wrap gap-2">${chips}</div>
      </div>`;
    return true;
  }
  if (/^(?:я\s+)?служащ/i.test(ql)) {
    const dist = _extractDistrict(ql);
    setRole('official', dist || officialDistrict);
    document.getElementById('queryInput').value = '';
    const dLabel = (dist || officialDistrict || '').replace(' район', '');
    _showInfoCard('🏙️', 'Режим: Служащий' + (dLabel ? ' · ' + dLabel : '') + ' — панель загружается…');
    setTimeout(() => {
      const dash = document.getElementById('roleDashboard');
      if (dash && !dash.classList.contains('hidden')) dash.scrollIntoView({behavior: 'smooth', block: 'start'});
    }, 800);
    return true;
  }
  if (/^(?:я\s+)?(?:мэр|руководитель)(?:\s|$)/i.test(ql)) {
    setRole('mayor');
    document.getElementById('queryInput').value = '';
    _showInfoCard('🏛️', 'Режим: Мэр — панель загружается…');
    setTimeout(() => {
      const dash = document.getElementById('roleDashboard');
      if (dash && !dash.classList.contains('hidden')) dash.scrollIntoView({behavior: 'smooth', block: 'start'});
    }, 800);
    return true;
  }

  // ── ЦИИ НГУ ───────────────────────────────────────────────────────────────
  const cii = /\b(ции|центр\s*и\.?и\.?|центр\s*нгу)\b/i;

  // О центре
  if (
    /что\s+такое\s+(ции|центр\s*(ии?|искусственного\s*интеллекта)|искусственный\s+интеллект)/i.test(ql) ||
    /расскажи\s+о\s+(ции|центре)/i.test(ql) ||
    (cii.test(ql) && !/проект|команд|публикац|новост|контакт/.test(ql))
  ) {
    if (!_ciiPanelOpen) toggleCiiPanel();
    loadCiiSection('center');
    return true;
  }
  // Проекты
  if (/(проекты?\s+(ции|центра)|какие\s+проекты?\s*(центра|ции|в\s+работе)?|проекты?\s+в\s+работе)/i.test(ql)) {
    if (!_ciiPanelOpen) toggleCiiPanel();
    loadCiiSection('projects');
    return true;
  }
  // Команда
  if (/(команд[аеу]?\s*(ции|центра)|кто\s+работает\s+в\s*(ции|центре)|сотрудники?\s*(ции|центра))/i.test(ql)) {
    if (!_ciiPanelOpen) toggleCiiPanel();
    loadCiiSection('team');
    return true;
  }
  // Публикации
  if (/(публикаци\S*\s*(ции|центра)?|статьи?\s*(ции|центра))/i.test(ql)) {
    if (!_ciiPanelOpen) toggleCiiPanel();
    loadCiiSection('publications');
    return true;
  }
  // Новости
  if (/новост[иьюя]\s*(ции|центра)/i.test(ql)) {
    if (!_ciiPanelOpen) toggleCiiPanel();
    loadCiiSection('news');
    return true;
  }
  // Контакты
  if (/(контакт\S*\s*(ции|центра|центр[аеуи]|искусственного)?|как\s+связаться\s*с?\s*(ции|центром)?|контакты?\s+центра)/i.test(ql)) {
    if (!_ciiPanelOpen) toggleCiiPanel();
    loadCiiSection('contacts');
    return true;
  }

  // ── [PUZZLE GAME] Триггер: «пятнашки», «игра», «puzzle» ──────────────────
  if (/пятнашк|пазл|puzzle|^игр[ауы]?$/i.test(ql)) {
    document.getElementById('queryInput').value = '';
    document.getElementById('loadingState').className = 'hidden';
    toggleGamePanel();
    return true;
  }
  // ── [/PUZZLE GAME] ────────────────────────────────────────────────────────

  // ── Риски для жизни → таблица выбросов по МО НСО ─────────────────────────
  if (/риск[иа]?\s+(для\s+)?жизни|экологическ\S+\s+риск/i.test(ql)) {
    document.getElementById('queryInput').value = '';
    document.getElementById('loadingState').className = 'hidden';
    _showRisksView();
    return true;
  }

  return false;
}

// ─── Ask ─────────────────────────────────────────────────────────────────────
async function ask() {
  const q = document.getElementById('queryInput').value.trim();
  if (!q) return;

  if (_trySpecialQuery(q)) return;

  // Reset pagination for a fresh query
  _pageQuery  = q;
  _pageOffset = 0;
  _pageSize   = 20;

  setLoading(q);

  try {
    const resp = await fetch('/ask?q=' + encodeURIComponent(q));
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    renderResult(data, q);
  } catch (e) {
    showError('Ошибка соединения с сервером. Проверьте, что бот запущен: <code class="bg-red-100 px-1 rounded">bot serve</code>');
  }
}

function setLoading(q) {
  _resetMap();
  document.getElementById('loadingState').className = 'flex items-center gap-3 text-slate-500 text-sm';
  document.getElementById('loadingText').textContent = `Ищу ответ на: «${q}»`;
  document.getElementById('resultArea').className = 'hidden';
}

function showError(html) {
  document.getElementById('loadingState').className = 'hidden';
  const el = document.getElementById('resultArea');
  el.className = 'fade-in bg-red-50 border border-red-200 rounded-2xl p-5 text-red-700 text-sm';
  el.innerHTML = `<strong class="font-semibold">Ошибка:</strong> ${html}`;
}

// ─── Render result ────────────────────────────────────────────────────────────
function renderResult(data, query) {
  document.getElementById('loadingState').className = 'hidden';
  const el = document.getElementById('resultArea');

  if (data.error) {
    el.className = 'fade-in bg-amber-50 border border-amber-200 rounded-2xl p-5';
    el.innerHTML = `
      <p class="text-amber-800 font-semibold mb-1.5">⚠ Не удалось найти ответ</p>
      <p class="text-amber-700 text-sm">${esc(data.error)}</p>
      ${data.available_topics ? `<p class="text-slate-500 text-xs mt-3">Попробуйте: ${data.available_topics.slice(0,5).join(', ')}</p>` : ''}
    `;
    return;
  }

  el.className = 'fade-in space-y-4';
  const op = data.operation;

  let html = metaHeader(data);

  if      (op === 'COUNT')                     html += renderCount(data);
  else if (op === 'GROUP')                     html += renderGroup(data);
  else if ((op === 'TOP_N' || op === 'FILTER') && data.topic === 'emissions') html += renderEmissions(data);
  else if (op === 'TOP_N' || op === 'FILTER')  html += renderTable(data);
  else if (op && op.startsWith('POWER_'))      html += renderPower(data);
  else if (op && op.startsWith('ECO_'))        html += renderEcology(data);
  else if (op === 'INFO')                      html += renderInfo(data);
  else if (op === 'DISTRICTS')                 html += renderDistricts(data);
  else if (op === 'UNKNOWN')                   html += renderUnknown(data);
  else if (op === 'TRANSIT_ROUTE')             html += renderTransitRoute(data);
  else if (op === 'TRAFFIC_INDEX')             html += renderTrafficIndex(data);
  else if (op === 'CONSTRUCTION_COUNT')        html += renderConstructionCount(data);
  else if (op === 'CONSTRUCTION_GROUP')        html += renderGroup(data);
  else if (op && op.startsWith('CONSTRUCTION_')) html += renderConstruction(data);
  else if (op && op.startsWith('METRO_'))      html += renderMetro(data);
  else if (op === 'AIRPORT_INFO')              html += renderAirport(data);
  else                                         html += renderTable(data);

  el.innerHTML = html;

  // Animate bar fills after render
  requestAnimationFrame(() => {
    document.querySelectorAll('.bar-fill[data-pct]').forEach(bar => {
      bar.style.width = bar.dataset.pct + '%';
    });
  });

  // Map button for table results
  if (query) maybeShowMapBtn(data, query);
}

// ─── Meta header ─────────────────────────────────────────────────────────────
function metaHeader(data) {
  if (!data.topic) return '';
  const conf = '';
  const dist = data.district
    ? `<span class="bg-blue-100 text-blue-700 text-xs px-2 py-0.5 rounded-full font-medium">${esc(data.district)}</span>` : '';
  const street = data.street
    ? `<span class="bg-slate-100 text-slate-600 text-xs px-2 py-0.5 rounded-full">ул. ${esc(data.street)}</span>` : '';
  const extra = data.extra_filters && data.extra_filters.audience
    ? `<span class="bg-purple-100 text-purple-700 text-xs px-2 py-0.5 rounded-full">${data.extra_filters.audience === 'children' ? 'дети' : 'взрослые'}</span>` : '';
  return `
    <div class="flex items-center flex-wrap gap-2 text-sm pb-1">
      <span class="font-semibold text-slate-800">${esc(data.topic_name || data.topic)}</span>
      ${conf} ${dist} ${street} ${extra}
    </div>
  `;
}

// ─── COUNT ────────────────────────────────────────────────────────────────────
function renderCount(data) {
  return `
    <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-10 text-center">
      <div class="text-7xl font-bold text-blue-600 mb-2 tracking-tight">${Number(data.count).toLocaleString('ru-RU')}</div>
      <div class="text-slate-500 text-base">${esc(data.topic_name || 'записей')}</div>
      ${data.district ? `<div class="text-slate-400 text-sm mt-1">${esc(data.district)}</div>` : ''}
    </div>
  `;
}

// ─── EMISSIONS ────────────────────────────────────────────────────────────────
function renderEmissions(data) {
  const rows = data.rows || [];
  if (!rows.length) return '<div class="py-10 text-center text-slate-400 text-sm">Нет данных о выбросах</div>';

  const maxVal = Math.max(...rows.map(r => r.vsego_t || 0));
  const fmt = v => (v != null) ? Number(v).toLocaleString('ru-RU') : '—';
  const year = (data.meta && data.meta.year) ? data.meta.year : 2024;

  const tableRows = rows.map((row, i) => {
    const val = row.vsego_t || 0;
    const pct = maxVal > 0 ? Math.round(val / maxVal * 100) : 0;
    const barColor = val > 10000 ? 'bg-red-500' : val > 3000 ? 'bg-orange-400' : val > 800 ? 'bg-yellow-400' : 'bg-green-400';
    const badge = row.data_status === 'report'
      ? '<span class="text-[10px] text-emerald-600 font-bold" title="Официальный отчёт">✓</span>'
      : '<span class="text-[10px] text-amber-500" title="Оценка">~</span>';
    return `
      <tr class="border-b border-slate-100 hover:bg-slate-50">
        <td class="py-2.5 px-4 text-sm text-slate-700">${i + 1}. <span class="font-medium">${esc(row.name || '')}</span> ${badge}</td>
        <td class="py-2.5 px-4">

let _tblSeq = 0;

// ─── District helpers for table filter bar ───────────────────────────────────
function _stripDistrictFromQuery(q) {
  // Strip district mentions using the same stems as router.py DISTRICTS
  const stems = [
    'дзержинск','железнодорожн','заельцовск','заельцов',
    'калининск','кировск','ленинск','октябрьск',
    'первомайск','советск','централь','центр','кольцов',
    'академгородк','шлюз',
  ];
  let s = q;
  for (const stem of stems) {
    s = s.replace(new RegExp('\\s*(в\\s+)?' + stem + '[а-яёa-z]*\\s*(район[еа]?|р-не?)?', 'gi'), ' ');
  }
  return s.replace(/\s+/g, ' ').trim();
}

function _distQuerySuffix(label) {
  // Convert nominative adjective label → prepositional suffix for query
  // "Советский" → " в Советском районе", "Железнодорожный" → " в Железнодорожном районе"
  const prep = label.replace(/ский$/, 'ском').replace(/ный$/, 'ном');
  return ` в ${prep} районе`;
}

function toggleTable(id) {
  const tbody = document.getElementById(id + '_body');
  const btn   = document.getElementById(id + '_btn');
  const grad  = document.getElementById(id + '_grad');
  if (!tbody || !btn) return;
  const collapsed = btn.dataset.collapsed === 'true';
  tbody.querySelectorAll('.tbl-row-hidden').forEach(r => {
    r.style.display = collapsed ? '' : 'none';
  });
  if (grad) grad.style.display = collapsed ? 'none' : '';
  btn.innerHTML     = collapsed ? '&#9650; Свернуть' : '&#9660; ' + btn.dataset.more;
  btn.dataset.collapsed = String(!collapsed);
}

function renderTable(data) {
  const rows = data.rows || [];
  const cols = data.columns || [];

  const tblId = `tbl${++_tblSeq}`;
  const count = data.count ?? rows.length;
  const shown = rows.length;
  const needsCollapse = shown > 3;

  // ─ District filter bar ─────────────────────────────────────────────────────
  const baseQ     = _pageQuery ? _stripDistrictFromQuery(_pageQuery) : '';
  const activeDist = data.district || '';
  const mainDists  = NSK_DISTRICTS.filter(d => !d.desc || d.val === '');
  const distBarHtml = data._skipDistBar ? '' : `
    <div class="dist-filter-bar border-b border-slate-100" style="border-radius:0">
      <span class="text-xs text-slate-400 flex-shrink-0">Район:</span>
      ${mainDists.map(di => {
        const isAct = di.val === activeDist;
        const q = di.val ? (baseQ + _distQuerySuffix(di.label)) : baseQ;
        const safeQ = q.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
        return `<span class="dist-filter-tag${isAct ? ' active' : ''}" onclick="askNow('${safeQ}')">${di.label}</span>`;
      }).join('')}
    </div>`;

  const headCells = cols.map(c =>
    `<th class="text-left text-xs font-semibold uppercase tracking-wider text-slate-400 px-4 py-3 border-b border-slate-100 whitespace-nowrap">${colLabel(c)}</th>`
  ).join('');

  const body = rows.map((r, rowIdx) => {
    const cells = cols.map(c => {
      const raw = r[c] ?? '';
      let val;
      if (c === 'Site' && raw && raw !== '—') {
        val = `<a href="${esc(raw)}" target="_blank" rel="noopener" class="text-blue-600 hover:underline">${esc(raw)}</a>`;
      } else if (c === 'Phone' && raw) {
        val = `<a href="tel:${esc(raw)}" class="text-slate-600 hover:text-blue-600">${esc(String(raw))}</a>`;
      } else {
        val = `<span class="text-slate-700">${esc(String(raw === null || raw === undefined ? '—' : raw))}</span>`;
      }
      return `<td class="px-4 py-2.5 text-sm whitespace-nowrap">${val}</td>`;
    }).join('');
    const extra = needsCollapse && rowIdx >= 3;
    return `<tr class="border-b border-slate-50 last:border-0 hover:bg-slate-50/80 transition-colors${extra ? ' tbl-row-hidden' : ''}"${extra ? ' style="display:none"' : ''}>${cells}</tr>`;
  }).join('');

  // Pagination bar
  const totalShown = _pageOffset + shown;
  const hasPrev = _pageOffset > 0;
  const hasNext = totalShown < count;
  let moreHtml = '';
  if (hasPrev || hasNext) {
    const prevBtn = hasPrev
      ? `<button onclick="fetchPage(${Math.max(0, _pageOffset - _pageSize)})"
           class="px-3 py-1.5 rounded-lg border border-slate-200 bg-white hover:bg-slate-50 text-xs text-slate-600 font-medium transition-colors">← Назад</button>`
      : '';
    const nextBtn = hasNext
      ? `<button onclick="fetchPage(${_pageOffset + _pageSize})"
           class="px-3 py-1.5 rounded-lg border border-blue-200 bg-blue-50 hover:bg-blue-100 text-xs text-blue-700 font-medium transition-colors">Ещё ${Math.min(_pageSize, count - totalShown)} объектов →</button>`
      : '';
    const info = `<span class="text-xs text-slate-400">${_pageOffset + 1}–${totalShown} из ${Number(count).toLocaleString('ru-RU')}</span>`;
    moreHtml = `
      <div class="px-5 py-3 bg-slate-50 border-t border-slate-100 flex items-center justify-between gap-3 flex-wrap">
        ${info}
        <div class="flex gap-2">${prevBtn}${nextBtn}</div>
      </div>`;
  }

  const noteHtml = data.note
    ? `<div class="mt-3 bg-amber-50 border border-amber-200 rounded-xl px-4 py-3 text-sm text-amber-700">ℹ️ ${esc(data.note)}</div>`
    : '';

  const moreLabel = `Показать все ${shown} строк`;
  const collapseBar = needsCollapse ? `
    <div class="px-5 py-2 border-t border-slate-100 flex justify-center bg-slate-50/60">
      <button id="${tblId}_btn"
              data-collapsed="true"
              data-more="${moreLabel}"
              onclick="toggleTable('${tblId}')"
              class="text-xs text-slate-500 hover:text-blue-600 font-medium transition-colors py-0.5 flex items-center gap-1">
        &#9660; ${moreLabel}
      </button>
    </div>` : '';

  if (!rows.length) {
    return `
      <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
        <div class="px-5 py-3.5 border-b border-slate-100 flex justify-between items-center">
          <span class="text-xs font-semibold uppercase tracking-widest text-slate-400">Результаты</span>
          <span class="text-xs text-slate-400">Найдено: <strong class="text-slate-600">0</strong></span>
        </div>
        ${distBarHtml}
        <div class="py-10 flex flex-col items-center gap-2 text-slate-400">
          <span style="font-size:2rem">🔍</span>
          <span class="text-sm">В этом районе объектов не найдено</span>
        </div>
      </div>
    `;
  }

  return `
    <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
      <div class="px-5 py-3.5 border-b border-slate-100 flex justify-between items-center">
        <span class="text-xs font-semibold uppercase tracking-widest text-slate-400">
          ${data.operation === 'TOP_N' ? `Топ-${shown}` : 'Результаты'}
        </span>
        <span class="text-xs text-slate-400">
          Найдено: <strong class="text-slate-600">${Number(count).toLocaleString('ru-RU')}</strong>
          ${count > shown ? ` · показано ${shown}` : ''}
        </span>
      </div>
      ${distBarHtml}
      <div class="relative overflow-x-auto">
        <table class="min-w-full">
          <thead><tr>${headCells}</tr></thead>
          <tbody id="${tblId}_body">${body}</tbody>
        </table>
        ${needsCollapse ? `<div id="${tblId}_grad" class="absolute bottom-0 left-0 right-0 h-8 bg-gradient-to-t from-white to-transparent pointer-events-none"></div>` : ''}
      </div>
      ${collapseBar}
      ${moreHtml}
    </div>
    ${noteHtml}
  `;
}

  const distOpts = [

    {label: 'Железнодор.',     val: 'Железнодорожный район',   q: `${baseQuery} в Железнодорожном районе`},
    {label: 'Заельцовский',    val: 'Заельцовский район',      q: `${baseQuery} в Заельцовском районе`},
    {label: 'Калининский',     val: 'Калининский район',       q: `${baseQuery} в Калининском районе`},
    {label: 'Кировский',       val: 'Кировский район',         q: `${baseQuery} в Кировском районе`},

    {label: 'Первомайский',    val: 'Первомайский район',      q: `${baseQuery} в Первомайском районе`},
    {label: 'Советский',       val: 'Советский район',         q: `${baseQuery} в Советском районе`},
    {label: 'Центральный',     val: 'Центральный район',       q: `${baseQuery} в Центральном районе`},
  ];

  // District suffix for type-switcher (preserves active district when switching type)
  const activeDist = distOpts.find(d => d.val === currentDistrict);
  const distSuffix = activeDist ? activeDist.q.slice(baseQuery.length) : '';

  // Totals from meta (whole city)
  const metaC = data.meta || {};
  const pTotal = Number(metaC.permits_total || 0);
  const aTotal = Number(metaC.active_total || 0);
  const cTotal = Number(metaC.commissioned_total || 0);
  const fmt = n => Number(n).toLocaleString('ru-RU');

  const typeOpts = [
    { op: 'CONSTRUCTION_PERMITS',      icon: '⛏️', label: 'Разрешения (124)',        cnt: pTotal, q: 'разрешения на строительство' + distSuffix },
    { op: 'CONSTRUCTION_ACTIVE',       icon: '🔧', label: 'Активные стройки',         cnt: aTotal, q: 'активные стройки' + distSuffix },
    { op: 'CONSTRUCTION_COMMISSIONED', icon: '🔑', label: 'Введено в экспл. (125)',   cnt: cTotal, q: 'ввод в эксплуатацию' + distSuffix },
  ];

  const formulaHtml = (pTotal > 0 && cTotal > 0) ? `
    <div class="text-xs text-slate-400 mt-2 pt-2 border-t border-slate-100">
      Из <strong class="text-slate-600">${fmt(pTotal)}</strong> разрешений →

      <span title="Один объект может иметь несколько разрешений (корпуса, этапы, стоянки). Исключение идёт по кадастровому номеру: если хоть одно разрешение участка введено в эксплуатацию — все разрешения этого участка убираются из «активных». Поэтому ${fmt(pTotal)} − ${fmt(cTotal)} ≠ ${fmt(aTotal)}" style="cursor:help;border-bottom:1px dashed #94a3b8">(?)</span>
      · реестр введённых: <strong class="text-slate-600">${fmt(cTotal)}</strong> объектов

  const typeSwitcherHtml = `
    <div class="bg-white rounded-2xl border border-slate-200 shadow-sm px-5 py-3.5">
      <div class="flex flex-wrap gap-2">
        ${typeOpts.map(t => {

            class="flex items-center gap-1.5 text-xs px-3 py-1.5 rounded-xl border font-medium transition-colors ${isAct

      </div>

    </div>`;

  const filterHtml = `
    <div class="bg-white rounded-2xl border border-slate-200 shadow-sm px-5 py-3.5">
      <div class="flex flex-wrap items-center gap-x-2 gap-y-2">
        <span class="text-xs text-slate-400 font-medium mr-1">🗺️ Район:</span>

          const isAct = currentDistrict === d.val || (!currentDistrict && d.val === '');

        }).join('')}
      </div>
    </div>`;

  const tableHtml = renderTable({...data, note: null, _skipDistBar: true});
  return noteHtml + typeSwitcherHtml + filterHtml + tableHtml;
}
