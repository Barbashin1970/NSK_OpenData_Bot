# ─────────────────────────────────────────────────────────────────────────────
# Производственный календарь РФ — нерабочие и особые дни
# Источник: Постановления Правительства РФ
#
# Типы:
#   holiday      — нерабочий праздничный день
#   bridge       — перенесённый выходной (мост между праздником и уик-эндом)
#   post_holiday — первый рабочий день после длинных каникул (повышенный трафик)
#   pre          — предпраздничный укороченный рабочий день
# ─────────────────────────────────────────────────────────────────────────────

holidays:
  # ── 2025 ──────────────────────────────────────────────────────────────────
  # Новогодние каникулы + Рождество: 1–8 января
  - {date: "2025-01-01", type: holiday}
  - {date: "2025-01-02", type: holiday}
  - {date: "2025-01-03", type: holiday}
  - {date: "2025-01-04", type: holiday}
  - {date: "2025-01-05", type: holiday}
  - {date: "2025-01-06", type: holiday}
  - {date: "2025-01-07", type: holiday}
  - {date: "2025-01-08", type: holiday}
  - {date: "2025-01-09", type: post_holiday,  note: "Возврат всех в город"}
  # 23 февраля (вс) → перенос на пн 24; пятница 22-го — предпраздничный
  - {date: "2025-02-22", type: pre}
  - {date: "2025-02-24", type: holiday}
  # 8 марта (сб) → перенос на пн 10; пятница 7-го — предпраздничный
  - {date: "2025-03-07", type: pre}
  - {date: "2025-03-10", type: holiday}
  # Майские: 1 мая (чт), 2 (пт-мост), 8 (чт-мост), 9 мая (пт)
  - {date: "2025-04-30", type: pre}
  - {date: "2025-05-01", type: holiday}
  - {date: "2025-05-02", type: bridge}
  - {date: "2025-05-08", type: bridge}
  - {date: "2025-05-09", type: holiday}
  # 12 июня (чт) + пт-мост; среда 11-го — предпраздничный
  - {date: "2025-06-11", type: pre}
  - {date: "2025-06-12", type: holiday}
  - {date: "2025-06-13", type: bridge}
  # 4 ноября (вт) + пн-мост
  - {date: "2025-11-03", type: bridge}
  - {date: "2025-11-04", type: holiday}
  # 31 декабря — укороченный рабочий день
  - {date: "2025-12-31", type: pre}

  # ── 2026 ──────────────────────────────────────────────────────────────────
