  - {date: "2026-01-06", type: holiday}
  - {date: "2026-01-07", type: holiday}
  - {date: "2026-01-08", type: holiday}
  - {date: "2026-01-09", type: post_holiday,  note: "Возврат всех в город"}
  # 23 февраля (пн) — само по себе
  - {date: "2026-02-23", type: holiday}
  # 8 марта (вс) → пн 9-го; пятница 6-го — предпраздничный
  - {date: "2026-03-06", type: pre}
  - {date: "2026-03-09", type: holiday}
  # 1 мая (пт); чт 30 апр — предпраздничный
  - {date: "2026-04-30", type: pre}
  - {date: "2026-05-01", type: holiday}
  # 9 мая (сб) → пт 8-го выходной (перенос по декрету)
