# ─────────────────────────────────────────────────────────────────────────────
# Регламент: Пороги экологических рисков
# Версия 1.0 — Фаза 0, инициализирована из ecology_cache.py
# ─────────────────────────────────────────────────────────────────────────────
version: "1.0"

# ── Риски (5 сценариев) ───────────────────────────────────────────────────────

risks:
  smog_trap:
    # Экологическая ловушка: штиль + загрязнение
    wind_threshold_ms: 1.5      # ветер ниже этого → стагнация воздуха
    pm25_warning_threshold: 20  # мкг/м³ — появляется риск
    pm25_critical_threshold: 35 # мкг/м³ — критично (= норма ВОЗ)

  pdk:
    # Превышение суточной нормы ВОЗ по PM2.5
    threshold: 35.0             # мкг/м³
    # Также используется в query_pdk_exceedances()

  black_ice:
    # Риск чёрного льда по температурному диапазону
    temp_min: -3.0              # °C
    temp_max: 2.0               # °C

  temp_shock:
    # Резкое похолодание за сутки
    delta_threshold: -15.0      # °C / 24ч (падение на 15 и более → критично)

  extreme_cold:
    warning_threshold:  -20.0   # °C — предупреждение
    critical_threshold: -30.0   # °C — критично

# ── Прогнозные флаги (forecast risk flags) ───────────────────────────────────
forecast:
  ice_risk:
    # Условие: (t_min ≤ 0 ≤ t_max) ИЛИ (-3 ≤ t_min ≤ 2)
    crossing_zero: true         # включает проверку пересечения нуля
    temp_zone_min: -3.0
    temp_zone_max: 2.0
  cold_risk:
    threshold: -20.0            # °C
  snow_risk:
    wmo_code_min: 70
    wmo_code_max: 86

# ── Исторические данные ───────────────────────────────────────────────────────
# Также определены в constants.py — здесь для документации и будущей миграции
retention:
  history_days: 30              # скользящее окно fact_measurements
  archive_days: 365             # ecology_daily_archive
  ttl_minutes: 15               # интервал обновления из Open-Meteo
