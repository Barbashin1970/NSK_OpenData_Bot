# ─────────────────────────────────────────────────────────────────────────────
# Регламент: Пороги экологических рисков
# Версия 1.0 — Фаза 0, инициализирована из ecology_cache.py
# ─────────────────────────────────────────────────────────────────────────────
version: "1.0"

# ── Риски (5 сценариев) ───────────────────────────────────────────────────────

risks:
  smog_trap:
    # Экологическая ловушка: штиль + загрязнение
    wind_threshold_ms: 1.5      # ветер ниже этого → стагнация воздуха
    pm25_warning_threshold: 20  # мкг/м³ — появляется риск
    pm25_critical_threshold: 35 # мкг/м³ — критично (= норма ВОЗ)

  pdk:
    # Превышение суточной нормы ВОЗ по PM2.5
    threshold: 35.0             # мкг/м³
    # Также используется в query_pdk_exceedances()

  black_ice:
    # Риск чёрного льда по температурному диапазону
    temp_min: -3.0              # °C
    temp_max: 2.0               # °C

  temp_shock:
    # Резкое похолодание за сутки
    delta_threshold: -15.0      # °C / 24ч (падение на 15 и более → критично)

  extreme_cold:
    warning_threshold:  -20.0   # °C — предупреждение
    critical_threshold: -30.0   # °C — критично

# ── Прогнозные флаги (forecast risk flags) ───────────────────────────────────
forecast:
  ice_risk:
    # Условие: (t_min ≤ 0 ≤ t_max) ИЛИ (-3 ≤ t_min ≤ 2)
    crossing_zero: true         # включает проверку пересечения нуля
    temp_zone_min: -3.0
    temp_zone_max: 2.0
  cold_risk:
    threshold: -20.0            # °C
  snow_risk:
    wmo_code_min: 70
    wmo_code_max: 86

  # ── Индекс влияния снегопада (snow_impact: 0–10) ──────────────────────────
  # Формула: base_score(по суточному объёму) + accumulation_bonus(окно N дней)
  # Региональный коэффициент масштабирует см → «эквивалент Новосибирска»
  # Пример: Омск regional_coefficient=0.5 (осадков ~вдвое меньше НСК)
  snow_impact:
    # Суточные пороги (после коррекции на региональный коэффициент)
    light_cm: 1.0               # ≥ 1 см/сутки → лёгкий снег
    light_score: 2
    moderate_cm: 5.0            # ≥ 5 см/сутки → умеренный снегопад
    moderate_score: 5
    heavy_cm: 15.0              # ≥ 15 см/сутки → сильный снегопад
    heavy_score: 8
    # Накопление за N дней (длительный снегопад опаснее разового)
    accumulation_days: 3        # окно подсчёта (текущий + 2 предыдущих дня)
    accumulation_moderate_cm: 10  # ≥ 10 см за окно → индекс ≥ 6
    accumulation_heavy_cm: 20    # ≥ 20 см за окно → индекс ≥ 9
    # Региональный коэффициент — масштабирует реальные см осадков
    # 1.0 = Новосибирск (базовый), 0.5 = Омск, 0.8 = Екатеринбург, 1.2 = СПб
    regional_coefficient: 1.0
    # Уровни (для дашборда служащего)
    levels:
      - {max: 2, label: "Без снега",          action: ""}
      - {max: 4, label: "Лёгкий снег",        action: "Мониторинг дворовых территорий"}
      - {max: 6, label: "Умеренный снегопад",  action: "Подготовить снегоуборочную технику, оповестить УК"}
      - {max: 8, label: "Сильный снегопад",    action: "Вывести технику, проверить готовность УК к расчистке дворов"}
      - {max: 10, label: "Экстремальный",      action: "Штаб ЧС, мобилизация всей техники, контроль кровель"}

# ── Исторические данные ───────────────────────────────────────────────────────
# Также определены в constants.py — здесь для документации и будущей миграции
retention:
  history_days: 30              # скользящее окно fact_measurements
  archive_days: 365             # ecology_daily_archive
  ttl_minutes: 15               # интервал обновления из Open-Meteo
