# ─────────────────────────────────────────────────────────────────────────────
# Регламент: Синтетический индекс дорожной нагрузки
# Версия 1.0 — Фаза 0, инициализирована из traffic_index.py
#
# Все значения соответствуют захардкоженным константам.
# Изменение этого файла + POST /admin/reload-rules применяет новые веса
# без перезапуска сервера.
# ─────────────────────────────────────────────────────────────────────────────
version: "1.0"

# ── Паттерны часов пик ───────────────────────────────────────────────────────
# start/end — часы (float, 0.0..24.0), score — базовый балл нагрузки
time_zones:
  - {start:  0.0, end:  6.0, score: 0.3, label: "Ночь"}
  - {start:  6.0, end:  7.5, score: 1.8, label: "Раннее утро"}
  - {start:  7.5, end:  9.5, score: 5.5, label: "Утренний час пик"}
  - {start:  9.5, end: 11.0, score: 3.2, label: "Постпиковое утро"}
  - {start: 11.0, end: 13.0, score: 2.8, label: "Середина дня"}
  - {start: 13.0, end: 14.5, score: 3.5, label: "Обеденное время"}
  - {start: 14.5, end: 16.5, score: 3.0, label: "Послеобеденное время"}
  - {start: 16.5, end: 19.0, score: 5.0, label: "Вечерний час пик"}
  - {start: 19.0, end: 22.0, score: 2.5, label: "Вечер"}
  - {start: 22.0, end: 24.0, score: 1.2, label: "Поздний вечер"}

# Масштаб выходного/праздничного дня (трафик ~вдвое меньше будней)
weekend_scale: 0.45

# ── Модификаторы дня недели и типа дня ──────────────────────────────────────
day_modifiers:
  monday:
    hours_from: 7.0
    hours_to: 10.0
    delta: 0.8
    name: "Понедельничный эффект"
    description: "Все возвращаются к работе после выходных — движение плотнее"
    emoji: "😴"
  friday:
    hours_from: 16.0
    hours_to: 24.0
    delta: 0.7
    name: "Пятничный исход"
    description: "Все спешат покинуть город на выходные — вечерний пик усилен"
    emoji: "🏁"
  pre_holiday:
    delta: -0.4
    name: "Предпраздничный день"
    description: "Укороченный рабочий день — многие уезжают раньше обычного"
    emoji: "🎉"
  post_holiday:
    delta: 1.2
    name: "Возврат после каникул"
    description: "Все возвращаются в город после длинных праздников — пробки выше нормы"
    emoji: "🏠➡🏙"
  # Модификаторы на праздниках применяются с этим коэффициентом (слабее обычного)
  holiday_scale: 0.5

# ── Ежегодные городские события ──────────────────────────────────────────────
# morning_only: true — событие влияет только в 07:00–10:00
annual_events:
  - {month: 9,  day: 1,  delta: 2.0, morning_only: true,  emoji: "📅", label: "1 Сентября"}
  - {month: 6,  day: 25, delta: 1.0, morning_only: false, emoji: "📅", label: "Выпускной вечер"}
  - {month: 12, day: 28, delta: 1.5, morning_only: false, emoji: "📅", label: "Канун новогодних каникул"}
  - {month: 12, day: 29, delta: 2.0, morning_only: false, emoji: "📅", label: "Предновогодняя суета"}
  - {month: 12, day: 30, delta: 2.0, morning_only: false, emoji: "📅", label: "Предновогодняя суета"}

# ── Погодные факторы ─────────────────────────────────────────────────────────
weather:
  # WMO weathercode → категория осадков
  wmo_codes:
    snow:  [71, 73, 75, 77, 85, 86]
    rain:  [51, 53, 55, 61, 63, 65, 80, 81, 82]
    ice:   [56, 57, 66, 67]
    storm: [95, 96, 99]
    fog:   [45, 48]

  snow:
    heavy_threshold_mm: 5.0     # выше этого порога — "сильный снегопад"
    heavy_delta: 2.5
    normal_delta: 1.5
    first_snow_months: [10, 11] # октябрь–ноябрь: город не готов
    first_snow_extra_delta: 1.5

  rain:
    heavy_threshold_mm: 10.0
    heavy_delta: 1.5
    normal_delta: 0.8

  ice:
    delta: 2.5

  storm:
    delta: 2.0

  fog:
    delta: 0.8

  black_ice:                    # температура ≈0 + осадки → гололедица
    temp_min: -3.0
    temp_max: 2.0
    delta: 1.0

  frost:
    extreme_threshold: -30.0   # ниже этого — машины не заводятся, меньше авто
    extreme_delta: -1.5
    strong_threshold: -20.0
    strong_delta: -0.5

  wind:
    strong_threshold_ms: 15.0
    strong_delta: 0.5

# ── Уровни классификации индекса ─────────────────────────────────────────────
# max — верхняя граница диапазона (не включительно, кроме последнего)
levels:
  - {max:  2.0, label: "Свободно",     emoji: "🟢"}
  - {max:  3.5, label: "Умеренно",     emoji: "🟡"}
  - {max:  5.0, label: "Затруднено",   emoji: "🟠"}
  - {max:  6.5, label: "Сложно",       emoji: "🔴"}
  - {max:  8.5, label: "Очень сложно", emoji: "🔴"}
  - {max: 99.0, label: "Коллапс",      emoji: "⛔"}

# ── Сезонность: влияет на текст рекомендаций ─────────────────────────────────
seasonal:
  scooter:
    # Период доступности самокатов (включительно)
    # Формат: MM-DD
    available_from: "05-01"   # 1 мая
    available_to:   "10-31"   # 31 октября
    # Подсказка для замены {transport_hint} в тексте рекомендаций
    hint_in_season:   "метро, электросамокаты или пешие маршруты"
    hint_out_season:  "метро или пешие маршруты"

# ── Тексты рекомендаций ───────────────────────────────────────────────────────
# {transport_hint} заменяется на seasonal.scooter.hint_in_season / hint_out_season
tips:
  free:
    citizen:  "Дороги свободны. Отличное время для поездки."
    official: "Штатный режим. Усиления не требуется."
  moderate:
    citizen:  "Движение умеренное. Поездка комфортная."
    official: "Штатный мониторинг."
  difficult:
    citizen:  "Возможны заторы. Заложите дополнительно 15–20 минут."
    official: "Рекомендуется мониторинг ключевых перекрёстков."
  complex:
    citizen:  "Значительные заторы. Рассмотрите общественный транспорт или метро."
    official: "Рассмотреть регулировку светофоров на пиковых узлах."
  very_complex:
    citizen:  "Серьёзные пробки. Используйте {transport_hint}."
    official: "Задействовать ручное управление движением на перегруженных узлах."
  collapse:
    citizen:  "Коллапс. Оставайтесь дома или используйте только метро и пешеходные маршруты."
    official: "Режим чрезвычайной нагрузки. Аварийное регулирование. Экстренное информирование населения."

# Дополнения к тексту гражданина при конкретных факторах (добавляются через пробел)
factor_hints:
  first_snow:    "⚠️ Первый снег — экстремально скользко! Пересядьте на метро."
  ice:           "🧊 Гололедица: при поездке снизьте скорость вдвое."
  monday:        "Выезжайте до 07:30 или после 09:30."
  friday:        "Пятничный вечер: выезжайте после 20:00 или используйте ОТ."
  post_holiday:  "Первый день после праздников — трафик выше нормы весь день."
