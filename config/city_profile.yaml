# ── Открытые данные ───────────────────────────────────────────────────────────

opendata_base_url: "https://opendata.novo-sibirsk.ru"
knowledge_base: "src/ciinsu_knowledge_base.json"

# ── Статические датасеты (хранятся в git, не скачиваются по TTL) ─────────────
# Файлы данных специфичные для города.
# Для нового города: enabled: false + note → бот покажет заглушку «данные
# недоступны» вместо ошибки. Как только файл готов — enabled: true, file: путь.
#
# Масштабирование на другие города:
#   emissions   — 2-ТП Воздух публикуется на rpn.gov.ru для ВСЕХ регионов РФ.
#                 Скачать отчёт нужного субъекта → конвертировать в тот же формат JSON.
#   heat_sources — СГК работает в 17 городах РФ (sibgenco.ru/cities/).
#                 Для других операторов (ТГК-1, Квадра, КТК) — аналогичный GeoJSON.

static_datasets:

  emissions:
    enabled: true
    file: "data/nsk_emissions_2tp.json"    # путь от PROJECT_ROOT
    scope: "Новосибирская область"          # что охватывает датасет
    municipalities_count: 34               # 34 МО НСО в файле
    year: 2024
    form: "2-ТП Воздух"
    source: "Росприроднадзор (rpn.gov.ru)"
    published: "2025-03"
    # Для другого города: создать data/<city_id>_emissions_2tp.json
    # Формат: {"year":..., "form":"2-ТП Воздух", "municipalities":[{id,name,lat,lon,vsego_t,...}]}

  heat_sources:
    enabled: true
    file: "data/nsk_heat_sources_v1.geojson"   # путь от PROJECT_ROOT
    total_objects: 7
    operators:
      - "СГК"          # АО «СГК-Новосибирск» — 5 ТЭЦ
      - "УЭВ СО РАН"   # ФГУП «УЭВ» СО РАН — 2 котельных Академгородка
    note: "Пилотный проект цифровизации тепловых сетей НГУ ЦИИ"
    # Для другого города: создать data/<city_id>_heat_sources_v1.geojson
    # Формат: GeoJSON FeatureCollection, координаты WGS84
    # Обязательные поля properties: id, short_name, type, fuel, operator_group,
    #   district, thermal_gcal_h, electric_mw (0 если нет), digitalization_status

  metro:
    enabled: true
    file: "data/cities/novosibirsk/metro.json"
    lines_count: 2
    stations_count: 13
    opened_year: 1985
    # Для другого города: создать data/cities/<city_id>/metro.json
    # Формат: {"info":{...}, "lines":{...}, "stations":[{name,line,_lon,_lat,district,...}]}

  airport:
    enabled: true
    file: "data/cities/novosibirsk/airport.json"
    iata: "OVB"
    name: "Толмачёво"
    # Для другого города: создать data/cities/<city_id>/airport.json
    # Формат: {name,iata,icao,_lon,_lat,terminals:[...],transport:[...]}
