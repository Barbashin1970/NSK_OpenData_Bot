# =============================================================================
# Профиль города — Новосибирск
# =============================================================================
# Единственный источник городского знания для NSK OpenData Bot.
# Все Python-модули читают город ТОЛЬКО через src/city_config.py.
# Для другого города: создать city_profile_<id>.yaml, запустить с
#   CITY_PROFILE=city_profile_<id> bot serve
# =============================================================================

# ── Основные параметры города ─────────────────────────────────────────────────

city:
  id: "novosibirsk"
  name: "Новосибирск"                # именительный: «Новосибирск»
  name_genitive: "Новосибирска"      # родительный:  «данные Новосибирска»
  name_prepositional: "Новосибирске" # предложный:   «в Новосибирске»
  slug: "novosibirsk"                # для 2GIS deep-link URL
  yandex_region_id: 65              # Яндекс.Пробки region ID
  timezone: "Asia/Novosibirsk"
  utc_offset: 7                      # UTC+7

  # Географический центр города (lon, lat)
  center:
    lat: 54.9885
    lon: 82.9207

  # Ограничивающий прямоугольник — используется в Overpass API bbox-запросах
  # Формат Overpass: (lat_min, lon_min, lat_max, lon_max)
  bbox:
    lat_min: 54.70
    lat_max: 55.25
    lon_min: 82.60
    lon_max: 83.40

# ── Административные районы ───────────────────────────────────────────────────
# Ключ — каноническое название района (используется в SQL-фильтрах и рендере).
# Значение — список стемов для сопоставления с пользовательским запросом.
# Кольцово — наукоград (городской округ НСО), включён как отдельная локация
# (есть точка мониторинга погоды и воздуха).

districts:
  "Дзержинский район":      ["дзержинск"]
  "Железнодорожный район":  ["железнодорожн"]
  "Заельцовский район":     ["заельцовск", "заельцов"]
  "Калининский район":      ["калининск"]
  "Кировский район":        ["кировск"]
  "Ленинский район":        ["ленинск"]
  "Октябрьский район":      ["октябрьск"]
  "Первомайский район":     ["первомайск"]
  "Советский район":        ["советск"]
  "Центральный район":      ["централь", "центр"]
  "Кольцово":               ["кольцов"]

# ── Подрайоны и микрорайоны ───────────────────────────────────────────────────
# Каждая запись: name, parent (канонический район), examples (для документации),
# patterns (список regex-строк, применяются по порядку).
# Порядок внутри patterns: от более специфичного к менее специфичному.
# YAML single-quoted strings — backslash передаётся «как есть» в re.compile().

sub_districts:

  - name: "Академгородок"
    parent: "Советский район"
    examples: ["академгородок", "Academ", "в Академе", "Академa", "к Академy"]
    patterns:
      # Полное название и все падежные формы (именит./родит./предл./творит.)
      - 'академгород'
      # Латиница на вывесках и сайтах: «Academ парк», «в Academ»
      - '(?i)(?<![а-яёa-z])academ(?![a-z])'
      # Разговорное «Академе/Академa/Академy» — все падежи + кирилл./лат. омоглифы
      - '(?<![а-яёa-z])акад[еe]м[еeаaуy]?(?![а-яёa-z])'

  - name: "Шлюз"
    parent: "Советский район"
    examples: ["шлюз", "на Шлюзе", "шлюзовой"]
    patterns:
      - '(?<![а-яё])шлюз'

  - name: "Верхняя зона"
    parent: "Советский район"
    examples: ["верхняя зона", "в Верхней зоне"]
    patterns:
      - 'верхн\w*\s+зон'

  - name: 'мкр. "Щ"'
    parent: "Советский район"
    examples: ['мкр. Щ', 'микрорайон Щ', 'в Щ']
    patterns:
      # Полные формы: «мкр. Щ», «мкр.Щ», «мкр Щ», «микрорайон «Щ»»
      - 'мкр[\s.]*щ\b|микрорайон\s*[«"]?щ'
      # Короткая форма: одиночная буква «Щ» без буквенного окружения
      - '(?<![а-яёa-z])щ(?![а-яёa-z])'

# ── Координаты центров районов ────────────────────────────────────────────────
# Используются для маршрутизации транспортных запросов (transport_api.py)
# и определения ближайшего района (medical_cache.py).
# Хранятся как (lon, lat) — порядок 2GIS API.

district_coords:
  "Центральный район":      {lon: 82.9090, lat: 54.9884}
  "Советский район":        {lon: 83.1091, lat: 54.8441}
  "Дзержинский район":      {lon: 82.9650, lat: 54.9823}
  "Железнодорожный район":  {lon: 82.8860, lat: 54.9954}
  "Заельцовский район":     {lon: 82.9550, lat: 54.9893}
  "Калининский район":      {lon: 82.8880, lat: 55.0190}
  "Кировский район":        {lon: 82.8190, lat: 54.9600}
  "Ленинский район":        {lon: 82.8800, lat: 54.9460}
  "Октябрьский район":      {lon: 82.8190, lat: 54.9940}
  "Первомайский район":     {lon: 82.8710, lat: 54.8780}
  "Кольцово":               {lon: 83.1818, lat: 54.9394}

# ── Городские стоп-слова для геокодера ───────────────────────────────────────
# Слова, которые нельзя принять за название улицы (город + его локации).
# Общие стоп-слова (район, тип, количество…) остаются в router.py.

city_stopwords:
  - "новосибирск"
  - "новосибирске"
  - "кольцово"
  - "кольцов"

# ── Возможности города (features) ────────────────────────────────────────────
# Управляют активацией тем в роутере.
# has_metro: false → тема metro недоступна (в Омске нет метро)

features:
  # Стандартные темы (школы, аптеки, остановки…) — через OSM Overpass API
  # CSV с opendata.novo-sibirsk.ru заменён на OSM для полноты данных (466 vs 27 аптек и т.д.)
  # Строительство (has_construction) остаётся на CSV — уникальные датасеты 124/125
  opendata_csv_enabled: false

  has_construction: true   # Разрешения на строительство (opendata.novo-sibirsk.ru, датасеты 124/125)

  has_metro: true
  metro_name: "Новосибирский метрополитен"

  has_airport: true
  airport_iata: "OVB"
  airport_icao: "UNNT"
  airport_name: "Аэропорт Толмачёво"
  # Полный список keyword-стемов для _route_airport() (первичные — для быстрой проверки)
  airport_keywords_primary:
    - "аэропорт"
    - "толмачёв"
    - "толмачев"
    - "авиарейс"
    - "вылет"
    - "прилёт"
    - "прилет"
    - "самолёт"
    - "самолет"
    - "авиабилет"
    - "ovb"
    - "аэровокзал"
  airport_keywords_full:
    - "аэропорт"
    - "толмачёв"
    - "толмачев"
    - "авиарейс"
    - "вылет"
    - "прилёт"
    - "прилет"
    - "авиабилет"
    - "самолёт"
    - "самолет"
    - "рейс из новосибирск"
    - "рейс в новосибирск"
    - "ovb"
    - "новапорт"
    - "аэровокзал"

  # Отключения ЖКХ — городской сайт 051
  power_outages_url: "http://051.novo-sibirsk.ru/sitepages/off.aspx"
  power_outages_base: "http://051.novo-sibirsk.ru"

