# =============================================================================
# Канонические схемы датасетов — City OpenData Bot
# =============================================================================
# Единственный источник правды об именах полей.
# НЕЛЬЗЯ менять имена полей без обновления кода (executor.py, renderer.py,
# heat_sources.py, emissions.py и тестов).
#
# Соглашения:
#   - Все имена: строчные, транслит, подчёркивание вместо пробела
#   - Координаты всегда: _lat (широта), _lon (долгота)  — с подчёркиванием
#   - Районы всегда: rayon (для CSV-тем) или district (для статических)
#   - Единицы измерения входят в имя: _t (тонны), _kol (количество),
#     _gcal_h (Гкал/ч), _mw (МВт), _km (км), _m (метры), _min (минуты)
#   - Необязательные поля помечены required: false
#
# Типы полей:
#   str       — строка
#   int       — целое число
#   float     — дробное число
#   bool      — да/нет
#   date      — дата (YYYY-MM-DD или DD.MM.YYYY)
#   phone     — телефон
#   url       — ссылка
#   geo_lat   — широта WGS-84 (54.xxx)
#   geo_lon   — долгота WGS-84 (82.xxx)
#   list_str  — список строк через запятую или JSON-массив
# =============================================================================


# ── CSV-темы (динамические, скачиваются с opendata-порталов) ─────────────────
# Эти поля используются в executor.py SQL-запросах и renderer.py.
# Маппинг: city_profile.yaml → schema_mappings.<topic> → {canonical: city_col}

csv_topics:

  parking:
    label: "Парковки"
    description: "Парковочные пространства и стоянки"
    fields:
      nazvanie:        {label: "Название/адрес",          type: str,     required: true}
      rayon:           {label: "Район",                   type: str,     required: true}
      ulica:           {label: "Улица",                   type: str,     required: true}
      dom:             {label: "Дом",                     type: str,     required: false}
      tip:             {label: "Тип парковки",            type: str,     required: false}
      mest_kol:        {label: "Количество мест",         type: int,     required: false}
      mest_inv_kol:    {label: "Мест для инвалидов",      type: int,     required: false}
      ohrana:          {label: "Охрана",                  type: str,     required: false}
      regim:           {label: "Режим работы",            type: str,     required: false}
      status:          {label: "Статус",                  type: str,     required: false}
      _lat:            {label: "Широта",                  type: geo_lat, required: false}
      _lon:            {label: "Долгота",                 type: geo_lon, required: false}

  stops:
    label: "Остановки транспорта"
    description: "Остановки наземного общественного транспорта"
