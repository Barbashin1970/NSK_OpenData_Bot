# Реестр наборов данных NSK OpenData Bot
# Источник: opendata.novo-sibirsk.ru
# TTL по умолчанию: 24 часа

defaults:
  ttl_hours: 24
  encoding: utf-8-sig
  delimiter: ","

datasets:

  parking:
    name: "Парковки"
    description: "Парковочное пространство города Новосибирска"
    passport_url: "http://opendata.novo-sibirsk.ru/pass.aspx?ID=50"
    data_url: "http://opendata.novo-sibirsk.ru/OpenDataDocuments/Data50/data-20250626T1152-structure-20250626T1152.csv"
    format: csv
    keywords:
      - парковк
      - парковок       # сколько парковок (родительный падеж)
      - паркова        # парковая зона, паркование
      - парковочн
      - стоянк
      - машиноместа
      - машинное место
      - автопарк
      - место для авто
      - для машин      # место для машин, стоянка для машин
      - припаркова     # припарковаться, припаркованы
    fields:
      district_col: AdrDistr
      street_col: AdrStreet
      name_col: AdrStreet
      display_cols:
        - AdrDistr
        - AdrStreet
        - ParkType
        - NumMashMest
        - NumMashMestInv
        - ParkOhrana
        - Regim
      count_col: NumMashMest
      filter_cols:
        - {col: ParkType, label: "Тип парковки"}
        - {col: ParkStatus, label: "Статус"}
        - {col: Regim, label: "Режим работы"}
        - {col: ParkOhrana, label: "Охрана"}

  stops:
    name: "Остановки транспорта"
    description: "Остановки наземного городского пассажирского транспорта"
    passport_url: "http://opendata.novo-sibirsk.ru/pass.aspx?ID=49"
    data_url: "http://opendata.novo-sibirsk.ru/OpenDataDocuments/Data49/data-20260219T1724-structure-20260219T1724.CSV"
    format: csv
    keywords:
      - остановк
      - остановочн
      - автобусн
      - транспортн
      - троллейбусн
      - маршрутн
      - пассажирск
      - общественн транспорт
    fields:
      district_col: AdrDistr
      street_col: AdrStreet
      name_col: OstName
      display_cols:
        - OstName
        - AdrDistr
        - AdrStreet
        - Pavilion
        - Marshryt
      filter_cols:
        - {col: Pavilion, label: "Павильон"}

  culture:
    name: "Организации культуры"
    description: "Прочие муниципальные организации культуры города Новосибирска"
