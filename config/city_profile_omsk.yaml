# =============================================================================
# Профиль города — Омск
# =============================================================================
# Шаблон для нового города. Все static_datasets: enabled: false пока нет данных.
# Когда файл данных готов — менять enabled: true + file: путь.
# Запуск: CITY_PROFILE=city_profile_omsk bot serve
# =============================================================================

# ── Основные параметры города ─────────────────────────────────────────────────

city:
  id: "omsk"
  name: "Омск"
  name_genitive: "Омска"
  name_prepositional: "Омске"
  slug: "omsk"                        # для 2GIS deep-link URL
  yandex_region_id: 66              # Яндекс.Пробки region ID
  timezone: "Asia/Omsk"
  utc_offset: 6                       # UTC+6

  center:
    lat: 54.9885
    lon: 73.3682

  bbox:
    lat_min: 54.83
    lat_max: 55.07
    lon_min: 73.07
    lon_max: 73.65

# ── Административные округа ───────────────────────────────────────────────────
# В Омске — 5 административных округов (не «районов»).

districts:
  "Центральный округ":   ["централь", "центр"]
  "Советский округ":     ["советск"]
  "Ленинский округ":     ["ленинск"]
  "Кировский округ":     ["кировск"]
  "Октябрьский округ":   ["октябрьск"]

# ── Подрайоны ─────────────────────────────────────────────────────────────────
# Нет подрайонов по умолчанию. Добавить по необходимости.

sub_districts: []

# ── Координаты центров округов ────────────────────────────────────────────────

district_coords:
  "Центральный округ":  {lon: 73.3697, lat: 54.9893}
  "Советский округ":    {lon: 73.3213, lat: 54.9746}
  "Ленинский округ":    {lon: 73.4066, lat: 54.9573}
  "Кировский округ":    {lon: 73.3568, lat: 54.9404}
  "Октябрьский округ":  {lon: 73.2998, lat: 55.0001}

# ── Городские стоп-слова ──────────────────────────────────────────────────────

city_stopwords:
  - "омск"
  - "омске"

# ── Возможности города ────────────────────────────────────────────────────────

features:
  has_metro: false          # В Омске нет метро (строительство заморожено)

  has_airport: true
  airport_iata: "OMS"
  airport_icao: "UNOO"
  airport_name: "Аэропорт Омск-Центральный"
  airport_keywords_primary:
    - "аэропорт"
    - "центральн"
    - "авиарейс"
    - "вылет"
    - "прилёт"
    - "прилет"
    - "самолёт"
    - "самолет"
    - "авиабилет"
    - "oms"
    - "аэровокзал"
  airport_keywords_full:
    - "аэропорт"
    - "центральн"
    - "авиарейс"
    - "вылет"
    - "прилёт"
    - "прилет"
    - "авиабилет"
    - "самолёт"
    - "самолет"
    - "рейс из омск"
    - "рейс в омск"
    - "oms"
    - "аэровокзал"

  power_outages_url: "https://omskrts.ru/users/people/disconnections/"
  power_outages_base: "https://omskrts.ru"

# ── Станции экологического мониторинга ───────────────────────────────────────
# По одной точке на каждый округ — координаты центра округа.

ecology_stations:
  - station_id: "omsk_central"
    district: "Центральный округ"
    address:  "Центр Омска"
    lat: 54.9893
    lon: 73.3697

  - station_id: "omsk_soviet"
    district: "Советский округ"
    address:  "Советский округ"
    lat: 54.9746
    lon: 73.3213

  - station_id: "omsk_leninsky"
    district: "Ленинский округ"
    address:  "Ленинский округ"
    lat: 54.9573
    lon: 73.4066

  - station_id: "omsk_kirov"
    district: "Кировский округ"
    address:  "Кировский округ"
    lat: 54.9404
    lon: 73.3568

  - station_id: "omsk_october"
    district: "Октябрьский округ"
    address:  "Октябрьский округ"
    lat: 55.0001
    lon: 73.2998

# ── Открытые данные ───────────────────────────────────────────────────────────

opendata_base_url: "http://www.omsk.ru"

# ── Статические датасеты ──────────────────────────────────────────────────────
# Все disabled пока файлы не подготовлены.
# Шаблон для каждого: создать data/cities/omsk/<dataset>.json → enabled: true.

static_datasets:

  emissions:
    enabled: true
    file: "data/cities/omsk/emissions_2tp.json"
    scope: "Омская область"
    municipalities_count: 33
    year: 2024
    form: "2-ТП Воздух"
    source: "Росприроднадзор (rpn.gov.ru)"
    published: "2025-03"

  heat_sources:
    enabled: true
    file: "data/cities/omsk/heat_sources.geojson"
    note: "9 объектов, 5 520 Гкал/ч, 1 685 МВт. Три угольные ТЭЦ (ТГК-11). ТЭЦ-3 — газ"

  metro:
    enabled: false
    file: null
    note: "Метро в Омске не функционирует. has_metro: false блокирует маршрут."

  airport:
    enabled: true
    file: "data/cities/omsk/airport.json"
