# ─────────────────────────────────────────────────────────────────────────────
# Регламент: Рейтинг качества ЖКХ по районам
# Версия 1.0 — параметры и веса расчёта score (0-10)
# ─────────────────────────────────────────────────────────────────────────────
version: "1.0"

# ── Общие параметры ─────────────────────────────────────────────────────────
general:
  analysis_days: 30           # окно анализа (дней)
  base_score: 10.0            # стартовый балл — вычитаем штрафы, прибавляем бонусы
  min_score: 0.0
  max_score: 10.0

# ── Временные зоны суток ────────────────────────────────────────────────────
# Определяют, когда считаются утренние, вечерние, ночные аварии
time_zones:
  morning:
    start_hour: 6             # утро: 06:00 – 12:00
    end_hour: 12
  evening:
    start_hour: 18            # вечер: 18:00 – 22:00
    end_hour: 22
  night:
    start_hour: 22            # ночь: 22:00 – 06:00
    end_hour: 6

# ── Штрафы (вычитаются из score) ────────────────────────────────────────────
# Формула: score -= ratio * weight
# ratio = кол-во дней с событием / общее кол-во дней с авариями

penalties:
  evening_outages:
    weight: 3.0               # до -3.0 за 100% вечерних аварий
    description: "Штраф за аварии в вечернее время (18-22ч)"

  night_outages:
    weight: 4.0               # до -4.0 за 100% ночных аварий
    description: "Штраф за аварии в ночное время (22-06ч) — серьёзнее"

  weekend_outages:
    weight: 1.5               # до -1.5 за 100% аварий в выходные
    description: "Штраф за аварии в выходные дни (сб/вс)"

  # Штраф за высокую суммарную нагрузку (домов × снимков)
  # Средние house-hours за день: порог → штраф
  high_load:
    thresholds:
      - { above: 200, penalty: 1.5 }   # > 200 house-hours/день → -1.5
      - { above: 100, penalty: 1.0 }   # > 100 → -1.0
      - { above: 50,  penalty: 0.5 }   # > 50 → -0.5
    description: "Штраф за большое кол-во домов×часов без ресурса"

# ── Бонусы (прибавляются к score) ───────────────────────────────────────────

bonuses:
  same_day_resolution:
    weight: 2.0               # до +2.0 за 100% быстрых устранений
    description: "Бонус за устранение аварии в тот же день (утром появилось — к вечеру починили)"

  clean_days:
    weight: 2.0               # до +2.0 за 100% чистых дней
    description: "Бонус за дни вообще без аварий"

# ── Грейды (A-F) ───────────────────────────────────────────────────────────
# Пороги: score >= threshold → grade

grades:
  - { grade: "A", threshold: 8.0, label: "Отлично",            color: "emerald" }
  - { grade: "B", threshold: 6.0, label: "Хорошо",             color: "green" }
  - { grade: "C", threshold: 4.0, label: "Удовлетворительно",  color: "yellow" }
  - { grade: "D", threshold: 2.0, label: "Плохо",              color: "orange" }
  - { grade: "F", threshold: 0.0, label: "Критично",           color: "red" }

# ── Fallback-расчёт (для городов без raw-снимков) ───────────────────────────
# Если нет детализации по часам (только days_with_outages из архива),
# используется упрощённая формула.

fallback:
  outage_days_weight: 3.0     # штраф: (daysOut / analysis_days) × weight
  clean_days_weight: 0.5      # бонус: (cleanDays / analysis_days) × weight (не должен перекрывать штрафы)
  # Штраф за КОЛИЧЕСТВО аварийных домов (главный фактор)
  house_count_thresholds:
    - { above: 500, penalty: 5.0 }   # > 500 домов → -5.0
    - { above: 200, penalty: 4.0 }   # > 200 → -4.0
    - { above: 100, penalty: 3.0 }   # > 100 → -3.0
    - { above: 50,  penalty: 1.5 }   # > 50 → -1.5
    - { above: 20,  penalty: 0.5 }   # > 20 → -0.5
