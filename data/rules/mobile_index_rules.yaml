# ─────────────────────────────────────────────────────────────────────────────
# Регламент: Индекс мобильных (транспортных) выбросов — I_mobile
# Версия 1.0 — Демо-фаза (Вариант 1, фронтенд-расчёт)
#
# Формула из PDF «Алгоритм индекса городского загрязнения»:
#   I_total = w_s * I_stationary + w_m * I_mobile
#   I_mobile = 100 * (1 - P_norm), где P_raw = S_auto * F_PT * F_meteo
#
# Изменение весов + POST /admin/reload-rules применяет без перезапуска.
# ─────────────────────────────────────────────────────────────────────────────
version: "1.0"

# ── Веса итогового индекса ─────────────────────────────────────────────────────
# I_total = w_stationary * I_stationary + w_mobile * I_mobile
total_weights:
  w_stationary: 0.6          # стационарные источники (2-ТП)
  w_mobile: 0.4              # мобильные + городские факторы

# ── Блок автомобильной нагрузки ────────────────────────────────────────────────
# S_auto = alpha_cars * S_cars + alpha_jam * S_jam
# S_cars = (D_cars - D_min) / (D_max - D_min),  D_cars = cars_per_1000
# S_jam  = avg_jam / 10
auto_load:
  alpha_cars: 0.4             # вес плотности автопарка
  alpha_jam: 0.6              # вес пробок (реальное использование важнее)
  d_cars_max: 450             # верхняя граница авто/1000 жит. для нормировки
  d_cars_min: 150             # нижняя граница

# ── Блок общественного транспорта ──────────────────────────────────────────────
# S_PT = beta_metro*M_metro + beta_tram*M_tram + beta_trolley*M_trolley
# F_PT = 1 - k_PT * S_PT  (понижающий множитель к автонагрузке)
public_transport:
  beta_metro: 0.50            # метро — самый мощный компенсатор
  beta_tram: 0.30             # трамвай
  beta_trolley: 0.20          # троллейбус
  k_PT: 0.40                  # макс. компенсация = 40% автонагрузки

# ── Блок метео-вентиляции и рельефа ────────────────────────────────────────────
# F_vent = 1 - gamma_wind * S_wind + gamma_calm * S_calm
# S_wind = (V - V_min) / (V_max - V_min)
# F_relief = 1 + delta_basin * H_basin
# F_meteo = F_vent * F_relief,  зажато в [F_min; F_max]
meteo:
  gamma_wind: 0.30            # ветер рассеивает → снижает нагрузку
  gamma_calm: 0.40            # штиль накапливает → увеличивает нагрузку
  v_wind_min: 1.5             # м/с — минимум по выборке
  v_wind_max: 6.0             # м/с — максимум по выборке
  calm_share_default: 0.15    # доля штилевых дней (по умолчанию, если нет данных)
  delta_basin: 0.40           # надбавка за котловину
  f_meteo_min: 0.5            # нижний предел F_meteo
  f_meteo_max: 2.0            # верхний предел F_meteo

# ── Уровни классификации I_mobile ──────────────────────────────────────────────
# 0 = максимум транспортного загрязнения, 100 = чистейший воздух от транспорта
levels:
  - {min: 80, label: "Чистый транспорт",    zone: "green",  emoji: "🟢"}
  - {min: 60, label: "Умеренная нагрузка",  zone: "yellow", emoji: "🟡"}
  - {min: 40, label: "Высокая нагрузка",    zone: "orange", emoji: "🟠"}
  - {min:  0, label: "Критическая нагрузка", zone: "red",   emoji: "🔴"}

# ── Уровни классификации I_total ───────────────────────────────────────────────
total_levels:
  - {min: 80, label: "Благоприятная среда",  zone: "green",  emoji: "🟢"}
  - {min: 60, label: "Умеренные риски",      zone: "yellow", emoji: "🟡"}
  - {min: 40, label: "Повышенные риски",     zone: "orange", emoji: "🟠"}
  - {min:  0, label: "Неблагоприятная среда", zone: "red",   emoji: "🔴"}
